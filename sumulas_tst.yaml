    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 55/1996, DJ 19, 22 e 23.04.1996 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST221:
    numero: 221
    titulo: "RECURSO DE REVISTA. VIOLAÇÃO DE LEI. INDICAÇÃO DE PRECEITO."
    enunciado: >
      A admissibilidade do recurso de revista por violação tem como
      pressuposto a indicação expressa do dispositivo de lei ou da
      Constituição tido como violado.
    status: alterada
    publicacao: "2012-09-27"
    historico: "Súmula alterada - (alterada em decorrência da redação do inciso II do art. 894 da CLT, incluído pela Lei nº 11.496/2007) - Res. 181/2012, DEJT divulgado em 19, 20 e 23.04.2012 Nº 221 Recurso de revist..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST222:
    numero: 222
    titulo: "DIRIGENTES DE ASSOCIAÇÕES PROFISSIONAIS. ESTABILIDADE PROVISÓRIA."
    enunciado: >
      Os dirigentes de associações profissionais, legalmente registradas,
      gozam de estabilidade provisória no emprego.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 84/1998, DJ 20, 21 e 24.08.1998 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST223:
    numero: 223
    titulo: "PRESCRIÇÃO. OPÇÃO PELO SISTEMA DO FUNDO DE GARANTIA DO TEMPO DE SERVIÇO. TERMO INICIAL."
    enunciado: >
      O termo inicial da prescrição para anular a opção pelo Fundo de
      Garantia do Tempo de Serviço coincide com a data em que formalizado o
      ato opcional, e não com a cessação do contrato de trabalho.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST224:
    numero: 224
    titulo: "COMPETÊNCIA. AÇÃO DE CUMPRIMENTO. SINDICATO. DESCONTO ASSISTENCIAL."
    enunciado: >
      A Justiça do Trabalho é incompetente para julgar ação na qual o
      sindicato, em nome próprio, pleiteia o recolhimento de desconto
      assistencial previsto em sentença normativa, convenção ou acordo
      coletivos.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 334 - Res. 26/1994, DJ 12, 17 e 19.05.1994. Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST225:
    numero: 225
    titulo: "REPOUSO SEMANAL. CÁLCULO. GRATIFICAÇÕES POR TEMPO DE SERVIÇO E PRODUTIVIDADE."
    enunciado: >
      As gratificações por tempo de serviço e produtividade, pagas
      mensalmente, não repercutem no cálculo do repouso semanal remunerado.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985 Nº 225 Repouso semanal. Cálculo. Gratificações de produtividade e por tempo de serviço As gratificações de produtividade e por temp..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST226:
    numero: 226
    titulo: "BANCÁRIO. GRATIFICAÇÃO POR TEMPO DE SERVIÇO. INTEGRAÇÃO NO CÁLCULO DAS HORAS EXTRAS."
    enunciado: >
      A gratificação por tempo de serviço integra o cálculo das horas extras.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    precedentes: 11
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST227:
    numero: 227
    titulo: "SALÁRIO-FAMÍLIA. TRABALHADOR RURAL."
    enunciado: >
      O salário-família somente é devido aos trabalhadores urbanos, não
      alcançando os rurais, ainda que prestem serviços, no campo, à empresa
      agroindustrial.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 344 - Res. 51/1995, DJ 21, 22 e 25.09.1995 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST228:
    numero: 228
    titulo: "ADICIONAL DE INSALUBRIDADE. BASE DE CÁLCULO."
    enunciado: >
      A partir de 9 de maio de 2008, data da publicação da Súmula Vinculante
      nº 4 do Supremo Tribunal Federal, o adicional de insalubridade será
      calculado sobre o salário básico, salvo critério mais vantajoso fixado
      em instrumento coletivo.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Redação alterada na sessão do Tribunal Pleno em 26.06.2008 - Res. 148/2008, DJ 04 e 07.07.2008 - Republicada DJ 08, 09 e 10.07.2008. SÚMULA CUJA EFICÁCIA ESTÁ SUSPENSA POR DECISÃO LIMINAR DO SUPREMO T..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST229:
    numero: 229
    titulo: "SOBREAVISO. ELETRICITÁRIOS."
    enunciado: >
      Por aplicação analógica do art. 244, § 2º, da CLT, as horas de
      sobreaviso dos eletricitários são remuneradas à base de 1/3 sobre a
      totalidade das parcelas de natureza salarial.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985 Nº 229 Sobreaviso - Eletricitários Por aplicação analógica do art. 244, § 2º, da Consolidação das Leis do Trabalho, as horas de sob..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST230:
    numero: 230
    titulo: "AVISO PRÉVIO. SUBSTITUIÇÃO PELO PAGAMENTO DAS HORAS REDUZIDAS DA JORNADA DE TRABALHO."
    enunciado: >
      É ilegal substituir o período que se reduz da jornada de trabalho, no
      aviso prévio, pelo pagamento das horas correspondentes.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST231:
    numero: 231
    titulo: "QUADRO DE CARREIRA. HOMOLOGAÇÃO PELO CONSELHO NACIONAL DE POLÍTICA SALARIAL. EFICÁCIA."
    enunciado: >
      É eficaz para efeito do art. 461, § 2º, da CLT a homologação de quadro
      organizado em carreira pelo Conselho Nacional de Política Salarial.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST232:
    numero: 232
    titulo: "BANCÁRIO. CARGO DE CONFIANÇA. JORNADA. HORAS EXTRAS."
    enunciado: >
      O bancário sujeito à regra do art. 224, § 2º, da CLT cumpre jornada de
      trabalho de 8 (oito) horas, sendo extraordinárias as trabalhadas além
      da oitava.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985 Nº 232 Bancário Cargo de confiança Jornada Horas extras. O bancário sujeito ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST233:
    numero: 233
    titulo: "BANCÁRIO. CHEFE."
    enunciado: >
      O bancário no exercício da função de chefia, que recebe gratificação
      não inferior a 1/3 do salário do cargo efetivo, está inserido na
      exceção do § 2º do art. 224 da CLT, não fazendo jus ao pagamento das
      sétima e oitava horas como extras.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST234:
    numero: 234
    titulo: "BANCÁRIO. SUBCHEFE."
    enunciado: >
      O bancário no exercício da função de subchefia, que recebe gratificação
      não inferior a 1/3 do salário do cargo efetivo, está inserido na
      exceção do § 2º do art. 224 da CLT, não fazendo jus ao pagamento das
      sétima e oitava horas como extras.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST235:
    numero: 235
    titulo: "DISTRITO FEDERAL E AUTARQUIAS. CORREÇÃO AUTOMÁTICA DOS SALÁRIOS. INAPLICABILIDADE DA LEI Nº 6.708/1979."
    enunciado: >
      Aos servidores do Distrito Federal e respectivas autarquias, submetidos
      ao regime da CLT, não se aplica a Lei nº 6.708/1979, que determina a
      correção automática dos salários.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST236:
    numero: 236
    titulo: "HONORÁRIOS PERICIAIS. RESPONSABILIDADE."
    enunciado: >
      A responsabilidade pelo pagamento dos honorários periciais é da parte
      sucumbente na pretensão relativa ao objeto da perícia.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST237:
    numero: 237
    titulo: "BANCÁRIO. TESOUREIRO."
    enunciado: >
      O bancário investido na função de tesoureiro, que recebe gratificação
      não inferior a 1/3 do salário do cargo efetivo, está inserido na
      exceção do § 2º do art. 224 da CLT, não fazendo jus ao pagamento das
      sétima e oitava horas como extras.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST238:
    numero: 238
    titulo: "BANCÁRIO. SUBGERENTE."
    enunciado: >
      O bancário no exercício da função de subgerente, que recebe
      gratificação não inferior a 1/3 do salário do cargo efetivo, está
      inserido na exceção do § 2º do art. 224 da CLT, não fazendo jus ao
      pagamento das sétima e oitava horas como extras.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "O bancário no exercício da função de subgerente, que recebe gratificação não inferior a 1/3 (um terço) do salário do cargo efetivo, está inserido na exceção do § 2º do artigo 224 da Consolidação das L..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST239:
    numero: 239
    titulo: "BANCÁRIO. EMPREGADO DE EMPRESA DE PROCESSAMENTO DE DADOS."
    enunciado: >
      É bancário o empregado de empresa de processamento de dados que presta
      serviço a banco integrante do mesmo grupo econômico, exceto quando a
      empresa de processamento de dados presta serviços a banco e a empresas
      não bancárias do mesmo grupo econômico ou a terceiros. (primeira parte
      - ex-Súmula nº 239 - Res. 15/1985, DJ 09.12.1985; segunda parte -
      ex-OJs nºs 64 e 126 da SBDI-1 - inseridas, respectivamente, em
      13.09.1994 e 20.04.1998)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985 Nº 239 Bancário. Empregado de empresa de processamento de dados É bancário o empregado de..."
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST240:
    numero: 240
    titulo: "BANCÁRIO. GRATIFICAÇÃO DE FUNÇÃO E ADICIONAL POR TEMPO DE SERVIÇO."
    enunciado: >
      O adicional por tempo de serviço integra o cálculo da gratificação
      prevista no art. 224, § 2º, da CLT.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985"
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST241:
    numero: 241
    titulo: "SALÁRIO-UTILIDADE. ALIMENTAÇÃO."
    enunciado: >
      O vale para refeição, fornecido por força do contrato de trabalho, tem
      caráter salarial, integrando a remuneração do empregado, para todos os
      efeitos legais.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985"
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST242:
    numero: 242
    titulo: "INDENIZAÇÃO ADICIONAL. VALOR."
    enunciado: >
      A indenização adicional, prevista no art. 9º da Lei nº 6.708, de
      30.10.1979 e no art. 9º da Lei nº 7.238, de 28.10.1984, corresponde ao
      salário mensal, no valor devido na data da comunicação do despedimento,
      integrado pelos adicionais legais ou convencionados, ligados à unidade
      de tempo mês, não sendo computável a gratificação natalina.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985 Nº 242 Indenização adicional Valor. A indenização adicional, prevista no artigo 9º das Leis 6708/79 e 7238/84, corresponde ao salário mensal, no..."
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST243:
    numero: 243
    titulo: "OPÇÃO PELO REGIME TRABALHISTA. SUPRESSÃO DAS VANTAGENS ESTATUTÁRIAS."
    enunciado: >
      Exceto na hipótese de previsão contratual ou legal expressa, a opção do
      funcionário público pelo regime trabalhista implica a renúncia dos
      direitos inerentes ao regime estatutário.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985 Nº 243 Opção pelo regime trabalhista Supressão das vantagens estatutárias. Exceto na hipótese de previsão contratual ou legal expressa, a opção ..."
    precedentes: 17
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST244:
    numero: 244
    titulo: "GESTANTE. ESTABILIDADE PROVISÓRIA."
    enunciado: >
      I - O desconhecimento do estado gravídico pelo empregador não afasta o
      direito ao pagamento da indenização decorrente da estabilidade (art.
      10, II, "b" do ADCT). II - A garantia de emprego à gestante só autoriza
      a reintegração se esta se der durante o período de estabilidade. Do
      contrário, a garantia restringe-se aos salários e demais direitos
      correspondentes ao período de estabilidade. III - A empregada gestante
      tem direito à estabilidade provisória prevista no art. 10, inciso II,
      alínea b, do Ato das Disposições Constitucionais Transitórias, mesmo na
      hipótese de admissão mediante contrato por tempo determinado.
    status: alterada
    publicacao: "2012-09-27"
    historico: "Súmula alterada - (incorporadas as Orientações Jurisprudenciais nºs 88 e 196 da SBDI-1) - Res. 129/2005, DJ 20, 22 e 25.04.2005 Item III - Não há direito da empregada gestante à estabilidade provisóri..."
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST245:
    numero: 245
    titulo: "DEPÓSITO RECURSAL. PRAZO."
    enunciado: >
      O depósito recursal deve ser feito e comprovado no prazo alusivo ao
      recurso. A interposição antecipada deste não prejudica a dilação legal.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985 Nº 245 Depósito recursal. Prazo O depósito recursal deve ser feito e comprovado no prazo alusivo ao recurso, sendo que a interposição antecipada..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST246:
    numero: 246
    titulo: "AÇÃO DE CUMPRIMENTO. TRÂNSITO EM JULGADO DA SENTENÇA NORMATIVA."
    enunciado: >
      É dispensável o trânsito em julgado da sentença normativa para a
      propositura da ação de cumprimento.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 15/1985, DJ 05, 06 e 09.12.1985 Nº 246 Ação de cumprimento - Trânsito em julgado da sentença normativa. É dispensável o trânsito em julgado da sentença normativa para propositu..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST247:
    numero: 247
    titulo: "QUEBRA DE CAIXA. NATUREZA JURÍDICA."
    enunciado: >
      A parcela paga aos bancários sob a denominação "quebra de caixa" possui
      natureza salarial, integrando o salário do prestador de serviços, para
      todos os efeitos legais.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 16/1985, DJ 13, 14 e 15.01.1986 Nº 247 Quebra-de-caixa Natureza jurídica. A parcela paga aos bancários sob a denominação Quebra-de-Caixa possui natureza salarial, integrando o ..."
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST248:
    numero: 248
    titulo: "ADICIONAL DE INSALUBRIDADE. DIREITO ADQUIRIDO."
    enunciado: >
      A reclassificação ou a descaracterização da insalubridade, por ato da
      autoridade competente, repercute na satisfação do respectivo adicional,
      sem ofensa a direito adquirido ou ao princípio da irredutibilidade
      salarial.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 17/1985, DJ 13, 14 e 15.01.1986 Nº 248 Adicional de Insalubridade Direito adquirido. A reclassificação ou descaracterização da insalubridade, por ato da autoridade competente, ..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST249:
    numero: 249
    titulo: "AUMENTO SALARIAL SETORIZADO. TABELA ÚNICA."
    enunciado: >
      Legítima é a concessão de aumento salarial por região do país,
      desfazendo identidade anterior, baseada em tabela única de âmbito
      nacional.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 17/1985, DJ 13, 14 e 15.01.1986"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST250:
    numero: 250
    titulo: "PLANO DE CLASSIFICAÇÃO. PARCELAS ANTIGÜIDADE E DESEMPENHO. AGLUTINAÇÃO AO SALÁRIO."
    enunciado: >
      Lícita é a incorporação ao salário-base das parcelas pagas a título de
      antigüidade e desempenho, quando não há prejuízo para o empregado.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 17/1985, DJ 13, 14 e 15.01.1986"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST251:
    numero: 251
    titulo: "PARTICIPAÇÃO NOS LUCROS. NATUREZA SALARIAL."
    enunciado: >
      A parcela participação nos lucros da empresa, habitualmente paga, tem
      natureza salarial, para todos os efeitos legais.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 33/1994, DJ 12, 17 e 19.05.1994 Redação original - Res. 17/1985, DJ 13, 14 e 15.01.1986"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST252:
    numero: 252
    titulo: "FUNCIONÁRIO PÚBLICO. CEDIDO. REAJUSTE SALARIAL."
    enunciado: >
      Os funcionários públicos cedidos à Rede Ferroviária Federal S.A. têm
      direito ao reajustamento salarial previsto no art. 5º da Lei nº
      4.345/1964, compensável com o deferido pelo art. 1º da Lei nº
      4.564/1964 e observados os padrões de vencimentos, à época dos cargos
      idênticos ou assemelhados do serviço público, a teor do disposto no
      art. 20, item I, da Lei nº 4.345/1964 e nos termos dos acórdãos
      proferidos no DC 2/1966. O paradigma previsto neste último dispositivo
      legal será determinado através de perícia, se as partes não o indicarem
      de comum acordo.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula alterada (revisão da Súmula nº 116) - Res. 107/2001, DJ 21.03.2001 - Republicada DJ 26, 27 e 28.03.2001 Redação original - Res. 18/1985, DJ 13, 14 e 15.01.1986 Nº 252 Os funcionários públicos c..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST253:
    numero: 253
    titulo: "GRATIFICAÇÃO SEMESTRAL. REPERCUSSÕES."
    enunciado: >
      A gratificação semestral não repercute no cálculo das horas extras, das
      férias e do aviso prévio, ainda que indenizados. Repercute, contudo,
      pelo seu duodécimo na indenização por antigüidade e na gratificação
      natalina.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 1/1986, DJ 23, 27 e 28.05.1986 Nº 253 Gratificação semestral. Repercussão nas férias, aviso prévio e horas extras A gratificação semestral não repercute nos cálculos das horas ..."
    precedentes: 23
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST254:
    numero: 254
    titulo: "SALÁRIO-FAMÍLIA. TERMO INICIAL DA OBRIGAÇÃO."
    enunciado: >
      O termo inicial do direito ao salário-família coincide com a prova da
      filiação. Se feita em juízo, corresponde à data de ajuizamento do
      pedido, salvo se comprovado que anteriormente o empregador se recusara
      a receber a respectiva certidão.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 2/1986, DJ 02, 03 e 04.07.1986 Nº 254 Salário-família. Termo inicial da obrigação O termo inicial do direito ao salário-família coincide com a prova da filiação. Se feita em ju..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST255:
    numero: 255
    titulo: "SUBSTITUIÇÃO PROCESSUAL. DESISTÊNCIA."
    enunciado: >
      O substituído processualmente pode, antes da sentença de primeiro grau,
      desistir da ação.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original (revisão da Súmula nº 180) - Res. 3/1986, DJ 02, 03 e 04.07.1986"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST256:
    numero: 256
    titulo: "CONTRATO DE PRESTAÇÃO DE SERVIÇOS. LEGALIDADE."
    enunciado: >
      Salvo os casos de trabalho temporário e de serviço de vigilância,
      previstos nas Leis nºs 6.019, de 03.01.1974, e 7.102, de 20.06.1983, é
      ilegal a contratação de trabalhadores por empresa interposta,
      formando-se o vínculo empregatício diretamente com o tomador dos
      serviços.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 331 - Res. 23/1993, DJ 21.12.1993 e 04.01.1994 Redação original - Res. 4/1986, DJ 30.09.1986, 01 e 02.10.1986"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST257:
    numero: 257
    titulo: "VIGILANTE."
    enunciado: >
      O vigilante, contratado diretamente por banco ou por intermédio de
      empresas especializadas, não é bancário.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 5/1986, DJ 31.10.1986, 03 e 04.11.1986"
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST258:
    numero: 258
    titulo: "SALÁRIO-UTILIDADE. PERCENTUAIS."
    enunciado: >
      Os percentuais fixados em lei relativos ao salário "in natura" apenas
      se referem às hipóteses em que o empregado percebe salário mínimo,
      apurando-se, nas demais, o real valor da utilidade.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 6/1986, DJ 31.10.1986, 03 e 04.11.1986 Nº 258 Salário utilidade Percentuais. Os percentuais fixados em lei relativos ao salário in natura apenas pertinem às hipóteses em que o ..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST259:
    numero: 259
    titulo: "TERMO DE CONCILIAÇÃO. AÇÃO RESCISÓRIA."
    enunciado: >
      Só por ação rescisória é impugnável o termo de conciliação previsto no
      parágrafo único do art. 831 da CLT.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 7/1986, DJ 31.10.1986, 03 e 04.11.1986 Nº 259 Termo de Conciliação Ação rescisória. Só por ação rescisória é atacável o termo de conciliação previsto no parágrafo único do art...."
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST260:
    numero: 260
    titulo: "SALÁRIO-MATERNIDADE. CONTRATO DE EXPERIÊNCIA."
    enunciado: >
      No contrato de experiência, extinto antes do período de 4 (quatro)
      semanas que precede ao parto, a empregada não tem direito a receber, do
      empregador, o salário-maternidade.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 8/1986, DJ 31.10.1986, 03 e 04.11.1986 - Republicada com correção DJ 06, 07 e 10.11.1986"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST261:
    numero: 261
    titulo: "FÉRIAS PROPORCIONAIS. PEDIDO DE DEMISSÃO. CONTRATO VIGENTE HÁ MENOS DE UM ANO."
    enunciado: >
      O empregado que se demite antes de complementar 12 (doze) meses de
      serviço tem direito a férias proporcionais.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 9/1986, DJ 31.10.1986, 03 e 04.11.1986 - Republicada com correção DJ 06, 07 e 10.11.1986 Nº 261 Férias proporcionais Pedido de demissão Contrato vigente há menos ano. O emprega..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST262:
    numero: 262
    titulo: "PRAZO JUDICIAL. NOTIFICAÇÃO OU INTIMAÇÃO EM SÁBADO. RECESSO FORENSE."
    enunciado: >
      I - Intimada ou notificada a parte no sábado, o início do prazo se dará
      no primeiro dia útil imediato e a contagem, no subseqüente. (ex-Súmula
      nº 262 - Res. 10/1986, DJ 31.10.1986) II - O recesso forense e as
      férias coletivas dos Ministros do Tribunal Superior do Trabalho
      suspendem os prazos recursais. (ex-OJ nº 209 da SBDI-1 - inserida em
      08.11.2000)
    status: alterada
    publicacao: "2014-05-23"
    historico: "Redação original Res. 129/2005, DJ 20, 22 e 25.04.2005 Item II - O recesso forense e as férias coletivas dos Ministros do Tribunal Superior do Tra-balho (art. 177, § 1º, do RITST) suspendem os prazos ..."
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST263:
    numero: 263
    titulo: "PETIÇÃO INICIAL. INDEFERIMENTO. INSTRUÇÃO OBRIGATÓRIA DEFICIENTE."
    enunciado: >
      Salvo nas hipóteses do art. 330 do CPC de 2015 (art. 295 do CPC de
      1973), o indeferimento da petição inicial, por encontrar-se
      desacompanhada de documento indispensável à propositura da ação ou não
      preencher outro requisito legal, somente é cabível se, após intimada
      para suprir a irregularidade em 15 (quinze) dias, mediante indicação
      precisa do que deve ser corrigido ou completado, a parte não o fizer
      (art. 321 do CPC de 2015).
    status: alterada
    publicacao: "2016-04-26"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 263. Petição inicial. Indeferimento. Instrução obrigatória deficiente (nova redação) Salvo nas hipóteses do art. 295 do CPC, o indeferimento ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST264:
    numero: 264
    titulo: "HORA SUPLEMENTAR. CÁLCULO."
    enunciado: >
      A remuneração do serviço suplementar é composta do valor da hora
      normal, integrado por parcelas de natureza salarial e acrescido do
      adicional previsto em lei, contrato, acordo, convenção coletiva ou
      sentença normativa.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 12/1986, DJ 31.10.1986, 03 e 04.11.1986"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST265:
    numero: 265
    titulo: "ADICIONAL NOTURNO. ALTERAÇÃO DE TURNO DE TRABALHO. POSSIBILIDADE DE SUPRESSÃO."
    enunciado: >
      A transferência para o período diurno de trabalho implica a perda do
      direito ao adicional noturno.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 13/1986, DJ 20.01.1987, 22, 23 e 26.01.1987 Nº 265 Adicional noturno - Alteração de turno de trabalho - Possibilidade de supressão. A transferência para o período diurno de tra..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST266:
    numero: 266
    titulo: "RECURSO DE REVISTA. ADMISSIBILIDADE. EXECUÇÃO DE SENTENÇA."
    enunciado: >
      A admissibilidade do recurso de revista interposto de acórdão proferido
      em agravo de petição, na liquidação de sentença ou em processo
      incidente na execução, inclusive os embargos de terceiro, depende de
      demonstração inequívoca de violência direta à Constituição Federal.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original (revisão da Súmula nº 210) - Res. 1/1987, DJ 23.10.1987 e DJ 10, 11 e 14.12.1987 Nº 266 A admissibilidade do recurso de revista contra acórdão proferido em agravo de petição, na liqui..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST267:
    numero: 267
    titulo: "BANCÁRIO. VALOR DO SALÁRIO-HORA. DIVISOR."
    enunciado: >
      O bancário sujeito à jornada de 8 (oito) horas (art. 224, § 2º, da CLT)
      tem salário-hora calculado com base no divisor 240 (duzentos e
      quarenta) e não 180 (cento e oitenta), que é relativo à jornada de 6
      (seis) horas.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 343 - Res. 48/1995, DJ 30 e 31.08.1995 e 01.09.1995 Redação original - Res. 2/1987, DJ 10, 11 e 14.12.1987"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST268:
    numero: 268
    titulo: "PRESCRIÇÃO. INTERRUPÇÃO. AÇÃO TRABALHISTA ARQUIVADA."
    enunciado: >
      A ação trabalhista, ainda que arquivada, interrompe a prescrição
      somente em relação aos pedidos idênticos.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Nova redação - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 1/1988, DJ 01, 02 e 03.03.1988 Nº 268 Prescrição. Interrupção. Demanda trabalhista arquivada A demanda trabalhista, ainda q..."
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST269:
    numero: 269
    titulo: "DIRETOR ELEITO. CÔMPUTO DO PERÍODO COMO TEMPO DE SERVIÇO."
    enunciado: >
      O empregado eleito para ocupar cargo de diretor tem o respectivo
      contrato de trabalho suspenso, não se computando o tempo de serviço
      desse período, salvo se permanecer a subordinação jurídica inerente à
      relação de emprego.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 2/1988, DJ 01, 02 e 03.03.1988 Nº 269 Diretor eleito Cômputo do período como tempo de serviço. O empregado eleito para ocupar cargo de diretor tem o respectivo contrato de trab..."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST270:
    numero: 270
    titulo: "REPRESENTAÇÃO PROCESSUAL. MANDATO EXPRESSO. AUSÊNCIA DE FIRMA RECONHECIDA."
    enunciado: >
      A ausência de reconhecimento de firma no instrumento de mandato -
      procuração - torna irregular a representação processual,
      impossibilitando o conhecimento do recurso, por inexistente.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 49/1995, DJ 30 e 31.08.1995 e 01.09.1995 Redação original - Res. 3/1988, DJ 01, 02 e 03.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST271:
    numero: 271
    titulo: "SUBSTITUIÇÃO PROCESSUAL. ADICIONAIS DE INSALUBRIDADE E DE PERICULOSIDADE."
    enunciado: >
      Legítima é a substituição processual dos empregados associados, pelo
      sindicato que congrega a categoria profissional, na demanda trabalhista
      cujo objeto seja adicional de insalubridade ou periculosidade.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 4/1988, DJ 01, 02 e 03.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST272:
    numero: 272
    titulo: "AGRAVO DE INSTRUMENTO. TRASLADO DEFICIENTE."
    enunciado: >
      Não se conhece do agravo para subida de recurso de revista, quando
      faltarem no traslado o despacho agravado, a decisão recorrida, a
      petição de recurso de revista, a procuração subscrita pelo agravante,
      ou qualquer peça essencial à compreensão da controvérsia.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 5/1988, DJ 01, 02 e 03.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST273:
    numero: 273
    titulo: "CONSTITUCIONALIDADE. DECRETOS-LEIS NºS 2.012/1983 E 2.045/1983."
    enunciado: >
      São constitucionais os Decretos-Leis nºs 2.012/1983 e 2.045/1983.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 6/1988, DJ 01, 02 e 03.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST274:
    numero: 274
    titulo: "PRESCRIÇÃO PARCIAL. EQUIPARAÇÃO SALARIAL."
    enunciado: >
      Na ação de equiparação salarial, a prescrição só alcança as diferenças
      salariais vencidas no período de 5 (cinco) anos que precedeu o
      ajuizamento.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 7/1988, DJ 01, 02 e 03.03.1988 Nº 274 Prescrição parcial Equiparação salarial. Na demanda de equiparação salarial a pres..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST275:
    numero: 275
    titulo: "PRESCRIÇÃO. DESVIO DE FUNÇÃO E REENQUADRAMENTO."
    enunciado: >
      I - Na ação que objetive corrigir desvio funcional, a prescrição só
      alcança as diferenças salariais vencidas no período de 5 (cinco) anos
      que precedeu o ajuizamento. (ex-Súmula nº 275 alterada pela Res.
      121/2003, DJ 21.11.2003) II - Em se tratando de pedido de
      reenquadramento, a prescrição é total, contada da data do enquadramento
      do empregado. (ex-OJ nº 144 da SBDI-1 - inserida em 27.11.1998)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 275 Prescrição parcial. Desvio de função Na ação que objetive corrigir desvio funcional, a prescrição só alcança as diferenças salariais venc..."
    precedentes: 27
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST276:
    numero: 276
    titulo: "AVISO PRÉVIO. RENÚNCIA PELO EMPREGADO."
    enunciado: >
      O direito ao aviso prévio é irrenunciável pelo empregado. O pedido de
      dispensa de cumprimento não exime o empregador de pagar o respectivo
      valor, salvo comprovação de haver o prestador dos serviços obtido novo
      emprego.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 9/1988, DJ 01, 02 e 03.03.1988 Nº 276 Aviso prévio Renúncia pelo empregado. O direito ao aviso prévio é irrenunciável pelo empregado. O pedido de dispensa de cumprimento não ex..."
    precedentes: 27
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST277:
    numero: 277
    titulo: "CONVENÇÃO COLETIVA DE TRABALHO OU ACORDO COLETIVO DE TRABALHO. EFICÁCIA. ULTRATIVIDADE."
    enunciado: >
      As cláusulas normativas dos acordos coletivos ou convenções coletivas
      integram os contratos individuais de trabalho e somente poderão ser
      modificados ou suprimidas mediante negociação coletiva de trabalho.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Súmula declarada inconstitucional pelo Supremo Tribunal Federal, no julgamento da ADPF nº 323/DF, Rel Min. Gilmar Mendes, DJE de 15/09/2022. Redação alterada na sessão do Tribunal Pleno realizada em 1..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST278:
    numero: 278
    titulo: "EMBARGOS DE DECLARAÇÃO. OMISSÃO NO JULGADO."
    enunciado: >
      A natureza da omissão suprida pelo julgamento de embargos declaratórios
      pode ocasionar efeito modificativo no julgado.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 11/1988, DJ 01, 02 e 03.03.1988"
    precedentes: 15
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST279:
    numero: 279
    titulo: "RECURSO CONTRA SENTENÇA NORMATIVA. EFEITO SUSPENSIVO. CASSAÇÃO."
    enunciado: >
      A cassação de efeito suspensivo concedido a recurso interposto de
      sentença normativa retroage à data do despacho que o deferiu.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 12/1988, DJ 01, 02 e 03.03.1988 Nº 279 Recurso contra sentença normativa Efeito suspensivo Cassação. A cassação de efeito suspensivo concedido a recurso interposto contra sente..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST280:
    numero: 280
    titulo: "CONVENÇÃO COLETIVA. SOCIEDADE DE ECONOMIA MISTA. AUDIÊNCIA PRÉVIA DO ÓRGÃO OFICIAL COMPETENTE."
    enunciado: >
      Convenção coletiva, formalizada sem prévia audição do órgão oficial
      competente, não obriga sociedade de economia mista.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 2/1990, DJ 10, 11 e 14.01.1991 Redação original - Res. 13/1988, DJ 01, 02 e 03.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST281:
    numero: 281
    titulo: "PISO SALARIAL. PROFESSORES."
    enunciado: >
      A instituição do Fundo de Participação dos Estados e Municípios não fez
      surgir, para os professores, direito a piso salarial.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1988, DJ 01, 02 e 03.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST282:
    numero: 282
    titulo: "ABONO DE FALTAS. SERVIÇO MÉDICO DA EMPRESA."
    enunciado: >
      Ao serviço médico da empresa ou ao mantido por esta última mediante
      convênio compete abonar os primeiros 15 (quinze) dias de ausência ao
      trabalho.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original Res. 15/1988, DJ 01, 02 e 03.03.1988"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST283:
    numero: 283
    titulo: "RECURSO ADESIVO. PERTINÊNCIA NO PROCESSO DO TRABALHO. CORRELAÇÃO DE MATÉRIAS."
    enunciado: >
      O recurso adesivo é compatível com o processo do trabalho e cabe, no
      prazo de 8 (oito) dias, nas hipóteses de interposição de recurso
      ordinário, de agravo de petição, de revista e de embargos, sendo
      desnecessário que a matéria nele veiculada esteja relacionada com a do
      recurso interposto pela parte contrária.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original (revisão da Súmula nº 196) - Res. 16/1988, DJ 18, 21 e 22.03.1988 Nº 283 Recurso adesivo Pertinência no processo do trabalho Correlação de matérias. O recurso adesivo é compatível com..."
    precedentes: 2
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST284:
    numero: 284
    titulo: "CORREÇÃO MONETÁRIA. EMPRESAS EM LIQUIDAÇÃO. LEI Nº 6.024/1974."
    enunciado: >
      Os débitos trabalhistas das empresas em liquidação de que cogita a Lei
      nº 6.024/1974 estão sujeitos à correção monetária, observada a vigência
      do Decreto-Lei nº 2.278/1985, ou seja, a partir de 22.11.1985.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 304 - Res. 2/1992, DJ 05.11.1992 Redação original (revisão da Súmula nº 185) - Res. 17/1988, DJ 18, 21 e 22.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST285:
    numero: 285
    titulo: "RECURSO DE REVISTA. ADMISSIBILIDADE PARCIAL PELO JUIZ-PRESIDENTE DO TRIBUNAL REGIONAL DO TRABALHO. EFEITO."
    enunciado: >
      O fato de o juízo primeiro de admissibilidade do recurso de revista
      entendê-lo cabível apenas quanto a parte das matérias veiculadas não
      impede a apreciação integral pela Turma do Tribunal Superior do
      Trabalho, sendo imprópria a interposição de agravo de instrumento.
    status: cancelada
    publicacao: "2016-03-21"
    historico: "*Cf. Instrução Normativa 40/2016 Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 18/1988, DJ 18, 21 e 22.03.1988 Nº 285 Recurso de revista Admissibilidade parcial pelo J..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST286:
    numero: 286
    titulo: "SINDICATO. SUBSTITUIÇÃO PROCESSUAL. CONVENÇÃO E ACORDO COLETIVOS."
    enunciado: >
      A legitimidade do sindicato para propor ação de cumprimento estende-se
      também à observância de acordo ou de convenção coletivos.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Súmula alterada - Res. 98/2000, DJ 18, 19 e 20.09.2000 Redação original - Res. 19/1988, DJ 18, 21 e 22.03.1988 Nº 286 Sindicato - Substituição processual - Convenção coletiva O sindicato não é parte l..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST287:
    numero: 287
    titulo: "JORNADA DE TRABALHO. GERENTE BANCÁRIO."
    enunciado: >
      A jornada de trabalho do empregado de banco gerente de agência é regida
      pelo art. 224, § 2º, da CLT. Quanto ao gerente-geral de agência
      bancária, presume-se o exercício de encargo de gestão, aplicando-se-lhe
      o art. 62 da CLT.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 20/1988, DJ 18.03.1988 Nº 287 Jornada de Trabalho Gerente bancário. O gerente bancário, enquadrado na previsão do § 2º do art. 224 consolidado, cumpre jornada normal de oito ho..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST288:
    numero: 288
    titulo: "COMPLEMENTAÇÃO DOS PROVENTOS DA APOSENTADORIA."
    enunciado: >
      I - A complementação dos proventos de aposentadoria, instituída,
      regulamentada e paga diretamente pelo empregador, sem vínculo com as
      entidades de previdência privada fechada, é regida pelas normas em
      vigor na data de admissão do empregado, ressalvadas as alterações que
      forem mais benéficas (art. 468 da CLT). II - Na hipótese de
      coexistência de dois regulamentos de planos de previdência
      complementar, instituídos pelo empregador ou por entidade de
      previdência privada, a opção do beneficiário por um deles tem efeito
      jurídico de renúncia às regras do outro. III - Após a entrada em vigor
      das Leis Complementares nºs 108 e 109, de 29/05/2001, reger-se-á a
      complementação dos proventos de aposentadoria pelas normas vigentes na
      data da implementação dos requisitos para obtenção do benefício,
      ressalvados o direito adquirido do participante que anteriormente
      implementara os requisitos para o benefício e o direito acumulado do
      empregado que até então não preenchera tais requisitos. IV - O
      entendimento da primeira parte do item III aplica-se aos processos em
      curso no Tribunal Superior do Trabalho em que, em 12/04/2016, ainda não
      haja sido proferida decisão de mérito por suas Turmas e Seções.
    status: alterada
    publicacao: "2016-04-20"
    historico: "Súmula alterada Nº 288 Complementação dos proventos da aposentadoria (inclusão do item II) - Res. 193/2013, DEJT divulgado em 13, 16 e 17.12.2013 I - A complementação dos proventos da aposentadoria é ..."
    precedentes: 28
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST289:
    numero: 289
    titulo: "INSALUBRIDADE. ADICIONAL. FORNECIMENTO DO APARELHO DE PROTEÇÃO. EFEITO."
    enunciado: >
      O simples fornecimento do aparelho de proteção pelo empregador não o
      exime do pagamento do adicional de insalubridade. Cabe-lhe tomar as
      medidas que conduzam à diminuição ou eliminação da nocividade, entre as
      quais as relativas ao uso efetivo do equipamento pelo empregado.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 22/1988, DJ 24, 25 e 28.03.1988 Nº 289 Insalubridade Adicional Fornecimento do aparelho de proteção Efeito. O simples fornecimento do aparelho de proteção pelo empregador não o..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST290:
    numero: 290
    titulo: "GORJETAS. NATUREZA JURÍDICA. AUSÊNCIA DE DISTINÇÃO QUANTO À FORMA DE RECEBIMENTO."
    enunciado: >
      As gorjetas, sejam cobradas pelo empregador na nota de serviço ou
      oferecidas espontaneamente pelos clientes, integram a remuneração do
      empregado.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 354 - Res. 71/1997, DJ 30.05.1997 e 04, 05 e 06.06.1997 Redação original - Res. 23/1988, DJ 24, 25 e 28.03.1988"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST291:
    numero: 291
    titulo: "HORAS EXTRAS. HABITUALIDADE. SUPRESSÃO. INDENIZAÇÃO."
    enunciado: >
      A supressão total ou parcial, pelo empregador, de serviço suplementar
      prestado com habitualidade, durante pelo menos 1 (um) ano, assegura ao
      empregado o direito à indenização correspondente ao valor de 1 (um) mês
      das horas suprimidas, total ou parcialmente, para cada ano ou fração
      igual ou superior a seis meses de prestação de serviço acima da jornada
      normal. O cálculo observará a média das horas suplementares nos últimos
      12 (doze) meses anteriores à mudança, multiplicada pelo valor da hora
      extra do dia da supressão.
    status: alterada
    publicacao: "2011-05-31"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original (revisão da Súmula nº 76) - Res. 1/1989, DJ 14, 18 e 19.04.1989 Nº 291 Horas extras. Revisão do Enunciado número 76. A supressão..."
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST292:
    numero: 292
    titulo: "ADICIONAL DE INSALUBRIDADE. TRABALHADOR RURAL."
    enunciado: >
      O trabalhador rural tem direito ao adicional de insalubridade,
      observando-se a necessidade de verificação, na forma da lei, de
      condições nocivas à saúde.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 2/1989, DJ 14, 18 e 19.04.1989"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST293:
    numero: 293
    titulo: "ADICIONAL DE INSALUBRIDADE. CAUSA DE PEDIR. AGENTE NOCIVO DIVERSO DO APONTADO NA INICIAL."
    enunciado: >
      A verificação mediante perícia de prestação de serviços em condições
      nocivas, considerado agente insalubre diverso do apontado na inicial,
      não prejudica o pedido de adicional de insalubridade.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 3/1989, DJ 14, 18 e 19.04.1989"
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST294:
    numero: 294
    titulo: "PRESCRIÇÃO. ALTERAÇÃO CONTRATUAL. TRABALHADOR URBANO."
    enunciado: >
      Tratando-se de ação que envolva pedido de prestações sucessivas
      decorrente de alteração do pactuado, a prescrição é total, exceto
      quando o direito à parcela esteja também assegurado por preceito de
      lei.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original (cancelamento das Súmulas nºs 168 e 198) - Res. 4/1989, DJ 14, 18 e 19.04.1989"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST295:
    numero: 295
    titulo: "APOSENTADORIA ESPONTÂNEA. DEPÓSITO DO FGTS. PERÍODO ANTERIOR À OPÇÃO."
    enunciado: >
      A cessação do contrato de trabalho em razão de aposentadoria espontânea
      do empregado exclui o direito ao recebimento de indenização relativa ao
      período anterior à opção. A realização de depósito na conta do Fundo de
      Garantia do Tempo de Serviço, de que trata o § 3º do art. 14 da Lei nº
      8.036, de 11.05.1990, é faculdade atribuída ao empregador.
    status: cancelada
    publicacao: "2008-11-24"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 5/1989, DJ 14, 18 e 19.04.1989 Nº 295 Aposentadoria espontânea Depósito do FGTS Período anterior à opção. A cessação do ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST296:
    numero: 296
    titulo: "RECURSO. DIVERGÊNCIA JURISPRUDENCIAL. ESPECIFICIDADE."
    enunciado: >
      I - A divergência jurisprudencial ensejadora da admissibilidade, do
      prosseguimento e do conhecimento do recurso há de ser específica,
      revelando a existência de teses diversas na interpretação de um mesmo
      dispositivo legal, embora idênticos os fatos que as ensejaram.
      (ex-Súmula nº 296 - Res. 6/1989, DJ 19.04.1989) II - Não ofende o art.
      896 da CLT decisão de Turma que, examinando premissas concretas de
      especificidade da divergência colacionada no apelo revisional, conclui
      pelo conhecimento ou desconhecimento do recurso. (ex-OJ nº 37 da SBDI-1
      - inserida em 01.02.1995)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 6/1989, DJ 14, 18 e 19.04.1989 Nº 296 Recurso. Divergência jurisprudencial. Especificidade A divergência jurisprudencial ..."
    precedentes: 19
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST297:
    numero: 297
    titulo: "PREQUESTIONAMENTO. OPORTUNIDADE. CONFIGURAÇÃO."
    enunciado: >
      I - Diz-se prequestionada a matéria ou questão quando na decisão
      impugnada haja sido adotada, explicitamente, tese a respeito. II -
      Incumbe à parte interessada, desde que a matéria haja sido invocada no
      recurso principal, opor embargos declaratórios objetivando o
      pronunciamento sobre o tema, sob pena de preclusão. III - Considera-se
      prequestionada a questão jurídica invocada no recurso principal sobre a
      qual se omite o Tribunal de pronunciar tese, não obstante opostos
      embargos de declaração.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 7/1989, DJ 14,18 e 19.04.1989 Nº 297 Prequestionamento Oportunidade - Configuração Diz-se prequestionada a matéria quando na decisão impugnada haja sido adotada, explicitamente..."
    precedentes: 20
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST298:
    numero: 298
    titulo: "AÇÃO RESCISÓRIA. VIOLAÇÃO A DISPOSIÇÃO DE LEI. PRONUNCIAMENTO EXPLÍCITO."
    enunciado: >
      I - A conclusão acerca da ocorrência de violação literal a disposição
      de lei pressupõe pronunciamento explícito, na sentença rescindenda,
      sobre a matéria veiculada. II - O pronunciamento explícito exigido em
      ação rescisória diz respeito à matéria e ao enfoque específico da tese
      debatida na ação, e não, necessariamente, ao dispositivo legal tido por
      violado. Basta que o conteúdo da norma reputada violada haja sido
      abordado na decisão rescindenda para que se considere preenchido o
      pressuposto. III - Para efeito de ação rescisória, considera-se
      pronunciada explicitamente a matéria tratada na sentença quando,
      examinando remessa de ofício, o Tribunal simplesmente a confirma. IV -
      A sentença meramente homologatória, que silencia sobre os motivos de
      convencimento do juiz, não se mostra rescindível, por ausência de
      pronunciamento explícito. V - Não é absoluta a exigência de
      pronunciamento explícito na ação rescisória, ainda que esta tenha por
      fundamento violação de dispositivo de lei. Assim, prescindível o
      pronunciamento explícito quando o vício nasce no próprio julgamento,
      como se dá com a sentença "extra, citra e ultra petita".
    status: alterada
    publicacao: "2012-02-15"
    historico: "Súmula alterada em decorrência da incorporação das Orientações Jurisprudenciais nºs 36, 72, 75 e 85, parte final, da SBDI-2 - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 298 Ação rescisória. Violência de..."
    precedentes: 17
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST299:
    numero: 299
    titulo: "AÇÃO RESCISÓRIA. DECISÃO RESCINDENDA. TRÂNSITO EM JULGADO. COMPROVAÇÃO. EFEITOS."
    enunciado: >
      I - É indispensável ao processamento da ação rescisória a prova do
      trânsito em julgado da decisão rescindenda. (ex-Súmula nº 299 ¿ Res.
      8/1989, DJ 14, 18 e 19.04.1989) II - Verificando o relator que a parte
      interessada não juntou à inicial o documento comprobatório, abrirá
      prazo de 15 (quinze) dias para que o faça (art. 321 do CPC de 2015),
      sob pena de indeferimento.(ex-Súmula nº 299 - Res 8/1989, DJ 14, 18 e
      19.04.1989) III - A comprovação do trânsito em julgado da decisão
      rescindenda é pressuposto processual indispensável ao tempo do
      ajuizamento da ação rescisória. Eventual trânsito em julgado posterior
      ao ajuizamento da ação rescisória não reabilita a ação proposta, na
      medida em que o ordenamento jurídico não contempla a ação rescisória
      preventiva. (ex-OJ nº 106 da SBDI-2 - DJ 29.04.2003) IV - O pretenso
      vício de intimação, posterior à decisão que se pretende rescindir, se
      efetivamente ocorrido, não permite a formação da coisa julgada
      material. Assim, a ação rescisória deve ser julgada extinta, sem
      julgamento do mérito, por carência de ação, por inexistir decisão
      transitada em julgado a ser rescindida. (ex-OJ nº 96 da SBDI-2 -
      inserida em 27.09.2002)
    status: alterada
    publicacao: "2016-08-26T03:00:00-03"
    historico: "Súmula alterada em decorrência das incorporações das Orientações Jurisprudenciais nºs 96 e 106 da SBDI-2 - Res. 137/2005, DJ 22, 23 e 24.08.2005 II - Verificando o relator que a parte interessada não ..."
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST300:
    numero: 300
    titulo: "COMPETÊNCIA DA JUSTIÇA DO TRABALHO. CADASTRAMENTO NO PIS."
    enunciado: >
      Compete à Justiça do Trabalho processar e julgar ações ajuizadas por
      empregados em face de empregadores relativas ao cadastramento no
      Programa de Integração Social (PIS).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 10/1989, DJ 14, 18 e 19.04.1989 Nº 300 Competência da Justiça do Trabalho Cadastramento no PIS. Compete à Justiça do Trabalho processar e julgar ações de empregados contra empr..."
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST301:
    numero: 301
    titulo: "AUXILIAR DE LABORATÓRIO. AUSÊNCIA DE DIPLOMA. EFEITOS."
    enunciado: >
      O fato de o empregado não possuir diploma de profissionalização de
      auxiliar de laboratório não afasta a observância das normas da Lei nº
      3.999, de 15.12.1961, uma vez comprovada a prestação de serviços na
      atividade.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 11/1989, DJ 14, 18 e 19.04.1989 Nº 301 Auxiliar de laboratório Ausência de diploma Efeitos. O fato de o empregado não possuir diploma de profissionalização de auxiliar de labor..."
    precedentes: 15
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST302:
    numero: 302
    titulo: "PROCESSO ADMINISTRATIVO."
    enunciado: >
      Não cabe recurso ao Tribunal Superior do Trabalho, contra decisão em
      processo administrativo, proferida por Tribunal Regional do Trabalho,
      ainda que nele seja interessado magistrado.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 321 - Res. 13/1993, DJ 29.11.1993, 01 e 03.12 .1993 Redação original (revisão da Súmula nº 40) - Res. 1/1990, DJ 02, 03 e 04.04.1990"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST303:
    numero: 303
    titulo: "FAZENDA PÚBLICA. REEXAME NECESSÁRIO."
    enunciado: >
      I - Em dissídio individual, está sujeita ao reexame necessário, mesmo
      na vigência da Constituição Federal de 1988, decisão contrária à
      Fazenda Pública, salvo quando a condenação não ultrapassar o valor
      correspondente a: a) 1.000 (mil) salários mínimos para a União e as
      respectivas autarquias e fundações de direito público; b) 500
      (quinhentos) salários mínimos para os Estados, o Distrito Federal, as
      respectivas autarquias e fundações de direito público e os Municípios
      que constituam capitais dos Estados; c) 100 (cem) salários mínimos para
      todos os demais Municípios e respectivas autarquias e fundações de
      direito público. II - Também não se sujeita ao duplo grau de jurisdição
      a decisão fundada em: a) súmula ou orientação jurisprudencial do
      Tribunal Superior do Trabalho; b) acórdão proferido pelo Supremo
      Tribunal Federal ou pelo Tribunal Superior do Trabalho em julgamento de
      recursos repetitivos; c) entendimento firmado em incidente de resolução
      de demandas repetitivas ou de assunção de competência; d) entendimento
      coincidente com orientação vinculante firmada no âmbito administrativo
      do próprio ente público, consolidada em manifestação, parecer ou súmula
      administrativa. III - Em ação rescisória, a decisão proferida pelo
      Tribunal Regional do Trabalho está sujeita ao duplo grau de jurisdição
      obrigatório quando desfavorável ao ente público, exceto nas hipóteses
      dos incisos anteriores. (ex-OJ nº 71 da SBDI-1 - inserida em
      03.06.1996) IV - Em mandado de segurança, somente cabe reexame
      necessário se, na relação processual, figurar pessoa jurídica de
      direito público como parte prejudicada pela concessão da ordem. Tal
      situação não ocorre na hipótese de figurar no feito como impetrante e
      terceiro interessado pessoa de direito privado, ressalvada a hipótese
      de matéria administrativa. (ex-OJs nºs 72 e 73 da SBDI-1 - inseridas,
      respectivamente, em 25.11.1996 e 03.06.1996).
    status: alterada
    publicacao: "2016-08-26T03:00:00-03"
    historico: "Nº 303 Fazenda Pública. Duplo grau de jurisdição Súmula alterada em decorrência da incorporação das Orientações Jurisprudenciais nºs 9, 71, 72 e 73 da SBDI-1 - Res. 129/2005, DJ 20, 22 e 25.04.2005 I ..."
    precedentes: 15
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST304:
    numero: 304
    titulo: "CORREÇÃO MONETÁRIA. EMPRESAS EM LIQUIDAÇÃO. ART. 46 DO ADCT/CF."
    enunciado: >
      Os débitos trabalhistas das entidades submetidas aos regimes de
      intervenção ou liquidação extrajudicial estão sujeitos a correção
      monetária desde o respectivo vencimento até seu efetivo pagamento, sem
      interrupção ou suspensão, não incidindo, entretanto, sobre tais
      débitos, juros de mora.
    status: vigente
    publicacao: "2003-11-25"
    historico: "Redação original (revisão da Súmula nº 284) - Res. 2/1992, DJ 05, 12 e 19.11.1992"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST305:
    numero: 305
    titulo: "FUNDO DE GARANTIA DO TEMPO DE SERVIÇO. INCIDÊNCIA SOBRE O AVISO PRÉVIO."
    enunciado: >
      O pagamento relativo ao período de aviso prévio, trabalhado ou não,
      está sujeito a contribuição para o FGTS.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 3/1992, DJ 05, 12 e 19.11.1992"
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST306:
    numero: 306
    titulo: "INDENIZAÇÃO ADICIONAL. PAGAMENTO DEVIDO COM FUNDAMENTO NOS ARTIGOS 9º DA LEI Nº 6.708/1979 E 9º DA LEI Nº 7.238/1984."
    enunciado: >
      É devido o pagamento da indenização adicional na hipótese de dispensa
      injusta do empregado, ocorrida no trintídio que antecede a data-base. A
      legislação posterior não revogou os arts. 9º da Lei nº 6.708/1979 e 9º
      da Lei nº 7.238/1984.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 4/1992, DJ 05, 12 e 19.11.1992"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST307:
    numero: 307
    titulo: "JUROS. IRRETROATIVIDADE DO DECRETO-LEI Nº 2.322, DE 26.02.1987."
    enunciado: >
      A fórmula de cálculo de juros prevista no Decreto-Lei nº 2.322, de
      26.02.1987 somente é aplicável a partir de 27.02.1987. Quanto ao
      período anterior, deve-se observar a legislação então vigente.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 5/1992, DJ 05, 12 e 19.11.1992 Nº 307 Juros. Irretroatividade do Decreto-Lei nº 2322/87. A fórmula de cálculo de juros prevista ..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST308:
    numero: 308
    titulo: "PRESCRIÇÃO QÜINQÜENAL."
    enunciado: >
      I - Respeitado o biênio subseqüente à cessação contratual, a prescrição
      da ação trabalhista concerne às pretensões imediatamente anteriores a
      cinco anos, contados da data do ajuizamento da reclamação e, não, às
      anteriores ao qüinqüênio da data da extinção do contrato. (ex-OJ nº 204
      da SBDI-1 - inserida em 08.11.2000) II - A norma constitucional que
      ampliou o prazo de prescrição da ação trabalhista para 5 (cinco) anos é
      de aplicação imediata e não atinge pretensões já alcançadas pela
      prescrição bienal quando da promulgação da CF/1988. (ex-Súmula nº 308 -
      Res. 6/1992, DJ 05.11.1992)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 6/1992, DJ 05, 12 e 19.11.1992 Nº 308 Prescrição qüinqüenal A norma constitucional que ampliou a prescrição da ação traba..."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST309:
    numero: 309
    titulo: "VIGIA PORTUÁRIO. TERMINAL PRIVATIVO. NÃO OBRIGATORIEDADE DE REQUISIÇÃO."
    enunciado: >
      Tratando-se de terminais privativos destinados à navegação de cabotagem
      ou de longo curso, não é obrigatória a requisição de vigia portuário
      indicado por sindicato.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 7/1992, DJ 05, 12 e 19.11.1992 Nº 309 Vigia portuário. Em se tratando de terminais privativos destinados à navegação de cabotagem ou de longo curso, não é obrigatória a requisi..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST310:
    numero: 310
    titulo: "SUBSTITUIÇÃO PROCESSUAL. SINDICATO."
    enunciado: >
      I - O art. 8º, inciso III, da Constituição da República não assegura a
      substituição processual pelo sindicato. II - A substituição processual
      autorizada ao sindicato pelas Leis nºs 6.708, de 30.10.1979, e 7.238,
      de 29.10.1984, limitada aos associados, restringe-se às demandas que
      visem aos reajustes salariais previstos em lei, ajuizadas até
      03.07.1989, data em que entrou em vigor a Lei nº 7.788/1989. III - A
      Lei nº 7.788/1989, em seu art. 8º, assegurou, durante sua vigência, a
      legitimidade do sindicato como substituto processual da categoria. IV -
      A substituição processual autorizada pela Lei nº 8.073, de 30.07.1990,
      ao sindicato alcança todos os integrantes da categoria e é restrita às
      demandas que visem à satisfação de reajustes salariais específicos
      resultantes de disposição prevista em lei de política salarial. V - Em
      qualquer ação proposta pelo sindicato como substituto processual, todos
      os substituídos serão individualizados na petição inicial e, para o
      início da execução, devidamente identificados pelo número da Carteira
      de Trabalho e Previdência Social ou de qualquer documento de
      identidade. VI - É lícito aos substituídos integrar a lide como
      assistente litisconsorcial, acordar, transigir e renunciar,
      independentemente de autorização ou anuência do substituto. VII - Na
      liquidação da sentença exeqüenda, promovida pelo substituto, serão
      individualizados os valores devidos a cada substituído, cujos depósitos
      para quitação serão levantados através de guias expedidas em seu nome
      ou de procurador com poderes especiais para esse fim, inclusive nas
      ações de cumprimento. VIII - Quando o sindicato for o autor da ação na
      condição de substituto processual, não serão devidos honorários
      advocatícios.
    status: cancelada
    publicacao: "2003-11-21T01:00:00-03"
    historico: "Súmula cancelada - Res. 119/2003, DJ 01.10.2003 Redação original - Res. 1/1993, DJ 06, 10 e 12.05.1993"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST311:
    numero: 311
    titulo: "BENEFÍCIO PREVIDENCIÁRIO A DEPENDENTE DE EX-EMPREGADO. CORREÇÃO MONETÁRIA. LEGISLAÇÃO APLICÁVEL."
    enunciado: >
      O cálculo da correção monetária incidente sobre débitos relativos a
      benefícios previdenciários devidos a dependentes de ex-empregado pelo
      empregador, ou por entidade de previdência privada a ele vinculada,
      será o previsto na Lei nº 6.899, de 08.04.1981.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 2/1993, DJ 06, 10 e 12.05.1993 - Republicada DJ 14, 20 e 21.05.1993 Nº 311 Benefício previdenciário a dependente de ex-empregado..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST312:
    numero: 312
    titulo: "CONSTITUCIONALIDADE. ALÍNEA \"B\" DO ART. 896 DA CLT."
    enunciado: >
      É constitucional a alínea "b" do art. 896 da CLT, com a redação dada
      pela Lei nº 7.701, de 21.12.1988.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 4/1993, DJ 22, 27 e 29.09.1993"
    precedentes: 2
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST313:
    numero: 313
    titulo: "COMPLEMENTAÇÃO DE APOSENTADORIA. PROPORCIONALIDADE. BANESPA."
    enunciado: >
      A complementação de aposentadoria, prevista no art. 106, e seus
      parágrafos, do regulamento de pessoal editado em 1965, só é integral
      para os empregados que tenham 30 (trinta) ou mais anos de serviços
      prestados exclusivamente ao banco.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 5/1993, DJ 22, 27 e 29.09.1993"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST314:
    numero: 314
    titulo: "INDENIZAÇÃO ADICIONAL. VERBAS RESCISÓRIAS. SALÁRIO CORRIGIDO."
    enunciado: >
      Se ocorrer a rescisão contratual no período de 30 (trinta) dias que
      antecede à data-base, observado a Súmula nº 182 do TST, o pagamento das
      verbas rescisórias com o salário já corrigido não afasta o direito à
      indenização adicional prevista nas Leis nºs 6.708, de 30.10.1979 e
      7.238, de 28.10.1984.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 6/1993, DJ 22, 27 e 29.09.1993 Nº 314 Ocorrendo a rescisão contratual no período de 30 dias que antecede à data-base, observado o Enunciado de nº 182 do TST, o pagamento das ve..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST315:
    numero: 315
    titulo: "IPC DE MARÇO/1990. LEI Nº 8.030, DE 12.04.1990 (PLANO COLLOR). INEXISTÊNCIA DE DIREITO ADQUIRIDO."
    enunciado: >
      A partir da vigência da Medida Provisória nº 154, de 15.03.1990,
      convertida na Lei nº 8.030, de 12.04.1990, não se aplica o IPC de março
      de 1990, de 84,32% (oitenta e quatro vírgula trinta e dois por cento),
      para a correção dos salários, porque o direito ainda não se havia
      incorporado ao patrimônio jurídico dos trabalhadores, inexistindo
      ofensa ao inciso XXXVI do art. 5º da CF/1988.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 7/1993, DJ 22, 27 e 29.09.1993 Nº 315 IPC de março/90 Lei nº 8.030/90 (Plano Collor) Inexistência de direito adquirido. A partir da vigência da Medida Provisória nº 154/90, con..."
    precedentes: 57
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST316:
    numero: 316
    titulo: "IPC DE JUNHO/1987. DECRETO-LEI Nº 2.335/1987 (PLANO BRESSER). EXISTÊNCIA DE DIREITO ADQUIRIDO."
    enunciado: >
      É devido o reajuste salarial decorrente da incidência do IPC de junho
      de 1987, correspondente a 26,06% (vinte e seis vírgula zero seis por
      cento), porque este direito já se havia incorporado ao patrimônio
      jurídico dos trabalhadores quando do advento do Decreto-Lei nº
      2.335/1987.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 37/1994, DJ 25, 28 e 29.11.1994 Redação original - Res. 8/1993, DJ 22, 27 e 29.09.1993"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST317:
    numero: 317
    titulo: "URP DE FEVEREIRO/1989. LEI Nº 7.730/1989 (PLANO VERÃO). EXISTÊNCIA DE DIREITO ADQUIRIDO."
    enunciado: >
      A correção salarial da URP de fevereiro de 1989, de 26,05% (vinte e
      seis vírgula zero cinco por cento), já constituía direito adquirido do
      trabalhador, quando do advento da Medida Provisória nº 32/1989,
      convertida na Lei nº 7.730/1989, sendo devido o reajuste respectivo.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 37/1994, DJ 25, 28 e 29.11.1994 Redação original - Res. 9/1993, DJ 22, 27 e 29.09.1993"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST318:
    numero: 318
    titulo: "DIÁRIAS. BASE DE CÁLCULO PARA SUA INTEGRAÇÃO NO SALÁRIO."
    enunciado: >
      Tratando-se de empregado mensalista, a integração das diárias no
      salário deve ser feita tomando-se por base o salário mensal por ele
      percebido e não o valor do dia de salário, somente sendo devida a
      referida integração quando o valor das diárias, no mês, for superior à
      metade do salário mensal.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 10/1993, DJ 29.11, e 01 e 03.12.1993 Nº 318 Diárias. Base de cálculo para sua integração ao salário Tratando-se de empregado mensalista, a integração das diárias ao salário dev..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST319:
    numero: 319
    titulo: "REAJUSTES SALARIAIS (\"GATILHOS\"). APLICAÇÃO AOS SERVIDORES PÚBLICOS CONTRATADOS SOB A ÉGIDE DA LEGISLAÇÃO TRABALHISTA."
    enunciado: >
      Aplicam-se aos servidores públicos, contratados sob o regime da CLT, os
      reajustes decorrentes da correção automática dos salários pelo
      mecanismo denominado "gatilho", de que tratam os Decretos-Leis nºs
      2.284, de 10.03.1986 e 2.302, de 21.11.1986.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 11/1993, DJ 29.11, 01 e 03.12.1993 Nº 319 Reajustes salariais (Gatilhos). Sua aplicação relativa aos servidores públicos contratados sob a égide da legislação trabalhista. Apli..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST320:
    numero: 320
    titulo: "HORAS \"IN ITINERE\". OBRIGATORIEDADE DE CÔMPUTO NA JORNADA DE TRABALHO."
    enunciado: >
      O fato de o empregador cobrar, parcialmente ou não, importância pelo
      transporte fornecido, para local de difícil acesso ou não servido por
      transporte regular, não afasta o direito à percepção das horas "in
      itinere".
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 12/1993, DJ 29.11, 01 e 03.12.1993 Nº 320 Horas \"in itinere\". Obrigatoriedade de seu cômputo na jornada de trabalho. O fato de o..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST321:
    numero: 321
    titulo: "DECISÃO ADMINISTRATIVA. RECURSO."
    enunciado: >
      Das decisões proferidas pelos Tribunais Regionais do Trabalho, em
      processo administrativo, cabe recurso para o Tribunal Superior do
      Trabalho tão-somente para o exame da legalidade do ato.
    status: cancelada
    publicacao: "2005-07-05"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original (revisão da Súmula nº 302) - Res. 13/1993, DJ 29.11, 01 e 03.12.1993 Nº 321 Decisão administrativa Recurso Revisão do Enunciado ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST322:
    numero: 322
    titulo: "DIFERENÇAS SALARIAIS. PLANOS ECONÔMICOS. LIMITE."
    enunciado: >
      Os reajustes salariais decorrentes dos chamados "gatilhos" e URPs,
      previstos legalmente como antecipação, são devidos tão-somente até a
      data-base de cada categoria.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1993, DJ 21, 28.12.1993 e 04.01.1994"
    precedentes: 2
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST323:
    numero: 323
    titulo: "URP DE ABRIL E MAIO DE 1988. DECRETO-LEI Nº 2.425/1988."
    enunciado: >
      A suspensão do pagamento das URPs de abril e maio de 1988, determinada
      pelo Decreto-Lei nº 2.425, de 07.04.1988, afronta direito adquirido dos
      trabalhadores e o princípio constitucional da isonomia.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 38/1994, DJ 25, 28 e 29.11.1994 Redação original - Res. 15/1993, DJ 21, 28.12.1993 e 04.01.1994"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST324:
    numero: 324
    titulo: "HORAS \"IN ITINERE\". ENUNCIADO Nº 90. INSUFICIÊNCIA DE TRANSPORTE PÚBLICO."
    enunciado: >
      A mera insuficiência de transporte público não enseja o pagamento de
      horas "in itinere".
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 16/1993, DJ 21, 28.12.1993 e 04.01.1994"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST325:
    numero: 325
    titulo: "HORAS \"IN ITINERE\". ENUNCIADO Nº 90. REMUNERAÇÃO EM RELAÇÃO A TRECHO NÃO SERVIDO POR TRANSPORTE PÚBLICO."
    enunciado: >
      Se houver transporte público regular, em parte do trajeto percorrido em
      condução da empresa, as horas "in itinere" remuneradas limitam-se ao
      trecho não alcançado pelo transporte público.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 17/1993, DJ 21, 28.12.1993 e 04.01.1994 Nº 325 Horas in itinere. Enunciado nº 90. Remuneração em relação a trecho não ser..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST326:
    numero: 326
    titulo: "COMPLEMENTAÇÃO DE APOSENTADORIA. PRESCRIÇÃO TOTAL."
    enunciado: >
      A pretensão à complementação de aposentadoria jamais recebida prescreve
      em 2 (dois) anos contados da cessação do contrato de trabalho.
    status: alterada
    publicacao: "2011-05-31"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 18/1993, DJ 21,28.12.1993 e 04.01.1994 Nº 326 Complementação dos proventos de aposentadoria. Parcela nunca recebida. Pres..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST327:
    numero: 327
    titulo: "COMPLEMENTAÇÃO DE APOSENTADORIA. DIFERENÇAS. PRESCRIÇÃO PARCIAL."
    enunciado: >
      A pretensão a diferenças de complementação de aposentadoria sujeita-se
      à prescrição parcial e quinquenal, salvo se o pretenso direito decorrer
      de verbas não recebidas no curso da relação de emprego e já alcançadas
      pela prescrição, à época da propositura da ação.
    status: alterada
    publicacao: "2011-05-31"
    historico: "Nova redação - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 327 Complementação dos proventos de aposentadoria. Diferença. Prescrição parcial Tratando-se de pedido de diferença de complementação de aposent..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST328:
    numero: 328
    titulo: "FÉRIAS. TERÇO CONSTITUCIONAL."
    enunciado: >
      O pagamento das férias, integrais ou proporcionais, gozadas ou não, na
      vigência da CF/1988, sujeita-se ao acréscimo do terço previsto no
      respectivo art. 7º, XVII.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 20/1993, DJ 21, 28.12.1993 e 04.01.1994 Nº 328 Férias - Terço constitucional. O pagamento das férias, integrais ou proporcionais, gozadas ou não, na vigência da Constituição da..."
    precedentes: 34
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST329:
    numero: 329
    titulo: "HONORÁRIOS ADVOCATÍCIOS. ART. 133 DA CF/1988."
    enunciado: >
      Mesmo após a promulgação da CF/1988, permanece válido o entendimento
      consubstanciado na Súmula nº 219 do Tribunal Superior do Trabalho.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 21/1993, DJ 21, 28.12.1993 e 04.01.1994 Nº 329 Honorários advocatícios. Art. 133 da Constituição da República de 1988 Mesmo após..."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST330:
    numero: 330
    titulo: "QUITAÇÃO. VALIDADE."
    enunciado: >
      A quitação passada pelo empregado, com assistência de entidade sindical
      de sua categoria, ao empregador, com observância dos requisitos
      exigidos nos parágrafos do art. 477 da CLT, tem eficácia liberatória em
      relação às parcelas expressamente consignadas no recibo, salvo se
      oposta ressalva expressa e especificada ao valor dado à parcela ou
      parcelas impugnadas. I - A quitação não abrange parcelas não
      consignadas no recibo de quitação e, conseqüentemente, seus reflexos em
      outras parcelas, ainda que estas constem desse recibo. II - Quanto a
      direitos que deveriam ter sido satisfeitos durante a vigência do
      contrato de trabalho, a quitação é válida em relação ao período
      expressamente consignado no recibo de quitação.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Súmula alterada - Res. 108/2001, DJ 18, 19 e 20.04.2001 Súmula mantida e republicada com explicitação - RA nº 4/1994, DJ 18, 28.02.1994 e 02.03.1994 Nº 330 Quitação. Validade. Revisão da Súmula nº 41 ..."
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST331:
    numero: 331
    titulo: "CONTRATO DE PRESTAÇÃO DE SERVIÇOS. LEGALIDADE."
    enunciado: >
      I - A contratação de trabalhadores por empresa interposta é ilegal,
      formando-se o vínculo diretamente com o tomador dos serviços, salvo no
      caso de trabalho temporário (Lei nº 6.019, de 03.01.1974). (item I
      cancelado por perda de eficácia a partir de 11.11.2017, pela Lei
      13.467/2017. Res. 225/2025, DEJT divulgado em 30.06, 01 e 02.07.2025)
      II - A contratação irregular de trabalhador, mediante empresa
      interposta, não gera vínculo de emprego com os órgãos da Administração
      Pública direta, indireta ou fundacional (art. 37, II, da CF/1988). III
      - Não forma vínculo de emprego com o tomador a contratação de serviços
      de vigilância (Lei nº 7.102, de 20.06.1983) e de conservação e limpeza,
      bem como a de serviços especializados ligados à atividade-meio do
      tomador, desde que inexistente a pessoalidade e a subordinação direta.
      IV - O inadimplemento das obrigações trabalhistas, por parte do
      empregador, implica a responsabilidade subsidiária do tomador dos
      serviços quanto àquelas obrigações, desde que haja participado da
      relação processual e conste também do título executivo judicial. V - Os
      entes integrantes da Administração Pública direta e indireta respondem
      subsidiariamente, nas mesmas condições do item IV, caso evidenciada a
      sua conduta culposa no cumprimento das obrigações da Lei n.º 8.666, de
      21.06.1993, especialmente na fiscalização do cumprimento das obrigações
      contratuais e legais da prestadora de serviço como empregadora. A
      aludida responsabilidade não decorre de mero inadimplemento das
      obrigações trabalhistas assumidas pela empresa regularmente contratada.
      VI - A responsabilidade subsidiária do tomador de serviços abrange
      todas as verbas decorrentes da condenação referentes ao período da
      prestação laboral.
    status: alterada
    publicacao: "2025-07-02"
    historico: "Nova redação do item IV e inseridos os itens V e VI à redação - Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011 Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Súmula alterada (inciso IV) ..."
    precedentes: 65
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST332:
    numero: 332
    titulo: "COMPLEMENTAÇÃO DE APOSENTADORIA. PETROBRAS. MANUAL DE PESSOAL. NORMA PROGRAMÁTICA."
    enunciado: >
      As normas relativas à complementação de aposentadoria, inseridas no
      Manual de Pessoal da Petrobras, têm caráter meramente programático,
      delas não resultando direito à referida complementação.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Súmula mantida Res. 50/1995 DJ 21, 22 e 25.09.1995 Redação original - Res. 24/1994, DJ 12, 16 e 18.05.1994"
    precedentes: 13
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST333:
    numero: 333
    titulo: "RECURSOS DE REVISTA. CONHECIMENTO."
    enunciado: >
      Não ensejam recurso de revista decisões superadas por iterativa,
      notória e atual jurisprudência do Tribunal Superior do Trabalho.
    status: alterada
    publicacao: "2009-03-02"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Súmula alterada - Res. 99/2000, DJ 18, 19 e 20.09.2000 Nº 333 Recursos de Revista e de Embargos. Conhecimento Não ensejam recursos de revista ou ..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST334:
    numero: 334
    titulo: "COMPETÊNCIA. AÇÃO DE CUMPRIMENTO. SINDICATO. DESCONTO ASSISTENCIAL."
    enunciado: >
      A Justiça do Trabalho é incompetente para julgar ação na qual o
      sindicato, em nome próprio, pleiteia o recolhimento de desconto
      assistencial previsto em convenção ou acordo coletivos.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 59/1996, DJ 28.06.1996, 03, 04 e 05.07.1996 Redação original (revisão da Súmula nº 224) - Res. 26/1994, DJ 12, 17 e 19.05.1994"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST335:
    numero: 335
    titulo: "EMBARGOS PARA A SEÇÃO ESPECIALIZADA EM DISSÍDIOS INDIVIDUAIS CONTRA DECISÃO EM AGRAVO DE INSTRUMENTO OPOSTO A DESPACHO DENEGATÓRIO DE RECURSO DE REVISTA."
    enunciado: >
      São incabíveis embargos para a Seção Especializada em Dissídios
      Individuais contra decisão proferida em agravo de instrumento oposto a
      despacho denegatório de recurso de revista, salvo quando a controvérsia
      se referir a pressupostos extrínsecos do próprio agravo.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 353 - Res. 70/1997, DJ 30.05.1997 e 04, 05 e 06.06.1997 Redação original (revisão da Súmula nº 183) - Res. 27/1994, DJ 12, 17 e 19.05.1994"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST336:
    numero: 336
    titulo: "CONSTITUCIONALIDADE. § 2º DO ART. 9º DO DECRETO-LEI Nº 1.971, DE 30.11.1982."
    enunciado: >
      É constitucional o § 2º do art. 9º do Decreto-Lei nº 1.971, de
      30.11.1982, com a redação dada pelo Decreto-Lei nº 2.100, de
      28.12.1983.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 34/1994, DJ 10, 13 e 14.10.1994"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST337:
    numero: 337
    titulo: "COMPROVAÇÃO DE DIVERGÊNCIA JURISPRUDENCIAL. RECURSOS DE REVISTA E DE EMBARGOS."
    enunciado: >
      I - Para comprovação da divergência justificadora do recurso, é
      necessário que o recorrente: a) Junte certidão ou cópia autenticada do
      acórdão paradigma ou cite a fonte oficial ou o repositório autorizado
      em que foi publicado; e b) Transcreva, nas razões recursais, as ementas
      e/ou trechos dos acórdãos trazidos à configuração do dissídio,
      demonstrando o conflito de teses que justifique o conhecimento do
      recurso, ainda que os acórdãos já se encontrem nos autos ou venham a
      ser juntados com o recurso. II - A concessão de registro de publicação
      como repositório autorizado de jurisprudência do TST torna válidas
      todas as suas edições anteriores. III - A mera indicação da data de
      publicação, em fonte oficial, de aresto paradigma é inválida para
      comprovação de divergência jurisprudencial, nos termos do item I, ¿a¿,
      desta súmula, quando a parte pretende demonstrar o conflito de teses
      mediante a transcrição de trechos que integram a fundamentação do
      acórdão divergente, uma vez que só se publicam o dispositivo e a ementa
      dos acórdãos; IV - É válida para a comprovação da divergência
      jurisprudencial justificadora do recurso a indicação de aresto extraído
      de repositório oficial na internet, desde que o recorrente: a)
      transcreva o trecho divergente; b) aponte o sítio de onde foi extraído;
      e c) decline o número do processo, o órgão prolator do acórdão e a data
      da respectiva publicação no Diário Eletrônico da Justiça do Trabalho. V
      - A existência do código de autenticidade na cópia, em formato pdf, do
      inteiro teor do aresto paradigma, juntada aos autos, torna-a
      equivalente ao documento original e também supre a ausência de
      indicação da fonte oficial de publicação.
    status: alterada
    publicacao: "2017-09-25"
    historico: "Súmula alterada - (redação do item IV alterada na sessão do Tribunal Pleno realizada em 14.09.2012) - Res. 185/2012, DEJT divulgado em 25, 26 e 27.09.2012 Súmula alterada - (redação alterada pelo Trib..."
    precedentes: 44
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST338:
    numero: 338
    titulo: "JORNADA DE TRABALHO. REGISTRO. ÔNUS DA PROVA."
    enunciado: >
      I - É ônus do empregador que conta com mais de 10 (dez) empregados o
      registro da jornada de trabalho na forma do art. 74, § 2º, da CLT. A
      não-apresentação injustificada dos controles de freqüência gera
      presunção relativa de veracidade da jornada de trabalho, a qual pode
      ser elidida por prova em contrário. (ex-Súmula nº 338 alterada pela
      Res. 121/2003, DJ 21.11.2003) II - A presunção de veracidade da jornada
      de trabalho, ainda que prevista em instrumento normativo, pode ser
      elidida por prova em contrário. (ex-OJ nº 234 da SBDI-1 - inserida em
      20.06.2001) III - Os cartões de ponto que demonstram horários de
      entrada e saída uniformes são inválidos como meio de prova,
      invertendo-se o ônus da prova, relativo às horas extras, que passa a
      ser do empregador, prevalecendo a jornada da inicial se dele não se
      desincumbir. (ex-OJ nº 306 da SBDI-1- DJ 11.08.2003)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 338 Jornada. Registro. Ônus da prova É ônus do empregador que conta com mais de 10 (dez) empregados o registro da jornada de trabalho na form..."
    precedentes: 16
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST339:
    numero: 339
    titulo: "CIPA. SUPLENTE. GARANTIA DE EMPREGO. CF/1988."
    enunciado: >
      I - O suplente da CIPA goza da garantia de emprego prevista no art. 10,
      II, "a", do ADCT a partir da promulgação da Constituição Federal de
      1988. (ex-Súmula nº 339 - Res. 39/1994, DJ 22.12.1994 - e ex-OJ nº 25
      da SBDI-1 - inserida em 29.03.1996). - Entendimento do intem I
      reafirmado no IRR nº 284. II - A estabilidade provisória do cipeiro não
      constitui vantagem pessoal, mas garantia para as atividades dos membros
      da CIPA, que somente tem razão de ser quando em atividade a empresa.
      Extinto o estabelecimento, não se verifica a despedida arbitrária,
      sendo impossível a reintegração e indevida a indenização do período
      estabilitário. (ex-OJ nº 329 da SBDI-1 - DJ 09.12.2003). - Entendimento
      do item II reafirmado no IRR nº 281.
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 39/1994, DJ 20, 21 e 22.12.1994 Nº 339 CIPA. Suplente. Garantia de emprego. CF/88. O suplente da CIPA goza da garantia de..."
    precedentes: 16
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST340:
    numero: 340
    titulo: "COMISSIONISTA. HORAS EXTRAS."
    enunciado: >
      O empregado, sujeito a controle de horário, remunerado à base de
      comissões, tem direito ao adicional de, no mínimo, 50% (cinqüenta por
      cento) pelo trabalho em horas extras, calculado sobre o valor-hora das
      comissões recebidas no mês, considerando-se como divisor o número de
      horas efetivamente trabalhadas.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original (revisão da Súmula nº 56) - Res. 40/1995, DJ 17, 20 e 21.02.1995 Nº 340 Comissionista. Horas extras. Revisão do Enunciado nº 56 O empregado, sujeito a controle de horário, remunerado ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST341:
    numero: 341
    titulo: "HONORÁRIOS DO ASSISTENTE TÉCNICO."
    enunciado: >
      A indicação do perito assistente é faculdade da parte, a qual deve
      responder pelos respectivos honorários, ainda que vencedora no objeto
      da perícia.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 44/1995, DJ 22, 23 e 24.03.1995"
    precedentes: 19
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST342:
    numero: 342
    titulo: "DESCONTOS SALARIAIS. ART. 462 DA CLT."
    enunciado: >
      Descontos salariais efetuados pelo empregador, com a autorização prévia
      e por escrito do empregado, para ser integrado em planos de assistência
      odontológica, médico-hospitalar, de seguro, de previdência privada, ou
      de entidade cooperativa, cultural ou recreativo-associativa de seus
      trabalhadores, em seu benefício e de seus dependentes, não afrontam o
      disposto no art. 462 da CLT, salvo se ficar demonstrada a existência de
      coação ou de outro defeito que vicie o ato jurídico.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 47/1995, DJ 20, 24 e 25.04.1995 Nº 342 Descontos salariais Art. 462, CLT. Descontos salariais efetuados pelo empregador, com a autorização prévia e por escrito do empregado, pa..."
    precedentes: 16
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST343:
    numero: 343
    titulo: "BANCÁRIO. HORA DE SALÁRIO."
    enunciado: >
      O bancário sujeito à jornada de 8 (oito) horas (art. 224, § 2º, da
      CLT), após a CF/1988, tem salário-hora calculado com base no divisor
      220 (duzentos e vinte), não mais 240 (duzentos e quarenta).
    status: cancelada
    publicacao: "2012-09-27"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original (revisão da Súmula nº 267) - Res. 48/1995, DJ 30, 31.08 e 01.09.1995 Nº 343 Bancário. Salário hora. Divisor. Revisão do Enunciad..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST344:
    numero: 344
    titulo: "SALÁRIO-FAMÍLIA. TRABALHADOR RURAL."
    enunciado: >
      O salário-família é devido aos trabalhadores rurais somente após a
      vigência da Lei nº 8.213, de 24.07.1991.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original (revisão da Súmula nº 227) - Res. 51/1995, DJ 21, 22 e 25.09.1995"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST345:
    numero: 345
    titulo: "BANDEPE. REGULAMENTO INTERNO DE PESSOAL NÃO CONFERE ESTABILIDADE AOS EMPREGADOS."
    enunciado: >
      O Regulamento Interno de Pessoal (RIP) do Banco do Estado de Pernambuco
      - BANDEPE, na parte que trata de seu regime disciplinar, não confere
      estabilidade aos seus empregados.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 54/1996, DJ 19, 22 e 23.04.1996 - Republicada DJ 09, 10 e 13.05.1996 Nº 345 Bandepe Regulamento interno de pessoal não confere estabilidade aos empregados. O Regulamento Intern..."
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST346:
    numero: 346
    titulo: "DIGITADOR. INTERVALOS INTRAJORNADA. APLICAÇÃO ANALÓGICA DO ART. 72 DA CLT."
    enunciado: >
      Os digitadores, por aplicação analógica do art. 72 da CLT, equiparam-se
      aos trabalhadores nos serviços de mecanografia (datilografia,
      escrituração ou cálculo), razão pela qual têm direito a intervalos de
      descanso de 10 (dez) minutos a cada 90 (noventa) de trabalho
      consecutivo.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 56/1996, DJ 28.06, 03, 04 e 05.07.1996 Nº 346 Digitador. Intervalos intrajornada. Aplicação analógica do art. 72, CLT. Os digitadores, por aplicação analógica do art. 72 da CLT..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST347:
    numero: 347
    titulo: "HORAS EXTRAS HABITUAIS. APURAÇÃO. MÉDIA FÍSICA."
    enunciado: >
      O cálculo do valor das horas extras habituais, para efeito de reflexos
      em verbas trabalhistas, observará o número de horas efetivamente
      prestadas e a ele aplica-se o valor do salário-hora da época do
      pagamento daquelas verbas.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 57/1996, DJ 28.06, 03, 04 e 05.07.1996 Nº 347 Horas extras habituais. Apuração. Média. O cálculo do valor das horas extras habituais, para efeito de reflexos em verbas trabalhi..."
    precedentes: 11
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST348:
    numero: 348
    titulo: "AVISO PRÉVIO. CONCESSÃO NA FLUÊNCIA DA GARANTIA DE EMPREGO. INVALIDADE."
    enunciado: >
      É inválida a concessão do aviso prévio na fluência da garantia de
      emprego, ante a incompatibilidade dos dois institutos.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 58/1996, DJ 28.06, 03, 04 e 05.07.1996"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST349:
    numero: 349
    titulo: "ACORDO DE COMPENSAÇÃO DE HORÁRIO EM ATIVIDADE INSALUBRE, CELEBRADO POR ACORDO COLETIVO. VALIDADE."
    enunciado: >
      A validade de acordo coletivo ou convenção coletiva de compensação de
      jornada de trabalho em atividade insalubre prescinde da inspeção prévia
      da autoridade competente em matéria de higiene do trabalho (art. 7º,
      XIII, da CF/1988; art. 60 da CLT).
    status: cancelada
    publicacao: "2011-05-31"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 60/1996, DJ 08, 09 e 10.07.1996 Nº 349 Acordo de compensação de horário em atividade insalubre, celebrado por acordo cole..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST350:
    numero: 350
    titulo: "PRESCRIÇÃO. TERMO INICIAL. AÇÃO DE CUMPRIMENTO. SENTENÇA NORMATIVA."
    enunciado: >
      O prazo de prescrição com relação à ação de cumprimento de decisão
      normativa flui apenas da data de seu trânsito em julgado.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 62/1996, DJ 04, 09 e 10 e 11.10.1996"
    precedentes: 15
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST351:
    numero: 351
    titulo: "PROFESSOR. REPOUSO SEMANAL REMUNERADO. ART. 7º, § 2º, DA LEI Nº 605, DE 05.01.1949 E ART. 320 DA CLT."
    enunciado: >
      O professor que recebe salário mensal à base de hora-aula tem direito
      ao acréscimo de 1/6 a título de repouso semanal remunerado,
      considerando-se para esse fim o mês de quatro semanas e meia.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 68/1997, DJ 30.05, 04, 05 e 06.06.1997 Nº 351 Professor. Repouso semanal remunerado. Lei nº 605/1949, art. 7º, § 2º, e art. 320 da CLT."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST352:
    numero: 352
    titulo: "CUSTAS - PRAZO PARA COMPROVAÇÃO."
    enunciado: >
      O prazo para comprovação do pagamento das custas, sempre a cargo da
      parte, é de 5 (cinco) dias contados do seu recolhimento (CLT art. 789,
      § 4º - CPC, art. 185).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 114/2002, DJ 28.11.2002 Redação original - Res. 69/1997, DJ 30.05, 04, 05 e 06.06.1997"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST353:
    numero: 353
    titulo: "EMBARGOS. AGRAVO. CABIMENTO."
    enunciado: >
      Não cabem embargos para a Seção de Dissídios Individuais de decisão de
      Turma proferida em agravo, salvo: a) da decisão que não conhece de
      agravo de instrumento ou de agravo pela ausência de pressupostos
      extrínsecos; b) da decisão que nega provimento a agravo contra decisão
      monocrática do Relator, em que se proclamou a ausência de pressupostos
      extrínsecos de agravo de instrumento; c) para revisão dos pressupostos
      extrínsecos de admissibilidade do recurso de revista, cuja ausência
      haja sido declarada originariamente pela Turma no julgamento do agravo;
      d) para impugnar o conhecimento de agravo de instrumento; e) para
      impugnar a imposição de multas previstas nos arts. 1.021, § 4º, do CPC
      de 2015 ou 1.026, § 2º, do CPC de 2015 (art. 538, parágrafo único, do
      CPC de 1973, ou art. 557, § 2º, do CPC de 1973). f) contra decisão de
      Turma proferida em agravo em recurso de revista, nos termos do art.
      894, II, da CLT.
    status: alterada
    publicacao: "2016-04-26"
    historico: "Súmula alterada - Res. 189/2013, DEJT divulgado em 13, 14 e 15.03.2013 Nº 353. Embargos. Agravo. Cabimento (nova redação da letra \"f\" em decorrência do julgamento do processo TST-IUJ-28000-95.2007.5.0..."
    precedentes: 2
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST354:
    numero: 354
    titulo: "GORJETAS. NATUREZA JURÍDICA. REPERCUSSÕES."
    enunciado: >
      As gorjetas, cobradas pelo empregador na nota de serviço ou oferecidas
      espontaneamente pelos clientes, integram a remuneração do empregado,
      não servindo de base de cálculo para as parcelas de aviso-prévio,
      adicional noturno, horas extras e repouso semanal remunerado.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original (revisão da Súmula nº 290) - Res. 71/1997, DJ 30.05, 04.05 e 06.06.1997"
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST355:
    numero: 355
    titulo: "CONAB. ESTABILIDADE. AVISO DIREH Nº 2 DE 12.12.1984."
    enunciado: >
      O aviso DIREH nº 2, de 12.12.1984, que concedia estabilidade aos
      empregados da CONAB, não tem eficácia, porque não aprovado pelo
      Ministério ao qual a empresa se subordina.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 72/1997, DJ 03, 08, 09 e 10.07.1997"
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST356:
    numero: 356
    titulo: "ALÇADA RECURSAL. VINCULAÇÃO AO SALÁRIO MÍNIMO."
    enunciado: >
      O art. 2º, § 4º, da Lei nº 5.584, de 26.06.1970, foi recepcionado pela
      CF/1988, sendo lícita a fixação do valor da alçada com base no salário
      mínimo.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 75/1997, DJ 19, 22 e 23.12.1997 Nº 356 Alçada recursal. Vinculação ao salário mínimo. O art. 2º, § 4º, da Lei nº 5.584/70 foi recepcionado pela Constituição da República de 198..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST357:
    numero: 357
    titulo: "TESTEMUNHA. AÇÃO CONTRA A MESMA RECLAMADA. SUSPEIÇÃO."
    enunciado: >
      Não torna suspeita a testemunha o simples fato de estar litigando ou de
      ter litigado contra o mesmo empregador.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 76/1997, DJ 19, 22 e 23.12.1997"
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST358:
    numero: 358
    titulo: "RADIOLOGISTA. SALÁRIO PROFISSIONAL. LEI Nº 7.394, DE 29.10.1985."
    enunciado: >
      O salário profissional dos técnicos em radiologia é igual a 2 (dois)
      salários mínimos e não a 4 (quatro).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 77/1997, DJ 19,22 e 23.12.1997 Nº 358 Radiologista. Salário profissional. Lei nº 7394/85. O salário profissional dos técnicos em radiologia é igual a dois salários mínimos e nã..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST359:
    numero: 359
    titulo: "SUBSTITUIÇÃO PROCESSUAL. AÇÃO DE CUMPRIMENTO. ART. 872, PARÁGRAFO ÚNICO, DA CLT. FEDERAÇÃO. LEGITIMIDADE."
    enunciado: >
      A federação não tem legitimidade para ajuizar a ação de cumprimento
      prevista no art. 872, parágrafo único, da CLT na qualidade de
      substituto processual da categoria profissional inorganizada.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 78/1997, DJ 19, 22 e 23.12.1997"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST360:
    numero: 360
    titulo: "TURNOS ININTERRUPTOS DE REVEZAMENTO. INTERVALOS INTRAJORNADA E SEMANAL."
    enunciado: >
      A interrupção do trabalho destinada a repouso e alimentação, dentro de
      cada turno, ou o intervalo para repouso semanal, não descaracteriza o
      turno de revezamento com jornada de 6 (seis) horas previsto no art. 7º,
      XIV, da CF/1988.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 79/1997, DJ 13, 14 e 15.01.1998 Nº 360 Turnos ininterruptos de revezamento. Intervalos intrajornada e semanal. A interrupção do trabalho destinada a repouso e alimentação, dent..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST361:
    numero: 361
    titulo: "ADICIONAL DE PERICULOSIDADE. ELETRICITÁRIOS. EXPOSIÇÃO INTERMITENTE."
    enunciado: >
      O trabalho exercido em condições perigosas, embora de forma
      intermitente, dá direito ao empregado a receber o adicional de
      periculosidade de forma integral, porque a Lei nº 7.369, de 20.09.1985,
      não estabeleceu nenhuma proporcionalidade em relação ao seu pagamento.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 83/1998, DJ 20, 21 e 24.08.1998"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST362:
    numero: 362
    titulo: "FGTS. PRESCRIÇÃO."
    enunciado: >
      I Para os casos em que a ciência da lesão ocorreu a partir de
      13.11.2014, é quinquenal a prescrição do direito de reclamar contra o
      não-recolhimento de contribuição para o FGTS, observado o prazo de dois
      anos após o término do contrato; II Para os casos em que o prazo
      prescricional já estava em curso em 13.11.2014, aplica-se o prazo
      prescricional que se consumar primeiro: trinta anos, contados do termo
      inicial, ou cinco anos, a partir de 13.11.2014 (STF-ARE-709212/DF).
    status: alterada
    publicacao: "2015-06-16"
    historico: "Nova redação Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 362 FGTS Prescrição É trintenária a prescrição do direito de reclamar contra o não-recolhimento da contribuição para o FGTS, observado o prazo de ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST363:
    numero: 363
    titulo: "CONTRATO NULO. EFEITOS."
    enunciado: >
      A contratação de servidor público, após a CF/1988, sem prévia aprovação
      em concurso público, encontra óbice no respectivo art. 37, II e § 2º,
      somente lhe conferindo direito ao pagamento da contraprestação
      pactuada, em relação ao número de horas trabalhadas, respeitado o valor
      da hora do salário mínimo, e dos valores referentes aos depósitos do
      FGTS.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Súmula alterada - Res. 111/2002, DJ 11, 12 e 15.04.2002 Nº 363 Contrato nulo. Efeitos. A contratação de servidor público, após a Constituição de 1988, sem prévia aprovação em concurso público, encontr..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST364:
    numero: 364
    titulo: "ADICIONAL DE PERICULOSIDADE. EXPOSIÇÃO EVENTUAL, PERMANENTE E INTERMITENTE."
    enunciado: >
      I - Tem direito ao adicional de periculosidade o empregado exposto
      permanentemente ou que, de forma intermitente, sujeita-se a condições
      de risco. Indevido, apenas, quando o contato dá-se de forma eventual,
      assim considerado o fortuito, ou o que, sendo habitual, dá-se por tempo
      extremamente reduzido. (ex-Ojs da SBDI-1 nºs 05 - inserida em
      14.03.1994 - e 280 - DJ 11.08.2003) II - Não é válida a cláusula de
      acordo ou convenção coletiva de trabalho fixando o adicional de
      periculosidade em percentual inferior ao estabelecido em lei e
      proporcional ao tempo de exposição ao risco, pois tal parcela constitui
      medida de higiene, saúde e segurança do trabalho, garantida por norma
      de ordem pública (arts. 7º, XXII e XXIII, da CF e 193, §1º, da CLT).
    status: alterada
    publicacao: "2016-06-03T03:00:00-03"
    historico: "Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011 - cancelado o item II e dada nova redação ao item I Redação original - Res. 129/2005, DJ 20, 22 e 25.04.2005 Nº 364 Adicional de periculosidade. Ex..."
    precedentes: 38
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST365:
    numero: 365
    titulo: "ALÇADA. AÇÃO RESCISÓRIA E MANDADO DE SEGURANÇA."
    enunciado: >
      Não se aplica a alçada em ação rescisória e em mandado de segurança.
      (ex-OJs nºs 8 e 10 da SBDI-1 - inseridas em 01.02.1995)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST366:
    numero: 366
    titulo: "CARTÃO DE PONTO. REGISTRO. HORAS EXTRAS. MINUTOS QUE ANTECEDEM E SUCEDEM A JORNADA DE TRABALHO."
    enunciado: >
      Não serão descontadas nem computadas como jornada extraordinária as
      variações de horário do registro de ponto não excedentes de cinco
      minutos, observado o limite máximo de dez minutos diários. Se
      ultrapassado esse limite, será considerada como extra a totalidade do
      tempo que exceder a jornada normal, pois configurado tempo à disposição
      do empregador, não importando as atividades desenvolvidas pelo
      empregado ao longo do tempo residual (troca de uniforme, lanche,
      higiene pessoal, etc).
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Nova redação - Res. 197/2015, DEJT divulgado em 14, 15 e 18.05.2015 Redação original - Res. 129/2005, DJ 20, 22 e 25.04.2005 Nº 366 - CARTÃO DE PONTO. REGISTRO. HORAS EXTRAS. MINUTOS QUE ANTECE-DEM E ..."
    precedentes: 20
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST367:
    numero: 367
    titulo: "UTILIDADES \"IN NATURA\". HABITAÇÃO. ENERGIA ELÉTRICA. VEÍCULO. CIGARRO. NÃO INTEGRAÇÃO AO SALÁRIO."
    enunciado: >
      I - A habitação, a energia elétrica e veículo fornecidos pelo
      empregador ao empregado, quando indispensáveis para a realização do
      trabalho, não têm natureza salarial, ainda que, no caso de veículo,
      seja ele utilizado pelo empregado também em atividades particulares.
      (ex-Ojs da SBDI-1 nºs 131 - inserida em 20.04.1998 e ratificada pelo
      Tribunal Pleno em 07.12.2000 - e 246 - inserida em 20.06.2001) II - O
      cigarro não se considera salário utilidade em face de sua nocividade à
      saúde. (ex-OJ nº 24 da SBDI-1 - inserida em 29.03.1996)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 15
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST368:
    numero: 368
    titulo: "DESCONTOS PREVIDENCIÁRIOS. IMPOSTO DE RENDA. COMPETÊNCIA. RESPONSABILIDADE PELO RECOLHIMENTO. FORMA DE CÁLCULO. FATO GERADOR."
    enunciado: >
      I - A Justiça do Trabalho é competente para determinar o recolhimento
      das contribuições fiscais. A competência da Justiça do Trabalho, quanto
      à execução das contribuições previdenciárias, limita-se às sentenças
      condenatórias em pecúnia que proferir e aos valores, objeto de acordo
      homologado, que integrem o salário de contribuição. (ex-OJ nº 141 da
      SBDI-1 - inserida em 27.11.1998). II - É do empregador a
      responsabilidade pelo recolhimento das contribuições previdenciárias e
      fiscais, resultantes de crédito do empregado oriundo de condenação
      judicial. A culpa do empregador pelo inadimplemento das verbas
      remuneratórias, contudo, não exime a responsabilidade do empregado
      pelos pagamentos do imposto de renda devido e da contribuição
      previdenciária que recaia sobre sua quota-parte. (ex-OJ nº 363 da
      SBDI-1, parte final) III - Os descontos previdenciários relativos à
      contribuição do empregado, no caso de ações trabalhistas, devem ser
      calculados mês a mês, de conformidade com o art. 276, § 4º, do Decreto
      n º 3.048/1999 que regulamentou a Lei nº 8.212/1991, aplicando-se as
      alíquotas previstas no art. 198, observado o limite máximo do salário
      de contribuição (ex-OJs nºs 32 e 228 da SBDI-1 inseridas,
      respectivamente, em 14.03.1994 e 20.06.2001). IV - Considera-se fato
      gerador das contribuições previdenciárias decorrentes de créditos
      trabalhistas reconhecidos ou homologados em juízo, para os serviços
      prestados até 4.3.2009, inclusive, o efetivo pagamento das verbas,
      configurando-se a mora a partir do dia dois do mês seguinte ao da
      liquidação (art. 276, ¿caput¿, do Decreto nº 3.048/1999). Eficácia não
      retroativa da alteração legislativa promovida pela Medida Provisória nº
      449/2008, posteriormente convertida na Lei nº 11.941/2009, que deu nova
      redação ao art. 43 da Lei nº 8.212/91. V - Para o labor realizado a
      partir de 5.3.2009, considera-se fato gerador das contribuições
      previdenciárias decorrentes de créditos trabalhistas reconhecidos ou
      homologados em juízo a data da efetiva prestação dos serviços. Sobre as
      contribuições previdenciárias não recolhidas a partir da prestação dos
      serviços incidem juros de mora e, uma vez apurados os créditos
      previdenciários, aplica-se multa a partir do exaurimento do prazo de
      citação para pagamento, se descumprida a obrigação, observado o limite
      legal de 20% (art. 61, § 2º, da Lei nº 9.430/96). VI - O imposto de
      renda decorrente de crédito do empregado recebido acumuladamente deve
      ser calculado sobre o montante dos rendimentos pagos, mediante a
      utilização de tabela progressiva resultante da multiplicação da
      quantidade de meses a que se refiram os rendimentos pelos valores
      constantes da tabela progressiva mensal correspondente ao mês do
      recebimento ou crédito, nos termos do art. 12-A da Lei nº 7.713, de
      22/12/1988, com a redação conferida pela Lei nº 13.149/2015, observado
      o procedimento previsto nas Instruções Normativas da Receita Federal do
      Brasil.
    status: alterada
    publicacao: "2017-07-14"
    historico: "Res. 219/2017, DEJT divulgado em 28, 29 e 30.06.2017 Nº 368 (...) V - Para o labor realizado a partir de 5.3.2009, considera-se fato gerador das contribuições previdenciárias decorrentes de créditos t..."
    precedentes: 24
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST369:
    numero: 369
    titulo: "DIRIGENTE SINDICAL. ESTABILIDADE PROVISÓRIA."
    enunciado: >
      I - É assegurada a estabilidade provisória ao empregado dirigente
      sindical, ainda que a comunicação do registro da candidatura ou da
      eleição e da posse seja realizada fora do prazo previsto no art. 543, §
      5º, da CLT, desde que a ciência ao empregador, por qualquer meio,
      ocorra na vigência do contrato de trabalho. II - O art. 522 da CLT foi
      recepcionado pela Constituição Federal de 1988. Fica limitada, assim, a
      estabilidade a que alude o art. 543, § 3.º, da CLT a sete dirigentes
      sindicais e igual número de suplentes. III - O empregado de categoria
      diferenciada eleito dirigente sindical só goza de estabilidade se
      exercer na empresa atividade pertinente à categoria profissional do
      sindicato para o qual foi eleito dirigente. IV - Havendo extinção da
      atividade empresarial no âmbito da base territorial do sindicato, não
      há razão para subsistir a estabilidade. V - O registro da candidatura
      do empregado a cargo de dirigente sindical durante o período de aviso
      prévio, ainda que indenizado, não lhe assegura a estabilidade, visto
      que inaplicável a regra do § 3º do art. 543 da Consolidação das Leis do
      Trabalho.
    status: alterada
    publicacao: "2012-09-27"
    historico: "Nova redação dada ao item II - Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011 Item I alterado - É indispensável a comunicação, pela entidade sindical, ao empregador, na forma do § 5º do art. 543..."
    precedentes: 46
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST370:
    numero: 370
    titulo: "MÉDICO E ENGENHEIRO. JORNADA DE TRABALHO. LEIS NºS 3.999/1961 E 4.950-A/1966."
    enunciado: >
      Tendo em vista que as Leis nº 3.999/1961 e 4.950-A/1966 não estipulam a
      jornada reduzida, mas apenas estabelecem o salário mínimo da categoria
      para uma jornada de 4 horas para os médicos e de 6 horas para os
      engenheiros, não há que se falar em horas extras, salvo as excedentes à
      oitava, desde que seja respeitado o salário mínimo/horário das
      categorias. (ex-OJs nºs 39 e 53 da SBDI-1 inseridas, respectivamente,
      em 07.11.1994 e 29.04.199
    status: vigente
    publicacao: "2005-04-25"
    historico: "Ex-OJs nºs 39 e 53 da SBDI-I - inseridas, respectivamente, em 07.11.1994 e 29.04.1994."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST371:
    numero: 371
    titulo: "AVISO PRÉVIO INDENIZADO. EFEITOS. SUPERVENIÊNCIA DE AUXÍLIO-DOENÇA NO CURSO DESTE."
    enunciado: >
      A projeção do contrato de trabalho para o futuro, pela concessão do
      aviso prévio indenizado, tem efeitos limitados às vantagens econômicas
      obtidas no período de pré-aviso, ou seja, salários, reflexos e verbas
      rescisórias. No caso de concessão de auxílio-doença no curso do aviso
      prévio, todavia, só se concretizam os efeitos da dispensa depois de
      expirado o benefício previdenciário. (ex-OJs nºs 40 e 135 da SBDI-1
      inseridas, respectivamente, em 28.11.1995 e 27.11.1998)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST372:
    numero: 372
    titulo: "GRATIFICAÇÃO DE FUNÇÃO. SUPRESSÃO OU REDUÇÃO. LIMITES."
    enunciado: >
      I - Percebida a gratificação de função por dez ou mais anos pelo
      empregado, se o empregador, sem justo motivo, revertê-lo a seu cargo
      efetivo, não poderá retirar-lhe a gratificação tendo em vista o
      princípio da estabilidade financeira. (item cancelado por perda de
      eficácia a partir de 11.11.2017, pela Lei 13.467/2017. Res. 225/2025,
      DEJT divulgado em 30.06, 01 e 02.07.2025) II - Mantido o empregado no
      exercício da função comissionada, não pode o empregador reduzir o valor
      da gratificação. (ex-OJ nº 303 da SBDI-1 - DJ 11.08.2003)
    status: alterada
    publicacao: "2025-07-02"
    historico: "Conversão das Orientações Jurisprudenciais nos 45 e 303 da SBDI-1 - Res. 129/2005, DJ 20, 22 e 25.04.2005 Item I - ex-OJ nº 45 da SBDI-1 - inserida em 25.11.1996"
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST373:
    numero: 373
    titulo: "GRATIFICAÇÃO SEMESTRAL. CONGELAMENTO. PRESCRIÇÃO PARCIAL."
    enunciado: >
      Tratando-se de pedido de diferença de gratificação semestral que teve
      seu valor congelado, a prescrição aplicável é a parcial. (ex-OJ nº 46
      da SBDI-1 - inserida em 29.03.1996).
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST374:
    numero: 374
    titulo: "NORMA COLETIVA. CATEGORIA DIFERENCIADA. ABRANGÊNCIA."
    enunciado: >
      Empregado integrante de categoria profissional diferenciada não tem o
      direito de haver de seu empregador vantagens previstas em instrumento
      coletivo no qual a empresa não foi representada por órgão de classe de
      sua categoria. (ex-OJ nº 55 da SBDI-1 - inserida em 25.11.1996)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST375:
    numero: 375
    titulo: "REAJUSTES SALARIAIS PREVISTOS EM NORMA COLETIVA. PREVALÊNCIA DA LEGISLAÇÃO DE POLÍTICA SALARIAL."
    enunciado: >
      Os reajustes salariais previstos em norma coletiva de trabalho não
      prevalecem frente à legislação superveniente de política salarial.
      (ex-OJs nºs 69 da SBDI-1 - inserida em 14.03.1994 - e 40 da SBDI-2 -
      inserida em 20.09.2000).
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Conversão da Orientação Jurisprudencial nº 69 da SBDI-1 e da Orientação Jurisprudencial nº 40 da SBDI-2 - Res. 129/2005, DJ 20, 22 e 25.04.2005."
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST376:
    numero: 376
    titulo: "HORAS EXTRAS. LIMITAÇÃO. ART. 59 DA CLT. REFLEXOS."
    enunciado: >
      I - A limitação legal da jornada suplementar a duas horas diárias não
      exime o empregador de pagar todas as horas trabalhadas. (ex-OJ nº 117
      da SBDI-1 - inserida em 20.11.1997) II - O valor das horas extras
      habitualmente prestadas integra o cálculo dos haveres trabalhistas,
      independentemente da limitação prevista no "caput" do art. 59 da CLT.
      (ex-OJ nº 89 da SBDI-1 - inserida em 28.04.1997)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST377:
    numero: 377
    titulo: "PREPOSTO. EXIGÊNCIA DA CONDIÇÃO DE EMPREGADO."
    enunciado: >
      Exceto quanto à reclamação de empregado doméstico, ou contra micro ou
      pequeno empresário, o preposto deve ser necessariamente empregado do
      reclamado. Inteligência do art. 843, § 1º, da CLT e do art. 54 da Lei
      Complementar nº 123, de 14 de dezembro de 2006.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Nova redação - Res. 146/2008, DJ 28.04.2008, 02 e 05.05.2008 Redação Original (conversão da Orientação Jurisprudencial nº 99 da SBDI-1) - Res. 129/2005, DJ 20, 22 e 25.04.2005 Nº 377 Preposto. Exigênc..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST378:
    numero: 378
    titulo: "ESTABILIDADE PROVISÓRIA. ACIDENTE DO TRABALHO. ART. 118 DA LEI Nº 8.213/1991."
    enunciado: >
      I - É constitucional o artigo 118 da Lei nº 8.213/1991 que assegura o
      direito à estabilidade provisória por período de 12 meses após a
      cessação do auxílio-doença ao empregado acidentado. (ex-OJ nº 105 da
      SBDI-1 - inserida em 01.10.1997) II - São pressupostos para a concessão
      da estabilidade o afastamento superior a 15 dias e a conseqüente
      percepção do auxílio-doença acidentário, salvo se constatada, após a
      despedida, doença profissional que guarde relação de causalidade com a
      execução do contrato de emprego. (primeira parte - ex-OJ nº 230 da
      SBDI-1 - inserida em 20.06.2001) III - O empregado submetido a contrato
      de trabalho por tempo determinado goza da garantia provisória de
      emprego decorrente de acidente de trabalho prevista no n no art. 118 da
      Lei nº 8.213/91.
    status: alterada
    publicacao: "2012-09-27"
    historico: "Súmula alterada - (conversão das Orientações Jurisprudenciais nºs 105 e 230 da SBDI-1) - Res. 129/2005, DJ 20, 22 e 25.04.2005 Estabilidade provisória. Acidente do trabalho. ART. 118 da Lei nº 8.213/1..."
    precedentes: 39
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST379:
    numero: 379
    titulo: "DIRIGENTE SINDICAL. DESPEDIDA. FALTA GRAVE. INQUÉRITO JUDICIAL. NECESSIDADE."
    enunciado: >
      O dirigente sindical somente poderá ser dispensado por falta grave
      mediante a apuração em inquérito judicial, inteligência dos arts. 494 e
      543, §3º, da CLT. (ex-OJ nº 114 da SBDI-1 - inserida em 20.11.1997)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST380:
    numero: 380
    titulo: "AVISO PRÉVIO. INÍCIO DA CONTAGEM. ART. 132 DO CÓDIGO CIVIL DE 2002."
    enunciado: >
      Aplica-se a regra prevista no "caput" do art. 132 do Código Civil de
      2002 à contagem do prazo do aviso prévio, excluindo-se o dia do começo
      e incluindo o do vencimento. (ex-OJ nº 122 da SBDI-1 - inserida em
      20.04.1998)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST381:
    numero: 381
    titulo: "CORREÇÃO MONETÁRIA. SALÁRIO. ART. 459 DA CLT."
    enunciado: >
      O pagamento dos salários até o 5º dia útil do mês subseqüente ao
      vencido não está sujeito à correção monetária. Se essa data limite for
      ultrapassada, incidirá o índice da correção monetária do mês
      subseqüente ao da prestação dos serviços, a partir do dia 1º. (ex-OJ nº
      124 da SBDI-1 - inserida em 20.04.1998)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST382:
    numero: 382
    titulo: "MUDANÇA DE REGIME CELETISTA PARA ESTATUTÁRIO. EXTINÇÃO DO CONTRATO. PRESCRIÇÃO BIENAL."
    enunciado: >
      A transferência do regime jurídico de celetista para estatutário
      implica extinção do contrato de trabalho, fluindo o prazo da prescrição
      bienal a partir da mudança de regime. (ex-OJ nº 128 da SBDI-1 -
      inserida em 20.04.1998)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST383:
    numero: 383
    titulo: "RECURSO. MANDATO. IRREGULARIDADE DE REPRESENTAÇÃO. CPC DE 2015, ARTS. 104 E 76, § 2º."
    enunciado: >
      I - É inadmissível recurso firmado por advogado sem procuração juntada
      aos autos até o momento da sua interposição, salvo mandato tácito. Em
      caráter excepcional (art. 104 do CPC de 2015), admite-se que o
      advogado, independentemente de intimação, exiba a procuração no prazo
      de 5 (cinco) dias após a interposição do recurso, prorrogável por igual
      período mediante despacho do juiz. Caso não a exiba, considera-se
      ineficaz o ato praticado e não se conhece do recurso. II - Verificada a
      irregularidade de representação da parte em fase recursal, em
      procuração ou substabelecimento já constante dos autos, o relator ou o
      órgão competente para julgamento do recurso designará prazo de 5
      (cinco) dias para que seja sanado o vício. Descumprida a determinação,
      o relator não conhecerá do recurso, se a providência couber ao
      recorrente, ou determinará o desentranhamento das contrarrazões, se a
      providência couber ao recorrido (art. 76, § 2º, do CPC de 2015).
    status: alterada
    publicacao: "2016-07-04T03:00:00-03"
    historico: "Redação original - (conversão das Orientações Jurisprudenciais nºs 149 e 311 da SBDI-1) - Res. 129/2005, DJ 20, 22 e 25.04.2005 Mandato. Arts. 13 e 37 do CPC. Fase recursal. Inaplicabilidade. I - É in..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST384:
    numero: 384
    titulo: "MULTA CONVENCIONAL. COBRANÇA."
    enunciado: >
      I - O descumprimento de qualquer cláusula constante de instrumentos
      normativos diversos não submete o empregado a ajuizar várias ações,
      pleiteando em cada uma o pagamento da multa referente ao descumprimento
      de obrigações previstas nas cláusulas respectivas. (ex-OJ nº 150 da
      SBDI-1 - inserida em 27.11.1998) II - É aplicável multa prevista em
      instrumento normativo (sentença normativa, convenção ou acordo
      coletivo) em caso de descumprimento de obrigação prevista em lei, mesmo
      que a norma coletiva seja mera repetição de texto legal. (ex-OJ nº 239
      da SBDI-1 - inserida em 20.06.2001). - Entendimento do item II
      reafirmado no IRR nº 282.
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 13
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST385:
    numero: 385
    titulo: "FERIADO LOCAL OU FORENSE. AUSÊNCIA DE EXPEDIENTE. PRAZO RECURSAL. PRORROGAÇÃO. COMPROVAÇÃO. NECESSIDADE."
    enunciado: >
      I - Incumbe à parte o ônus de provar, quando da interposição do
      recurso, a existência de feriado local que autorize a prorrogação do
      prazo recursal (art. 1.003, § 6º, do CPC de 2015). No caso de o
      recorrente alegar a existência de feriado local e não o comprovar no
      momento da interposição do recurso, cumpre ao relator conceder o prazo
      de 5 (cinco) dias para que seja sanado o vício (art. 932, parágrafo
      único, do CPC de 2015), sob pena de não conhecimento se da comprovação
      depender a tempestividade recursal; II - Na hipótese de feriado
      forense, incumbirá à autoridade que proferir a decisão de
      admissibilidade certificar o expediente nos autos; III - Admite-se a
      reconsideração da análise da tempestividade do recurso, mediante prova
      documental superveniente, em agravo de instrumento, agravo interno,
      agravo regimental, ou embargos de declaração, desde que, em momento
      anterior, não tenha havido a concessão de prazo para a comprovação da
      ausência de expediente forense.
    status: alterada
    publicacao: "2017-09-25"
    historico: "Súmula alterada - Res. 185/2012 ¿ DEJT divulgado em 25, 26 e 27.09.2012 Nº 385 Feriado local. Ausência de expediente forense. Prazo recursal. Prorrogação. Comprovação. Necessidade ato administrativo d..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST386:
    numero: 386
    titulo: "POLICIAL MILITAR. RECONHECIMENTO DE VÍNCULO EMPREGATÍCIO COM EMPRESA PRIVADA."
    enunciado: >
      Preenchidos os requisitos do art. 3º da CLT, é legítimo o
      reconhecimento de relação de emprego entre policial militar e empresa
      privada, independentemente do eventual cabimento de penalidade
      disciplinar prevista no Estatuto do Policial Militar. (ex-OJ nº 167 da
      SBDI-1 - inserida em 26.03.1999)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST387:
    numero: 387
    titulo: "RECURSO. FAC-SÍMILE. LEI Nº 9.800/1999."
    enunciado: >
      I - A Lei nº 9.800, de 26.05.1999, é aplicável somente a recursos
      interpostos após o início de sua vigência. (ex-OJ nº 194 da SBDI-1 -
      inserida em 08.11.2000) II - A contagem do quinquídio para apresentação
      dos originais de recurso interposto por intermédio de fac-símile começa
      a fluir do dia subsequente ao término do prazo recursal, nos termos do
      art. 2º da Lei nº 9.800, de 26.05.1999, e não do dia seguinte à
      interposição do recurso, se esta se deu antes do termo final do prazo.
      (ex-OJ nº 337 da SBDI-1 - primeira parte - DJ 04.05.2004) III - Não se
      tratando a juntada dos originais de ato que dependa de notificação,
      pois a parte, ao interpor o recurso, já tem ciência de seu ônus
      processual, não se aplica a regra do art. 224 do CPC de 2015 (art. 184
      do CPC de 1973) quanto ao "dies a quo", podendo coincidir com sábado,
      domingo ou feriado. (ex-OJ nº 337 da SBDI-1 - "in fine" - DJ
      04.05.2004) IV - A autorização para utilização do fac-símile, constante
      do art. 1º da Lei n.º 9.800, de 26.05.1999, somente alcança as
      hipóteses em que o documento é dirigido diretamente ao órgão
      jurisdicional, não se aplicando à transmissão ocorrida entre
      particulares.
    status: alterada
    publicacao: "2016-04-26"
    historico: "Súmula alterada - Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011 Nº 387. Recurso. Fac-símile. Lei nº 9.800/1999 (inserido o item IV à redação) I - A Lei nº 9.800, de 26.05.1999, é aplicável some..."
    precedentes: 19
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST388:
    numero: 388
    titulo: "MASSA FALIDA. ARTS. 467 E 477 DA CLT. INAPLICABILIDADE."
    enunciado: >
      A Massa Falida não se sujeita à penalidade do art. 467 e nem à multa do
      § 8º do art. 477, ambos da CLT. (ex-Ojs da SBDI-1 nºs 201 - DJ
      11.08.2003 - e 314 - DJ 08.11.2000)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 20
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST389:
    numero: 389
    titulo: "SEGURO-DESEMPREGO. COMPETÊNCIA DA JUSTIÇA DO TRABALHO. DIREITO À INDENIZAÇÃO POR NÃO LIBERAÇÃO DE GUIAS."
    enunciado: >
      I - Inscreve-se na competência material da Justiça do Trabalho a lide
      entre empregado e empregador tendo por objeto indenização pelo
      não-fornecimento das guias do seguro-desemprego. (ex-OJ nº 210 da
      SBDI-1 - inserida em 08.11.2000) II - O não-fornecimento pelo
      empregador da guia necessária para o recebimento do seguro-desemprego
      dá origem ao direito à indenização. (ex-OJ nº 211 da SBDI-1 - inserida
      em 08.11.2000)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST390:
    numero: 390
    titulo: "ESTABILIDADE. ART. 41 DA CF/1988. CELETISTA. ADMINISTRAÇÃO DIRETA, AUTÁRQUICA OU FUNDACIONAL. APLICABILIDADE. EMPREGADO DE EMPRESA PÚBLICA E SOCIEDADE DE ECONOMIA MISTA. INAPLICÁVEL."
    enunciado: >
      I - O servidor público celetista da administração direta, autárquica ou
      fundacional é beneficiário da estabilidade prevista no art. 41 da
      CF/1988. (ex-OJs nºs 265 da SBDI-1 - inserida em 27.09.2002 - e 22 da
      SBDI-2 - inserida em 20.09.2000) II - Ao empregado de empresa pública
      ou de sociedade de economia mista, ainda que admitido mediante
      aprovação em concurso público, não é garantida a estabilidade prevista
      no art. 41 da CF/1988. (ex-OJ nº 229 da SBDI-1 - inserida em
      20.06.2001)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST391:
    numero: 391
    titulo: "PETROLEIROS. LEI Nº 5.811/72. TURNO ININTERRUPTO DE REVEZAMENTO. HORAS EXTRAS E ALTERAÇÃO DA JORNADA PARA HORÁRIO FIXO."
    enunciado: >
      I - A Lei nº 5.811/1972 foi recepcionada pela CF/1988 no que se refere
      à duração da jornada de trabalho em regime de revezamento dos
      petroleiros. (ex-OJ nº 240 da SBDI-1 - inserida em 20.06.2001) II - A
      previsão contida no art. 10 da Lei nº 5.811/1972, possibilitando a
      mudança do regime de revezamento para horário fixo, constitui alteração
      lícita, não violando os arts. 468 da CLT e 7º, VI, da CF/1988. (ex-OJ
      nº 333 da SBDI-1 - DJ 09.12.2003)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST392:
    numero: 392
    titulo: "DANO MORAL E MATERIAL. RELAÇÃO DE TRABALHO. COMPETÊNCIA DA JUSTIÇA DO TRABALHO."
    enunciado: >
      Nos termos do art. 114, inc. VI, da Constituição da República, a
      Justiça do Trabalho é competente para processar e julgar ações de
      indenização por dano moral e material, decorrentes da relação de
      trabalho, inclusive as oriundas de acidente de trabalho e doenças a ele
      equiparadas, ainda que propostas pelos dependentes ou sucessores do
      trabalhador falecido.
    status: alterada
    publicacao: "2015-11-04"
    historico: "Nova redação - Res. 193/2013, DEJT divulgado em 13, 16 e 17.12.2013 Nº 392 Dano moral e material. Relação de trabalho. Competência da Justiça do Trabalho Nos termos do art. 114, inc. VI, da Constituiç..."
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST393:
    numero: 393
    titulo: "RECURSO ORDINÁRIO. EFEITO DEVOLUTIVO EM PROFUNDIDADE. ART. 1.013, § 1º, DO CPC DE 2015. ART. 515, § 1º, DO CPC DE 1973."
    enunciado: >
      I - O efeito devolutivo em profundidade do recurso ordinário, que se
      extrai do § 1º do art. 1.013 do CPC de 2015 (art. 515, §1º, do CPC de
      1973), transfere ao Tribunal a apreciação dos fundamentos da inicial ou
      da defesa, não examinados pela sentença, ainda que não renovados em
      contrarrazões, desde que relativos ao capítulo impugnado. II - Se o
      processo estiver em condições, o tribunal, ao julgar o recurso
      ordinário, deverá decidir desde logo o mérito da causa, nos termos do §
      3º do art. 1.013 do CPC de 2015, inclusive quando constatar a omissão
      da sentença no exame de um dos pedidos.
    status: alterada
    publicacao: "2016-04-26"
    historico: "Súmula alterada - Res. 169/2010, DEJT divulgado em 19, 22 e 23.11.2010 Nº 393. Recurso ordinário. Efeito devolutivo em profundidade. Art. 515, § 1º, do CPC (redação alterada pelo Tribunal Pleno na ses..."
    precedentes: 13
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST394:
    numero: 394
    titulo: "FATO SUPERVENIENTE. ART. 493 DO CPC DE 2015. ART. 462 DO CPC DE 1973."
    enunciado: >
      O art. 493 do CPC de 2015 (art. 462 do CPC de 1973), que admite a
      invocação de fato constitutivo, modificativo ou extintivo do direito,
      superveniente à propositura da ação, é aplicável de ofício aos
      processos em curso em qualquer instância trabalhista. Cumpre ao juiz ou
      tribunal ouvir as partes sobre o fato novo antes de decidir.
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 129/2005 - DJ 20,22 e 25.04.2005 Nº 394. Art. 462 do CPC. Fato superveniente (conversão da Orientação Jurisprudencial nº 81 da SBDI-1) O art. 462 do CPC, que admite a invocação..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST395:
    numero: 395
    titulo: "MANDATO E SUBSTABELECIMENTO. CONDIÇÕES DE VALIDADE."
    enunciado: >
      I - Válido é o instrumento de mandato com prazo determinado que contém
      cláusula estabelecendo a prevalência dos poderes para atuar até o final
      da demanda (§ 4º do art. 105 do CPC de 2015). (ex -OJ nº 312 da SBDI-1
      - DJ 11.08.2003) II - Se há previsão, no instrumento de mandato, de
      prazo para sua juntada, o mandato só tem validade se anexado ao
      processo o respectivo instrumento no aludido prazo. (ex-OJ nº 313 da
      SBDI-1 - DJ 11.08.2003) III - São válidos os atos praticados pelo
      substabelecido, ainda que não haja, no mandato, poderes expressos para
      substabelecer (art. 667, e parágrafos, do Código Civil de 2002). (ex-OJ
      nº 108 da SBDI-1 - inserida em 01.10.1997) IV - Configura-se a
      irregularidade de representação se o substabelecimento é anterior à
      outorga passada ao substabelecente. (ex-OJ nº 330 da SBDI-1 - DJ
      09.12.2003) V - Verificada a irregularidade de representação nas
      hipóteses dos itens II e IV, deve o juiz suspender o processo e
      designar prazo razoável para que seja sanado o vício, ainda que em
      instânciarecursal (art. 76 do CPC de 2015).
    status: alterada
    publicacao: "2016-08-26T03:00:00-03"
    historico: "Redação original (conversão das Orientações Jurisprudenciais nºs 108, 312, 313 e 330 da SBDI-1) - Res. 129/2005, DJ 20, 22 e 25.04.2005 I - Válido é o instrumento de mandato com prazo determinado que ..."
    precedentes: 19
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST396:
    numero: 396
    titulo: "ESTABILIDADE PROVISÓRIA. PEDIDO DE REINTEGRAÇÃO. CONCESSÃO DO SALÁRIO RELATIVO AO PERÍODO DE ESTABILIDADE JÁ EXAURIDO. INEXISTÊNCIA DE JULGAMENTO \"EXTRA PETITA\"."
    enunciado: >
      I - Exaurido o período de estabilidade, são devidos ao empregado apenas
      os salários do período compreendido entre a data da despedida e o final
      do período de estabilidade, não lhe sendo assegurada a reintegração no
      emprego. (ex-OJ nº 116 da SBDI-1 - inserida em 01.10.1997) II - Não há
      nulidade por julgamento extra petita da decisão que deferir salário
      quando o pedido for de reintegração, dados os termos do art. 496 da
      CLT. (ex-OJ nº 106 da SBDI-1 - inserida em 20.11.1997)
    status: vigente
    publicacao: "2005-04-25"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST397:
    numero: 397
    titulo: "AÇÃO RESCISÓRIA. ART. 485, IV, DO CPC. AÇÃO DE CUMPRIMENTO. OFENSA À COISA JULGADA EMANADA DE SENTENÇA NORMATIVA MODIFICADA EM GRAU DE RECURSO. INVIABILIDADE. CABIMENTO DE MANDADO DE SEGURANÇA."
    enunciado: >
      Não procede ação rescisória calcada em ofensa à coisa julgada
      perpetrada por decisão proferida em ação de cumprimento, em face de a
      sentença normativa, na qual se louvava, ter sido modificada em grau de
      recurso, porque em dissídio coletivo somente se consubstancia coisa
      julgada formal. Assim, os meios processuais aptos a atacarem a execução
      da cláusula reformada são a exceção de pré-executividade e o mandado de
      segurança, no caso de descumprimento do art. 572 do CPC. (ex-OJ nº 116
      da SBDI-2 - DJ 11.08.2003)
    status: alterada
    publicacao: "2005-08-24"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 397. Ação rescisória. Art. 485, IV, do CPC. Ação de cumprimento. Ofensa à coisa julgada emanada de sentença normativa modificada em grau de ..."
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST398:
    numero: 398
    titulo: "AÇÃO RESCISÓRIA. AUSÊNCIA DE DEFESA. INAPLICÁVEIS OS EFEITOS DA REVELIA."
    enunciado: >
      Na ação rescisória, o que se ataca é a decisão, ato oficial do Estado,
      acobertado pelo manto da coisa julgada. Assim, e considerando que a
      coisa julgada envolve questão de ordem pública, a revelia não produz
      confissão na ação rescisória. (ex-OJ nº 126 da SBDI-2 - DJ 09.12.2003)
    status: alterada
    publicacao: "2017-07-14"
    historico: "Redação original (conversão da Orientação Jurisprudencial nº 126 da SBDI-2) - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 398 (...) Na ação rescisória, o que se ataca na ação é a sentença, ato oficial do..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST399:
    numero: 399
    titulo: "AÇÃO RESCISÓRIA. CABIMENTO. SENTENÇA DE MÉRITO. DECISÃO HOMOLOGATÓRIA DE ADJUDICAÇÃO, DE ARREMATAÇÃO E DE CÁLCULOS."
    enunciado: >
      I - É incabível ação rescisória para impugnar decisão homologatória de
      adjudicação ou arrematação. (ex-OJs nºs 44 e 45 da SBDI-2 - inseridas
      em 20.09.2000) II - A decisão homologatória de cálculos apenas comporta
      rescisão quando enfrentar as questões envolvidas na elaboração da conta
      de liquidação, quer solvendo a controvérsia das partes quer
      explicitando, de ofício, os motivos pelos quais acolheu os cálculos
      oferecidos por uma das partes ou pelo setor de cálculos, e não
      contestados pela outra. (ex-OJ nº 85 da SBDI-2 - primeira parte -
      inserida em 13.03.2002 e alterada em 26.11.2002).
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST400:
    numero: 400
    titulo: "AÇÃO RESCISÓRIA DE AÇÃO RESCISÓRIA. VIOLAÇÃO MANIFESTA DE NORMA JURÍDICA. INDICAÇÃO DA MESMA NORMA JURÍDICA APONTADA NA RESCISÓRIA PRIMITIVA (MESMO DISPOSITIVO DE LEI SOB O CPC DE 1973)."
    enunciado: >
      Em se tratando de rescisória de rescisória, o vício apontado deve
      nascer na decisão rescindenda, não se admitindo a rediscussão do acerto
      do julgamento da rescisória anterior. Assim, não procede rescisória
      calcada no inciso V do art. 966 do CPC de 2015 (art. 485, V, do CPC de
      1973) para discussão, por má aplicação da mesma norma jurídica, tida
      por violada na rescisória anterior, bem como para arguição de questões
      inerentes à ação rescisória primitiva. (ex-OJ nº 95 da SBDI-2 -
      inserida em 27.09.2002 e alterada DJ 16.04.2004)
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 400. Ação rescisória de ação rescisória. Violação de lei. Indicação dos mesmos dispositivos legais apontados na rescisória primitiva (conver..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST401:
    numero: 401
    titulo: "AÇÃO RESCISÓRIA. DESCONTOS LEGAIS. FASE DE EXECUÇÃO. SENTENÇA EXEQÜENDA OMISSA. INEXISTÊNCIA DE OFENSA À COISA JULGADA."
    enunciado: >
      Os descontos previdenciários e fiscais devem ser efetuados pelo juízo
      executório, ainda que a sentença exeqüenda tenha sido omissa sobre a
      questão, dado o caráter de ordem pública ostentado pela norma que os
      disciplina. A ofensa à coisa julgada somente poderá ser caracterizada
      na hipótese de o título exeqüendo, expressamente, afastar a dedução dos
      valores a título de imposto de renda e de contribuição previdenciária.
      (ex-OJ nº 81 da SBDI-2 - inserida em 13.03.2002)
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST402:
    numero: 402
    titulo: "AÇÃO RESCISÓRIA. PROVA NOVA. DISSÍDIO COLETIVO. SENTENÇA NORMATIVA."
    enunciado: >
      I - Sob a vigência do CPC de 2015 (art. 966, inciso VII), para efeito
      de ação rescisória, considera-se prova nova a cronologicamente velha,
      já existente ao tempo do trânsito em julgado da decisão rescindenda,
      mas ignorada pelo interessado ou de impossível utilização, à época, no
      processo. II - Não é prova nova apta a viabilizar a desconstituição de
      julgado: a) sentença normativa proferida ou transitada em julgado
      posteriormente à sentença rescindenda; b) sentença normativa
      preexistente à sentença rescindenda, mas não exibida no processo
      principal, em virtude de negligência da parte, quando podia e deveria
      louvar-se de documento já existente e não ignorado quando emitida a
      decisão rescindenda. (ex-OJ nº 20 da SBDI-2 - inserida em 20.09.2000).
    status: alterada
    publicacao: "2017-04-25"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Conversão da Orientação Jurisprudencial nº 20 da SBDI-2 Nº 402 Ação rescisória. Documento novo. Dissídio coletivo. Sentença normativa Documento..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST403:
    numero: 403
    titulo: "AÇÃO RESCISÓRIA. DOLO DA PARTE VENCEDORA EM DETRIMENTO DA VENCIDA. ART. 485, III, DO CPC."
    enunciado: >
      I - Não caracteriza dolo processual, previsto no art. 485, III, do CPC,
      o simples fato de a parte vencedora haver silenciado a respeito de
      fatos contrários a ela, porque o procedimento, por si só, não constitui
      ardil do qual resulte cerceamento de defesa e, em conseqüência, desvie
      o juiz de uma sentença não-condizente com a verdade. (ex-OJ nº 125 da
      SBDI-2 - DJ 09.12.2003) II - Se a decisão rescindenda é homologatória
      de acordo, não há parte vencedora ou vencida, razão pela qual não é
      possível a sua desconstituição calcada no inciso III do art. 485 do CPC
      (dolo da parte vencedora em detrimento da vencida), pois constitui
      fundamento de rescindibilidade que supõe solução jurisdicional para a
      lide. (ex-OJ nº 111 da SBDI-2 - DJ 29.04.2003)
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST404:
    numero: 404
    titulo: "AÇÃO RESCISÓRIA. FUNDAMENTO PARA INVALIDAR CONFISSÃO. CONFISSÃO FICTA. INADEQUAÇÃO DO ENQUADRAMENTO NO ART. 485, VIII, DO CPC DE 1973."
    enunciado: >
      O art. 485, VIII, do CPC de 1973, ao tratar do fundamento para
      invalidar a confissão como hipótese de rescindibilidade da decisão
      judicial, referia-se à confissão real, fruto de erro, dolo ou coação, e
      não à confissão ficta resultante de revelia.
    status: alterada
    publicacao: "2016-06-03T03:00:00-03"
    historico: "Res. 137/2005, DJ 22, 23 e 24.08.2005 Conversão da Orientação Jurisprudencial nº 108 da SBDI-2 Nº 404 Ação rescisória. Fundamento para invalidar confissão. Confissão ficta. Inadequação do enquadrament..."
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST405:
    numero: 405
    titulo: "AÇÃO RESCISÓRIA. TUTELA PROVISÓRIA."
    enunciado: >
      Em face do que dispõem a MP 1.984-22/2000 e o art. 969 do CPC de 2015,
      é cabível o pedido de tutela provisória formulado na petição inicial de
      ação rescisória ou na fase recursal, visando a suspender a execução da
      decisão rescindenda.
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 405. Ação rescisória. Liminar. Antecipação de tutela (conversão das Orientações Jurisprudenciais nºs 1, 3 e 121 da SBDI-2) I - Em face do qu..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST406:
    numero: 406
    titulo: "AÇÃO RESCISÓRIA. LITISCONSÓRCIO. NECESSÁRIO NO PÓLO PASSIVO E FACULTATIVO NO ATIVO. INEXISTENTE QUANTO AOS SUBSTITUÍDOS PELO SINDICATO."
    enunciado: >
      I - O litisconsórcio, na ação rescisória, é necessário em relação ao
      pólo passivo da demanda, porque supõe uma comunidade de direitos ou de
      obrigações que não admite solução díspar para os litisconsortes, em
      face da indivisibilidade do objeto. Já em relação ao pólo ativo, o
      litisconsórcio é facultativo, uma vez que a aglutinação de autores se
      faz por conveniência e não pela necessidade decorrente da natureza do
      litígio, pois não se pode condicionar o exercício do direito individual
      de um dos litigantes no processo originário à anuência dos demais para
      retomar a lide. (ex-OJ nº 82 da SBDI-2 - inserida em 13.03.2002) II - O
      Sindicato, substituto processual e autor da reclamação trabalhista, em
      cujos autos fora proferida a decisão rescindenda, possui legitimidade
      para figurar como réu na ação rescisória, sendo descabida a exigência
      de citação de todos os empregados substituídos, porquanto inexistente
      litisconsórcio passivo necessário. (ex-OJ nº 110 da SBDI-2 - DJ
      29.04.2003)
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST407:
    numero: 407
    titulo: "AÇÃO RESCISÓRIA. MINISTÉRIO PÚBLICO. LEGITIMIDADE \"AD CAUSAM\" PREVISTA NO ART. 967, III, A, B E C DO CPC DE 2015. ART. 487, III, \"A\" E \"B\", DO CPC DE 1973. HIPÓTESES MERAMENTE EXEMPLIFICATIVAS."
    enunciado: >
      A legitimidade "ad causam" do Ministério Público para propor ação
      rescisória, ainda que não tenha sido parte no processo que deu origem à
      decisão rescindenda, não está limitada às alíneas "a", "b" e c do
      inciso III do art. 967 do CPC de 2015 (art. 487, III, a e b, do CPC de
      1973), uma vez que traduzem hipóteses meramente exemplificativas (ex-OJ
      nº 83 da SBDI-2 - inserida em 13.03.2002).
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 407. Ação rescisória. Ministério Público. Legitimidade \"ad causam\" prevista no art. 487, III, \"A\" e \"B\", do CPC. As hipóteses são meramente ..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST408:
    numero: 408
    titulo: "AÇÃO RESCISÓRIA. PETIÇÃO INICIAL. CAUSA DE PEDIR. AUSÊNCIA DE CAPITULAÇÃO OU CAPITULAÇÃO ERRÔNEA NO ART. 966 DO CPC DE 2015. ART. 485 DO CPC DE 1973. PRINCÍPIO \"IURA NOVIT CURIA\"."
    enunciado: >
      Não padece de inépcia a petição inicial de ação rescisória apenas
      porque omite a subsunção do fundamento de rescindibilidade no art. 966
      do CPC de 2015 (art. 485 do CPC de 1973) ou o capitula erroneamente em
      um de seus incisos. Contanto que não se afaste dos fatos e fundamentos
      invocados como causa de pedir, ao Tribunal é lícito emprestar-lhes a
      adequada qualificação jurídica ("iura novit curia"). No entanto,
      fundando-se a ação rescisória no art. 966, inciso V, do CPC de 2015
      (art. 485, inciso V, do CPC de 1973), é indispensável expressa
      indicação, na petição inicial da ação rescisória, da norma jurídica
      manifestamente violada (dispositivo legal violado sob o CPC de 1973),
      por se tratar de causa de pedir da rescisória, não se aplicando, no
      caso, o princípio "iura novit curia". (ex-Ojs nºs 32 e 33 da SBDI-2 -
      inseridas em 20.09.2000)
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 408. Ação rescisória. Petição inicial. Causa de pedir. Ausência de capitulação ou capitulação errônea no art. 485 do CPC. Princípio \"iura no..."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST409:
    numero: 409
    titulo: "AÇÃO RESCISÓRIA. PRAZO PRESCRICIONAL. TOTAL OU PARCIAL. VIOLAÇÃO DO ART. 7º, XXIX, DA CF/1988. MATÉRIA INFRACONSTITUCIONAL."
    enunciado: >
      Não procede ação rescisória calcada em violação do art. 7º, XXIX, da
      CF/1988 quando a questão envolve discussão sobre a espécie de prazo
      prescricional aplicável aos créditos trabalhistas, se total ou parcial,
      porque a matéria tem índole infraconstitucional, construída, na Justiça
      do Trabalho, no plano jurisprudencial. (ex-OJ nº 119 da SBDI-2 - DJ
      11.08.2003)
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST410:
    numero: 410
    titulo: "AÇÃO RESCISÓRIA. REEXAME DE FATOS E PROVAS. INVIABILIDADE."
    enunciado: >
      A ação rescisória calcada em violação de lei não admite reexame de
      fatos e provas do processo que originou a decisão rescindenda. (ex-OJ
      nº 109 da SBDI-2 - DJ 29.04.2003).
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST411:
    numero: 411
    titulo: "AÇÃO RESCISÓRIA. SENTENÇA DE MÉRITO. DECISÃO DE TRIBUNAL REGIONAL DO TRABALHO EM AGRAVO REGIMENTAL CONFIRMANDO DECISÃO MONOCRÁTICA DO RELATOR QUE, APLICANDO A SÚMULA Nº 83 DO TST, INDEFERIU A PETIÇÃO INICIAL DA AÇÃO RESCISÓRIA. CABIMENTO."
    enunciado: >
      Se a decisão recorrida, em agravo regimental, aprecia a matéria na
      fundamentação, sob o enfoque das Súmulas nºs 83 do TST e 343 do STF,
      constitui sentença de mérito, ainda que haja resultado no indeferimento
      da petição inicial e na extinção do processo sem julgamento do mérito.
      Sujeita-se, assim, à reforma pelo TST, a decisão do Tribunal que,
      invocando controvérsia na interpretação da lei, indefere a petição
      inicial de ação rescisória. (ex-OJ nº 43 da SBDI-2 - inserida em
      20.09.2000)
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST412:
    numero: 412
    titulo: "AÇÃO RESCISÓRIA. REGÊNCIA PELO CPC DE 1973. SENTENÇA DE MÉRITO. QUESTÃO PROCESSUAL."
    enunciado: >
      Sob a égide do CPC de 1973, pode uma questão processual ser objeto de
      rescisão desde que consista em pressuposto de validade de uma sentença
      de mérito. (ex-OJ nº 46 da SBDI-2 - inserida em20.09.2000).
    status: alterada
    publicacao: "2017-04-25"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005. Conversão da Orientação Jurisprudencial nº 46 da SBDI-2. Nº 412 Ação rescisória. Sentença de mérito. Questão processual. Pode uma questão proc..."
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST413:
    numero: 413
    titulo: "AÇÃO RESCISÓRIA. SENTENÇA DE MÉRITO. VIOLAÇÃO DO ART. 896, \"A\", DA CLT."
    enunciado: >
      É incabível ação rescisória, por violação do art. 896, "a", da CLT,
      contra decisão transitada em julgado sob a égide do CPC de 1973 que não
      conhece de recurso de revista, com base em divergência jurisprudencial,
      pois não se cuidava de sentença de mérito (art. 485 do CPC de 1973).
      (ex-OJ nº 47 da SBDI-2 - inserida em 20.09.2000)
    status: alterada
    publicacao: "2016-06-03T03:00:00-03"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 - Conversão da Orientação Jurisprudencial nº 47 da SBDI-2 413. Ação rescisória. Sentença de mérito. Violação do art. 896, \"a\", da CLT. É incabí..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST414:
    numero: 414
    titulo: "MANDADO DE SEGURANÇA. TUTELA PROVISÓRIA CONCEDIDA ANTES OU NA SENTENÇA."
    enunciado: >
      I - A tutela provisória concedida na sentença não comporta impugnação
      pela via do mandado de segurança, por ser impugnável mediante recurso
      ordinário. É admissível a obtenção de efeito suspensivo ao recurso
      ordinário mediante requerimento dirigido ao tribunal, ao relator ou ao
      presidente ou ao vice-presidente do tribunal recorrido, por aplicação
      subsidiária ao processo do trabalho do artigo 1.029, § 5º, do CPC de
      2015. II - No caso de a tutela provisória haver sido concedida ou
      indeferida antes da sentença, cabe mandado de segurança, em face da
      inexistência de recurso próprio. III - A superveniência da sentença,
      nos autos originários, faz perder o objeto do mandado de segurança que
      impugnava a concessão ou o indeferimento da tutela provisória.
    status: alterada
    publicacao: "2017-04-25"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 - conversão das Orientações Jurisprudencias nºs 50, 51, 58, 86 e 139 da SBDI-2 414 Mandado de Segurança. Antecipação de tutela (ou liminar) con..."
    precedentes: 31
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST415:
    numero: 415
    titulo: "MANDADO DE SEGURANÇA. PETIÇÃO INICIAL. ART. 321 DO CPC DE 2015. ART. 284 DO CPC DE 1973. INAPLICABILIDADE."
    enunciado: >
      Exigindo o mandado de segurança prova documental pré-constituída,
      inaplicável o art. 321 do CPC de 2015 (art. 284 do CPC de 1973) quando
      verificada, na petição inicial do "mandamus", a ausência de documento
      indispensável ou de sua autenticação. (ex-OJ nº 52 da SBDI-2 - inserida
      em 20.09.2000).
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 415. Mandado de segurança. Art. 284 do CPC. Aplicabilidade (conversão da Orientação Jurisprudencial nº 52 da SBDI-2) Exigindo o mandado de s..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST416:
    numero: 416
    titulo: "MANDADO DE SEGURANÇA. EXECUÇÃO. LEI Nº 8.432/1992. ART. 897, § 1º, DA CLT. CABIMENTO."
    enunciado: >
      Devendo o agravo de petição delimitar justificadamente a matéria e os
      valores objeto de discordância, não fere direito líquido e certo o
      prosseguimento da execução quanto aos tópicos e valores não
      especificados no agravo. (ex-OJ nº 55 da SBDI-2 - inserida em
      20.09.2000)
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST417:
    numero: 417
    titulo: "MANDADO DE SEGURANÇA. PENHORA EM DINHEIRO."
    enunciado: >
      I - Não fere direito líquido e certo do impetrante o ato judicial que
      determina penhora em dinheiro do executado para garantir crédito
      exequendo, pois é prioritária e obedece à gradação prevista no art. 835
      do CPC de 2015 (art. 655 do CPC de 1973). II - Havendo discordância do
      credor, em execução definitiva, não tem o executado direito líquido e
      certo a que os valores penhorados em dinheiro fiquem depositados no
      próprio banco, ainda que atenda aos requisitos do art. 840, I, do CPC
      de 2015 (art. 666, I, do CPC de 1973). (ex-OJ nº 61 da SBDI-2 -
      inserida em 20.09.2000).
    status: alterada
    publicacao: "2016-09-22"
    historico: "Redação original ¿ (conversão das Orientações Jurisprudenciais nºs 60, 61 e 62 da SBDI-II) - Res. 137/2005, DJ 22, 23 e 24.08.2005) Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 417. Mandado de segurança. ..."
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST418:
    numero: 418
    titulo: "MANDADO DE SEGURANÇA VISANDO À HOMOLOGAÇÃO DE ACORDO."
    enunciado: >
      A homologação de acordo constitui faculdade do juiz, inexistindo
      direito líquido e certo tutelável pela via do mandado de segurança.
    status: alterada
    publicacao: "2017-04-25"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 - conversão das Orientações Jurisprudencias nºs 120 e 141 da SBDI-2 418 Mandado de Segurança visando à concessão de liminar ou homologação de a..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST419:
    numero: 419
    titulo: "COMPETÊNCIA. EMBARGOS DE TERCEIRO. EXECUÇÃO POR CARTA PRECATÓRIA. JUÍZO DEPRECADO."
    enunciado: >
      Na execução por carta precatória, os embargos de terceiro serão
      oferecidos no juízo deprecado, salvo se indicado pelo juízo deprecante
      o bem constrito ou se já devolvida a carta (art. 676, parágrafo único,
      do CPC de 2015).
    status: alterada
    publicacao: "2016-09-22"
    historico: "Redação original (conversão da Orientação Jurisprudencial nº 114 da SBDI-II) - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 419. Competência. Execução por carta. Embargos de terceiro. Juízo deprecante Na ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST420:
    numero: 420
    titulo: "COMPETÊNCIA FUNCIONAL. CONFLITO NEGATIVO. TRT E VARA DO TRABALHO DE IDÊNTICA REGIÃO. NÃO CONFIGURAÇÃO."
    enunciado: >
      Não se configura conflito de competência entre Tribunal Regional do
      Trabalho e Vara do Trabalho a ele vinculada. (ex-OJ nº 115 da SBDI-2 -
      DJ 11.08.2003)
    status: vigente
    publicacao: "2005-08-24"
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST421:
    numero: 421
    titulo: "EMBARGOS DE DECLARAÇÃO. CABIMENTO. DECISÃO MONOCRÁTICA DO RELATOR CALCADA NO ART. 932 DO CPC DE 2015. ART. 557 DO CPC DE 1973."
    enunciado: >
      I Cabem embargos de declaração da decisão monocrática do relator
      prevista no art. 932 do CPC de 2015 (art. 557 do CPC de 1973), se a
      parte pretende tão somente juízo integrativo retificador da decisão e,
      não, modificação do julgado. II Se a parte postular a revisão no mérito
      da decisão monocrática, cumpre ao relator converter os embargos de
      declaração em agravo, em face dos princípios da fungibilidade e
      celeridade processual, submetendo-o ao pronunciamento do Colegiado,
      após a intimação do recorrente para, no prazo de 5 (cinco) dias,
      complementar as razões recursais, de modo a ajustá-las às exigências do
      art. 1.021, § 1º, do CPC de 2015.
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 421. Embargos declaratórios contra decisão monocrática do relator calcada no art. 557 do CPC. Cabimento (conversão da Orientação Jurispruden..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST422:
    numero: 422
    titulo: "RECURSO. FUNDAMENTO AUSENTE OU DEFICIENTE. NÃO CONHECIMENTO."
    enunciado: >
      I Não se conhece de recurso para o Tribunal Superior do Trabalho se as
      razões do recorrente não impugnam os fundamentos da decisão recorrida,
      nos termos em que proferida. II O entendimento referido no item
      anterior não se aplica em relação à motivação secundária e
      impertinente, consubstanciada em despacho de admissibilidade de recurso
      ou em decisão monocrática. III Inaplicável a exigência do item I
      relativamente ao recurso ordinário da competência de Tribunal Regional
      do Trabalho, exceto em caso de recurso cuja motivação é inteiramente
      dissociada dos fundamentos da sentença.
    status: alterada
    publicacao: "2015-06-26"
    historico: "Redação original (conversão da Orientação Jurisprudencial nº 90 da SBDI-2) - Res. 137/2005, DJ 22, 23 e 24.08.2005 Nº 422 Recurso. Apelo que não ataca os fundamentos da decisão recorrida. Não conheci-..."
    precedentes: 33
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST423:
    numero: 423
    titulo: "TURNO ININTERRUPTO DE REVEZAMENTO. FIXAÇÃO DE JORNADA DE TRABALHO MEDIANTE NEGOCIAÇÃO COLETIVA. VALIDADE."
    enunciado: >
      Estabelecida jornada superior a seis horas e limitada a oito horas por
      meio de regular negociação coletiva, os empregados submetidos a turnos
      ininterruptos de revezamento não tem direito ao pagamento da 7ª e 8ª
      horas como extras.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Conversão da Orientação Jurisprudencial nº 169 da SBDI-1 - Res. 139/2006, DJ 10, 11 e 13.10.2006"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST424:
    numero: 424
    titulo: "RECURSO ADMINISTRATIVO. PRESSUPOSTO DE ADMISSIBILIDADE. DEPÓSITO PRÉVIO DA MULTA ADMINISTRATIVA. NÃO RECEPÇÃO PELA CONSTITUIÇÃO FEDERAL DO § 1º DO ART. 636 DA CLT."
    enunciado: >
      O § 1º do art. 636 da CLT, que estabelece a exigência de prova do
      depósito prévio do valor da multa cominada em razão de autuação
      administrativa como pressuposto de admissibilidade de recurso
      administrativo, não foi recepcionado pela Constituição Federal de 1988,
      ante a sua incompatibilidade com o inciso LV do art. 5º.
    status: vigente
    publicacao: "2009-11-25"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST425:
    numero: 425
    titulo: "JUS POSTULANDI NA JUSTIÇA DO TRABALHO. ALCANCE."
    enunciado: >
      O jus postulandi das partes, estabelecido no art. 791 da CLT, limita-se
      às Varas do Trabalho e aos Tribunais Regionais do Trabalho, não
      alcançando a ação rescisória, a ação cautelar, o mandado de segurança e
      os recursos de competência do Tribunal Superior do Trabalho.
    status: vigente
    publicacao: "2010-05-04"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST426:
    numero: 426
    titulo: "DEPÓSITO RECURSAL. UTILIZAÇÃO DA GUIA GFIP. OBRIGATORIEDADE."
    enunciado: >
      Nos dissídios individuais o depósito recursal será efetivado mediante a
      utilização da Guia de Recolhimento do FGTS e Informações à Previdência
      Social - GFIP, nos termos dos §§ 4º e 5º do art. 899 da CLT, admitido o
      depósito judicial, realizado na sede do juízo e à disposição deste, na
      hipótese de relação de trabalho não submetida ao regime do FGTS.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Editada em decorrência do julgamento do processo TST-IUJEEDRR 91700-09.2006.5.18.0006 - Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011"
    precedentes: 11
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST427:
    numero: 427
    titulo: "INTIMAÇÃO. PLURALIDADE DE ADVOGADOS. PUBLICAÇÃO EM NOME DE ADVOGADO DIVERSO DAQUELE EXPRESSAMENTE INDICADO. NULIDADE."
    enunciado: >
      Havendo pedido expresso de que as intimações e publicações sejam
      realizadas exclusivamente em nome de determinado advogado, a
      comunicação em nome de outro profissional constituído nos autos é nula,
      salvo se constatada a inexistência de prejuízo.
    status: vigente
    publicacao: "2011-05-31"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST428:
    numero: 428
    titulo: "SOBREAVISO APLICAÇÃO ANALÓGICA DO ART. 244, § 2º DA CLT."
    enunciado: >
      I - O uso de instrumentos telemáticos ou informatizados fornecidos pela
      empresa ao empregado, por si só, não caracteriza o regime de
      sobreaviso. II - Considera-se em sobreaviso o empregado que, à
      distância e submetido a controle patronal por instrumentos telemáticos
      ou informatizados, permanecer em regime de plantão ou equivalente,
      aguardando a qualquer momento o chamado para o serviço durante o
      período de descanso.
    status: alterada
    publicacao: "2012-09-27"
    historico: "Redação original - Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011 Nº 428 Sobreaviso (conversão da Orientação Jurisprudencial n.º 49 da SBDI-1) O uso de aparelho de intercomunicação, a exemplo de..."
    precedentes: 24
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST429:
    numero: 429
    titulo: "TEMPO À DISPOSIÇÃO DO EMPREGADOR. ART. 4º DA CLT. PERÍODO DE DESLOCAMENTO ENTRE A PORTARIA E O LOCAL DE TRABALHO."
    enunciado: >
      Considera-se à disposição do empregador, na forma do art. 4º da CLT, o
      tempo necessário ao deslocamento do trabalhador entre a portaria da
      empresa e o local de trabalho, desde que supere o limite de 10 (dez)
      minutos diários.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST430:
    numero: 430
    titulo: "ADMINISTRAÇÃO PÚBLICA INDIRETA. CONTRATAÇÃO. AUSÊNCIA DE CONCURSO PÚBLICO. NULIDADE. ULTERIOR PRIVATIZAÇÃO. CONVALIDAÇÃO. INSUBSISTÊNCIA DO VÍCIO"
    enunciado: >
      Convalidam-se os efeitos do contrato de trabalho que, considerado nulo
      por ausência de concurso público, quando celebrado originalmente com
      ente da Administração Pública Indireta, continua a existir após a sua
      privatização.
    status: vigente
    publicacao: "2012-02-15"
    precedentes: 30
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST431:
    numero: 431
    titulo: "SALÁRIO-HORA. EMPREGADO SUJEITO AO REGIME GERAL DE TRABALHO (ART. 58, CAPUT, DA CLT). 40 HORAS SEMANAIS. CÁLCULO. APLICAÇÃO DO DIVISOR 200."
    enunciado: >
      Para os empregados a que alude o art. 58, caput, da CLT, quando
      sujeitos a 40 horas semanais de trabalho, aplica-se o divisor 200
      (duzentos) para o cálculo do valor do salário-hora.
    status: alterada
    publicacao: "2012-09-27"
    historico: "Redação original - Res. 177/2012, DEJT divulgado em 13, 14 e 15.02.2012 Nº 431 Salário-hora. 40 horas semanais. Cálculo. Aplicação do divisor 200. - Aplica-se o divisor 200 (duzentos) para o cálculo d..."
    precedentes: 42
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST432:
    numero: 432
    titulo: "CONTRIBUIÇÃO SINDICAL RURAL. AÇÃO DE COBRANÇA. PENALIDADE POR ATRASO NO RECOLHIMENTO. INAPLICABILIDADE DO ART. 600 DA CLT. INCIDÊNCIA DO ART. 2º DA LEI Nº 8.022/1990."
    enunciado: >
      O recolhimento a destempo da contribuição sindical rural não acarreta a
      aplicação da multa progressiva prevista no art. 600 da CLT, em
      decorrência da sua revogação tácita pela Lei nº 8.022, de 12 de abril
      de 1990.
    status: vigente
    publicacao: "2012-02-15"
    precedentes: 42
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST433:
    numero: 433
    titulo: "EMBARGOS. ADMISSIBILIDADE. PROCESSO EM FASE DE EXECUÇÃO. ACÓRDÃO DE TURMA PUBLICADO NA VIGÊNCIA DA LEI Nº 11.496, DE 26.06.2007. DIVERGÊNCIA DE INTERPRETAÇÃO DE DISPOSITIVO CONSTITUCIONAL."
    enunciado: >
      A admissibilidade do recurso de embargos contra acórdão de Turma em
      Recurso de Revista em fase de execução, publicado na vigência da Lei nº
      11.496, de 26.06.2007, condiciona-se à demonstração de divergência
      jurisprudencial entre Turmas ou destas e a Seção Especializada em
      Dissídios Individuais do Tribunal Superior do Trabalho em relação à
      interpretação de dispositivo constitucional.
    status: vigente
    publicacao: "2012-02-15"
    precedentes: 16
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST434:
    numero: 434
    titulo: "RECURSO. INTERPOSIÇÃO ANTES DA PUBLICAÇÃO DO ACÓRDÃO IMPUGNADO. EXTEMPORANEIDADE."
    enunciado: >
      I) É extemporâneo recurso interposto antes de publicado o acórdão
      impugnado.(ex-OJ nº 357 da SBDI-1 inserida em 14.03.2008) II) A
      interrupção do prazo recursal em razão da interposição de embargos de
      declaração pela parte adversa não acarreta qualquer prejuízo àquele que
      apresentou seu recurso tempestivamente.
    status: cancelada
    publicacao: "2012-02-15"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST435:
    numero: 435
    titulo: "DECISÃO MONOCRÁTICA. RELATOR. ART. 932 DO CPC DE 2015. ART. 557 DO CPC DE 1973. APLICAÇÃO SUBSIDIÁRIA AO PROCESSO DO TRABALHO."
    enunciado: >
      Aplica-se subsidiariamente ao processo do trabalho o art. 932 do CPC de
      2015 (art. 557 do CPC de 1973).
    status: alterada
    publicacao: "2016-04-26"
    historico: "Redação original - Res. 185/2012, DEJT divulgado em 25, 26 e 27.09.2012 Nº 435. Art. 557 do CPC. Aplicação subsidiária ao processo do trabalho (conversão da Orientação Jurisprudencial nº 73 da SBDI-2 ..."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST436:
    numero: 436
    titulo: "REPRESENTAÇÃO PROCESSUAL. PROCURADOR DA UNIÃO, ESTADOS, MUNICÍPIOS E DISTRITO FEDERAL, SUAS AUTARQUIAS E FUNDAÇÕES PÚBLICAS. JUNTADA DE INSTRUMENTO DE MANDATO."
    enunciado: >
      I - A União, Estados, Municípios e Distrito Federal, suas autarquias e
      fundações públicas, quando representadas em juízo, ativa e
      passivamente, por seus procuradores, estão dispensadas da juntada de
      instrumento de mandato e de comprovação do ato de nomeação. II - Para
      os efeitos do item anterior, é essencial que o signatário ao menos
      declare-se exercente do cargo de procurador, não bastando a indicação
      do número de inscrição na Ordem dos Advogados do Brasil.
    status: vigente
    publicacao: "2012-09-27"
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST437:
    numero: 437
    titulo: "INTERVALO INTRAJORNADA PARA REPOUSO E ALIMENTAÇÃO. APLICAÇÃO DO ART. 71 DA CLT."
    enunciado: >
      I - Após a edição da Lei nº 8.923/94, a não-concessão ou a concessão
      parcial do intervalo intrajornada mínimo, para repouso e alimentação, a
      empregados urbanos e rurais, implica o pagamento total do período
      correspondente, e não apenas daquele suprimido, com acréscimo de, no
      mínimo, 50% sobre o valor da remuneração da hora normal de trabalho
      (art. 71 da CLT), sem prejuízo do cômputo da efetiva jornada de labor
      para efeito de remuneração. II - É inválida cláusula de acordo ou
      convenção coletiva de trabalho contemplando a supressão ou redução do
      intervalo intrajornada porque este constitui medida de higiene, saúde e
      segurança do trabalho, garantido por norma de ordem pública (art. 71 da
      CLT e art. 7º, XXII, da CF/1988), infenso à negociação coletiva. III -
      Possui natureza salarial a parcela prevista no art. 71, § 4º, da CLT,
      com redação introduzida pela Lei nº 8.923, de 27 de julho de 1994,
      quando não concedido ou reduzido pelo empregador o intervalo mínimo
      intrajornada para repouso e alimentação, repercutindo, assim, no
      cálculo de outras parcelas salariais. IV - Ultrapassada habitualmente a
      jornada de seis horas de trabalho, é devido o gozo do intervalo
      intrajornada mínimo de uma hora, obrigando o empregador a remunerar o
      período para descanso e alimentação não usufruído como extra, acrescido
      do respectivo adicional, na forma prevista no art. 71, caput e § 4º da
      CLT.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Conversão das Orientações Jurisprudenciais nºs 307, 342, 354, 380 e 381 da SBDI-1 - Res. 185/2012, DEJT divulgado em 25, 26 e 27.09.2012"
    precedentes: 74
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST438:
    numero: 438
    titulo: "INTERVALO PARA RECUPERAÇÃO TÉRMICA DO EMPREGADO. AMBIENTE ARTIFICIALMENTE FRIO. HORAS EXTRAS. ART. 253 DA CLT. APLICAÇÃO ANALÓGICA."
    enunciado: >
      O empregado submetido a trabalho contínuo em ambiente artificialmente
      frio, nos termos do parágrafo único do art. 253 da CLT, ainda que não
      labore em câmara frigorífica, tem direito ao intervalo intrajornada
      previsto no caput do art. 253 da CLT.
    status: vigente
    publicacao: "2012-09-27"
    precedentes: 20
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST439:
    numero: 439
    titulo: "DANOS MORAIS. JUROS DE MORA E ATUALIZAÇÃO MONETÁRIA. TERMO INICIAL."
    enunciado: >
      Nas condenações por dano moral, a atualização monetária é devida a
      partir da data da decisão de arbitramento ou de alteração do valor. Os
      juros incidem desde o ajuizamento da ação, nos termos do art. 883 da
      CLT.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Res. 185/2012, DEJT divulgado em 25, 26 e 27.09.2012"
    precedentes: 20
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST440:
    numero: 440
    titulo: "AUXÍLIO-DOENÇA ACIDENTÁRIO. APOSENTADORIA POR INVALIDEZ. SUSPENSÃO DO CONTRATO DE TRABALHO. RECONHECIMENTO DO DIREITO À MANUTENÇÃO DE PLANO DE SAÚDE OU DE ASSISTÊNCIA MÉDICA."
    enunciado: >
      Assegura-se o direito à manutenção de plano de saúde ou de assistência
      médica oferecido pela empresa ao empregado, não obstante suspenso o
      contrato de trabalho em virtude de auxílio-doença acidentário ou de
      aposentadoria por invalidez.
    status: vigente
    publicacao: "2012-09-27"
    precedentes: 25
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST441:
    numero: 441
    titulo: "AVISO PRÉVIO. PROPORCIONALIDADE."
    enunciado: >
      O direito ao aviso prévio proporcional ao tempo de serviço somente é
      assegurado nas rescisões de contrato de trabalho ocorridas a partir da
      publicação da Lei nº 12.506, em 13 de outubro de 2011.
    status: vigente
    publicacao: "2012-09-27"
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST442:
    numero: 442
    titulo: "PROCEDIMENTO SUMARÍSSIMO. RECURSO DE REVISTA FUNDAMENTADO EM CONTRARIEDADE A ORIENTAÇÃO JURISPRUDENCIAL. INADMISSIBILIDADE. ART. 896, § 6º, DA CLT, ACRESCENTADO PELA LEI Nº 9.957, DE 12.01.2000."
    enunciado: >
      Nas causas sujeitas ao procedimento sumaríssimo, a admissibilidade de
      recurso de revista está limitada à demonstração de violação direta a
      dispositivo da Constituição Federal ou contrariedade a Súmula do
      Tribunal Superior do Trabalho, não se admitindo o recurso por
      contrariedade a Orientação Jurisprudencial deste Tribunal (Livro II,
      Título II, Capítulo III, do RITST), ante a ausência de previsão no art.
      896, § 6º, da CLT.
    status: vigente
    publicacao: "2012-09-27"
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST443:
    numero: 443
    titulo: "DISPENSA DISCRIMINATÓRIA. PRESUNÇÃO. EMPREGADO PORTADOR DE DOENÇA GRAVE. ESTIGMA OU PRECONCEITO. DIREITO À REINTEGRAÇÃO."
    enunciado: >
      Presume-se discriminatória a despedida de empregado portador do vírus
      HIV ou de outra doença grave que suscite estigma ou preconceito.
      Inválido o ato, o empregado tem direito à reintegração no emprego.
    status: vigente
    publicacao: "2012-09-27"
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST444:
    numero: 444
    titulo: "JORNADA DE TRABALHO. NORMA COLETIVA. LEI. ESCALA DE 12 POR 36. VALIDADE."
    enunciado: >
      É valida, em caráter excepcional, a jornada de doze horas de trabalho
      por trinta e seis de descanso, prevista em lei ou ajustada
      exclusivamente mediante acordo coletivo de trabalho ou convenção
      coletiva de trabalho, assegurada a remuneração em dobro dos feriados
      trabalhados. O empregado não tem direito ao pagamento de adicional
      referente ao labor prestado na décima primeira e décima segunda horas.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Res. 185/2012, DEJT divulgado em 25, 26 e 27.09.2012 - republicada em decorrência do despacho proferido no processo TST-PA-504.280/2012.2, DEJT divulgado em 26.11.2012"
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST445:
    numero: 445
    titulo: "INADIMPLEMENTO DE VERBAS TRABALHISTAS. FRUTOS. POSSE DE MÁ-FÉ. ART. 1.216 DO CÓDIGO CIVIL. INAPLICABILIDADE AO DIREITO DO TRABALHO."
    enunciado: >
      A indenização por frutos percebidos pela posse de má-fé, prevista no
      art. 1.216 do Código Civil, por tratar-se de regra afeta a direitos
      reais, mostra-se incompatível com o Direito do Trabalho, não sendo
      devida no caso de inadimplemento de verbas trabalhistas.
    status: vigente
    publicacao: "2013-03-15"
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST446:
    numero: 446
    titulo: "SÚMULA Nº 446 MAQUINISTA FERROVIÁRIO. INTERVALO INTRAJORNADA. SUPRESSÃO PARCIAL OU TOTAL. HORAS EXTRAS DEVIDAS. COMPATIBILIDADE ENTRE OS ARTS. 71, § 4º, E 238, § 5º, DA CLT."
    enunciado: >
      A garantia ao intervalo intrajornada, prevista no art. 71 da CLT, por
      constituir-se em medida de higiene, saúde e segurança do empregado, é
      aplicável também ao ferroviário maquinista integrante da categoria "c"
      (equipagem de trem em geral), não havendo incompatibilidade entre as
      regras inscritas nos arts. 71, § 4º, e 238, § 5º, da CLT.
    status: vigente
    publicacao: "2013-12-17"
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST447:
    numero: 447
    titulo: "SÚMULA Nº 447 ADICIONAL DE PERICULOSIDADE. PERMANÊNCIA A BORDO DURANTE O ABASTECIMENTO DA AERONAVE. INDEVIDO."
    enunciado: >
      Os tripulantes e demais empregados em serviços auxiliares de transporte
      aéreo que, no momento do abastecimento da aeronave, permanecem a bordo
      não têm direito ao adicional de periculosidade a que aludem o art. 193
      da CLT e o Anexo 2, item 1, "c", da NR 16 do MTE.
    status: vigente
    publicacao: "2013-12-17"
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST448:
    numero: 448
    titulo: "ATIVIDADE INSALUBRE. CARACTERIZAÇÃO. PREVISÃO NA NORMA REGULAMENTADORA Nº 15 DA PORTARIA DO MINISTÉRIO DO TRABALHO Nº 3.214/78. INSTALAÇÕES SANITÁRIAS."
    enunciado: >
      I - Não basta a constatação da insalubridade por meio de laudo pericial
      para que o empregado tenha direito ao respectivo adicional, sendo
      necessária a classificação da atividade insalubre na relação oficial
      elaborada pelo Ministério do Trabalho. II - A higienização de
      instalações sanitárias de uso público ou coletivo de grande circulação,
      e a respectiva coleta de lixo, por não se equiparar à limpeza em
      residências e escritórios, enseja o pagamento de adicional de
      insalubridade em grau máximo, incidindo o disposto no Anexo 14 da NR-15
      da Portaria do MTE nº 3.214/78 quanto à coleta e industrialização de
      lixo urbano.
    status: vigente
    publicacao: "2014-05-23"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST449:
    numero: 449
    titulo: "MINUTOS QUE ANTECEDEM E SUCEDEM A JORNADA DE TRA-BALHO. LEI Nº 10.243, DE 19.06.2001. NORMA COLETIVA. FLEXIBILIZAÇÃO. IMPOSSIBILIDADE."
    enunciado: >
      A partir da vigência da Lei nº 10.243, de 19.06.2001, que acrescentou o
      § 1º ao art. 58 da CLT, não mais prevalece cláusula prevista em
      convenção ou acordo coletivo que elastece o limite de 5 minutos que
      antecedem e sucedem a jornada de trabalho para fins de apuração das
      horas extras.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Conversão da Orientação Jurisprudencial nº 372 da SBDI-1 - Res. 194/2014, DEJT divulgado em DEJT divulgado em 21, 22 e 23.05.2014"
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST450:
    numero: 450
    titulo: "FÉRIAS. GOZO NA ÉPOCA PRÓPRIA. PAGAMENTO FORA DO PRAZO. DOBRA DEVIDA. ARTS. 137 E 145 DA CLT."
    enunciado: >
      É devido o pagamento em dobro da remuneração de férias, incluído o
      terço constitucional, com base no art. 137 da CLT, quando, ainda que
      gozadas na época própria, o empregador tenha descumprido o prazo
      previsto no art. 145 do mesmo diploma legal.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Súmula declarada inconstitucional pelo Supremo Tribunal Federal, no julgamento da ADPF nº 501/SC, Rel Min. Alexandre de Moraes, DJE de 18/08/2022 Conversão da Orientação Jurisprudencial nº 386 da SBDI..."
    precedentes: 28
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST451:
    numero: 451
    titulo: "PARTICIPAÇÃO NOS LUCROS E RESULTADOS. RESCISÃO CONTRATUAL ANTERIOR À DATA DA DISTRIBUIÇÃO DOS LU-CROS. PAGAMENTO PROPORCIONAL AOS MESES TRABALHADOS. PRINCÍPIO DA ISONOMIA."
    enunciado: >
      Fere o princípio da isonomia instituir vantagem mediante acordo
      coletivo ou norma regulamentar que condiciona a percepção da parcela
      participação nos lucros e resultados ao fato de estar o contrato de
      trabalho em vigor na data prevista para a distribuição dos lucros.
      Assim, inclusive na rescisão contra-tual antecipada, é devido o
      pagamento da parcela de forma proporcional aos meses trabalhados, pois
      o ex-empregado concorreu para os resultados positivos da empresa.
    status: vigente
    publicacao: "2014-05-23"
    precedentes: 26
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST452:
    numero: 452
    titulo: "DIFERENÇAS SALARIAIS. PLANO DE CARGOS E SALÁRIOS. DESCUMPRIMENTO. CRITÉRIOS DE PROMOÇÃO NÃO OBSERVADOS. PRESCRIÇÃO PARCIAL."
    enunciado: >
      Tratando-se de pedido de pagamento de diferenças salariais decorrentes
      da inobservância dos critérios de promoção estabelecidos em Plano de
      Cargos e Salários criado pela empresa, a prescrição aplicável é a
      parcial, pois a lesão é sucessiva e se renova mês a mês.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Conversão da Orientação Jurisprudencial nº 404 da SBDI-1 - Res. 194/2014, DEJT divulgado em 21, 22 e 23.05.2014"
    precedentes: 30
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST453:
    numero: 453
    titulo: "ADICIONAL DE PERICULOSIDADE. PAGAMENTO ESPONTÂNEO. CARACTERIZAÇÃO DE FATO INCONTROVERSO. DESNECES-SÁRIA A PERÍCIA DE QUE TRATA O ART. 195 DA CLT."
    enunciado: >
      O pagamento de adicional de periculosidade efetuado por mera
      liberalidade da empresa, ainda que de forma proporcional ao tempo de
      exposição ao risco ou em percentual inferior ao máximo legalmente
      previsto, dispensa a realização da prova técnica exigida pelo art. 195
      da CLT, pois torna incontroversa a existência do trabalho em condições
      perigosas.
    status: vigente
    publicacao: "2014-05-23"
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST454:
    numero: 454
    titulo: "COMPETÊNCIA DA JUSTIÇA DO TRABALHO. EXECUÇÃO DE OFÍCIO. CONTRIBUIÇÃO SOCIAL REFERENTE AO SEGURO DE ACIDENTE DE TRABALHO (SAT). ARTS. 114, VIII, E 195, I, \"A\", DA CONSTITUIÇÃO DA REPÚBLICA."
    enunciado: >
      Compete à Justiça do Trabalho a execução, de ofício, da contribuição
      referente ao Seguro de Acidente de Trabalho (SAT), que tem natureza de
      contribuição para a seguridade social (arts. 114, VIII, e 195, I, "a",
      da CF), pois se destina ao financiamento de benefícios relativos à
      incapacidade do empregado decorrente de infortúnio no trabalho (arts.
      11 e 22 da Lei nº 8.212/1991).
    status: vigente
    publicacao: "2014-05-23"
    precedentes: 23
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST455:
    numero: 455
    titulo: "EQUIPARAÇÃO SALARIAL. SOCIEDADE DE ECONOMIA MISTA. ART. 37, XIII, DA CF/1988. POSSIBILIDADE."
    enunciado: >
      À sociedade de economia mista não se aplica a vedação à equiparação
      prevista no art. 37, XIII, da CF/1988, pois, ao admitir empregados sob
      o regime da CLT, equipara-se a empregador privado, conforme disposto no
      art. 173, § 1º, II, da CF/1988.
    status: vigente
    publicacao: "2014-05-23"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST456:
    numero: 456
    titulo: "REPRESENTAÇÃO. PESSOA JURÍDICA. PROCURAÇÃO. INVALIDADE. IDENTIFICAÇÃO DO OUTORGANTE E DE SEU REPRESENTANTE."
    enunciado: >
      I - É inválido o instrumento de mandato firmado em nome de pessoa
      jurídica que não contenha, pelo menos, o nome do outorgante e do
      signatário da procuração, pois estes dados constituem elementosque os
      individualizam. II - Verificada a irregularidade de representação da
      parte na instância originária, o juiz designará prazo de 5 (cinco) dias
      para que seja sanado o vício. Descumprida a determinação, extinguirá o
      processo, sem resolução de mérito, se a providência couber ao
      reclamante, ou considerará revel o reclamado, se a providência lhe
      couber (art. 76, § 1º, do CPC de 2015). III - Caso a irregularidade de
      representação da parte seja constatada em fase recursal, o relator
      designará prazo de 5 (cinco) dias para que seja sanado o vício.
      Descumprida a determinação, o relator não conhecerá do recurso, se a
      providência couber ao recorrente, ou determinará o desentranhamento das
      contrarrazões, se a providência couber ao recorrido (art. 76, § 2º, do
      CPC de2015).
    status: alterada
    publicacao: "2016-08-26T03:00:00-03"
    historico: "Redação original (conversão da Orientação Jurisprudencial nº 373 da SBDI-1 com nova redação) ¿ Res. 194/2014, DEJT divulgado em 21, 22 e 23.05.2014 É inválido o instrumento de mandato firmado em nome ..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST457:
    numero: 457
    titulo: "HONORÁRIOS PERICIAIS. BENEFICIÁRIO DA JUSTIÇA GRATUITA. RESPONSABILIDADE DA UNIÃO PELO PAGAMENTO. RE-SOLUÇÃO Nº 66/2010 DO CSJT. OBSERVÂNCIA."
    enunciado: >
      A União é responsável pelo pagamento dos honorários de perito quando a
      parte sucumbente no objeto da perícia for beneficiária da assistência
      judiciária gratuita, observado o procedimento disposto nos arts. 1º, 2º
      e 5º da Resolução n.º 66/2010 do Conselho Superior da Justiça do
      Trabalho - CSJT.
    status: vigente
    publicacao: "2014-05-23"
    historico: "Conversão da Orientação Jurisprudencial nº 387 da SBDI-1 com nova redação."
    precedentes: 26
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST458:
    numero: 458
    titulo: "EMBARGOS. PROCEDIMENTO SUMARÍSSIMO. CONHECIMEN-TO. RECURSO INTERPOSTO APÓS VIGÊNCIA DA LEI Nº 11.496, DE 22.06.2007, QUE CONFERIU NOVA REDAÇÃO AO ART. 894, DA CLT."
    enunciado: >
      Em causas sujeitas ao procedimento sumaríssimo, em que pese a limitação
      imposta no art. 896, § 6º, da CLT à interposição de recurso de revista,
      admitem-se os embargos interpostos na vigência da Lei nº 11.496, de
      22.06.2007, que conferiu nova redação ao art. 894 da CLT, quando
      demonstrada a divergência jurisprudencial entre Turmas do TST, fundada
      em interpretações diversas acerca da aplicação de mesmo dispositivo
      constitucional ou de matéria sumulada.
    status: vigente
    publicacao: "2014-05-23"
    precedentes: 12
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST459:
    numero: 459
    titulo: "RECURSO DE REVISTA. NULIDADE POR NEGATIVA DE PRESTAÇÃO JURISDICIONAL."
    enunciado: >
      O conhecimento do recurso de revista, quanto à preliminar de nulidade,
      por negativa de prestação jurisdicional, supõe indicação de violação do
      art. 832 da CLT, do art. 489 do CPC de 2015 (art. 458 do CPC de 1973)
      ou do art. 93, IX, da CF/1988.
    status: alterada
    publicacao: "2017-07-14"
    historico: "(conversão da Orientação Jurisprudencial nº 115 da SBDI-1) ¿ Res. 197/2015, DEJT divulgado em 14, 15 e 18.05.2015 O conhecimento do recurso de revista, quanto à preliminar de nulidade por negativa de ..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST460:
    numero: 460
    titulo: "VALE-TRANSPORTE. ÔNUS DA PROVA."
    enunciado: >
      É do empregador o ônus de comprovar que o empregado não satisfaz os
      requisitos indispensáveis para a concessão do vale-transporte ou não
      pretenda fazer uso do benefício.
    status: vigente
    publicacao: "2016-06-03T03:00:00-03"
    precedentes: 23
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST461:
    numero: 461
    titulo: "FGTS. DIFERENÇAS. RECOLHIMENTO. ÔNUS DA PROVA."
    enunciado: >
      É do empregador o ônus da prova em relação à regularidade dos depósitos
      do FGTS, pois o pagamento é fato extintivo do direito do autor (art.
      373, II, do CPC de 2015).
    status: vigente
    publicacao: "2016-06-03"
    precedentes: 26
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST462:
    numero: 462
    titulo: "MULTA DO ART. 477, § 8º, DA CLT. INCIDÊNCIA. RECONHECIMENTO JUDICIAL DA RELAÇÃO DE EMPREGO."
    enunciado: >
      A circunstância de a relação de emprego ter sido reconhecida apenas em
      juízo não tem o condão de afastar a incidência da multa prevista no
      art. 477, §8º, da CLT. A referida multa não será devida apenas quando,
      comprovadamente, o empregado der causa à mora no pagamento das verbas
      rescisórias.
    status: alterada
    publicacao: "2016-06-03T03:00:00-03"
    historico: "Res. 209/2016, DEJT divulgado em 01, 02 e 03.06.2016 A circunstância de a relação de emprego ter sido reconhecido apenas em juízo não tem o condão de afastar a incidência da multa prevista no art. 477..."
    precedentes: 21
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST463:
    numero: 463
    titulo: "ASSISTÊNCIA JUDICIÁRIA GRATUITA. COMPROVAÇÃO."
    enunciado: >
      I - A partir de 26.06.2017, para a concessão da assistência judiciária
      gratuita à pessoa natural, basta a declaração de hipossuficiência
      econômica firmada pela parte ou por seu advogado, desde que munido de
      procuração com poderes específicos para esse fim (art. 105 do CPC de
      2015); II - No caso de pessoa jurídica, não basta a mera declaração: é
      necessária a demonstração cabal de impossibilidade de a parte arcar com
      as despesas do processo.
    status: vigente
    publicacao: "2017-07-14"
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

