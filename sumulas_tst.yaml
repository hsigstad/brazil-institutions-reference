# TST Súmulas — scraped from jurisprudencia.tst.jus.br
# 463 entries, scraped 2026-04-16
#
# Resolved via `STST<number>` backtick citations in cite.py.
# TST súmulas are non-binding but operationally authoritative
# in the Justiça do Trabalho.

sumulas:
  STST1:
    numero: 1
    titulo: "PRAZO JUDICIAL."
    enunciado: >
      Quando a intimação tiver lugar na sexta-feira, ou a publicação com
      efeito de intimação for feita nesse dia, o prazo judicial será contado
      da segunda-feira imediata, inclusive, salvo se não houver expediente,
      caso em que fluirá no dia útil que se seguir.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST2:
    numero: 2
    titulo: "GRATIFICAÇÃO NATALINA."
    enunciado: >
      É devida a gratificação natalina proporcional (Lei nº 4.090, de 1962)
      na extinção dos contratos a prazo, entre estes incluídos os de safra,
      ainda que a relação de emprego haja findado antes de dezembro.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST3:
    numero: 3
    titulo: "GRATIFICAÇÃO NATALINA."
    enunciado: >
      É devida a gratificação natalina proporcional (Lei nº 4.090, de 1962)
      na cessação da relação de emprego resultante da aposentadoria do
      trabalhador, ainda que verificada antes de dezembro.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST4:
    numero: 4
    titulo: "CUSTAS."
    enunciado: >
      As pessoas jurídicas de direito público não estão sujeitas a prévio
      pagamento de custas, nem a depósito da importância da condenação, para
      o processamento de recurso na Justiça do Trabalho.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST5:
    numero: 5
    titulo: "REAJUSTAMENTO SALARIAL."
    enunciado: >
      O reajustamento salarial coletivo, determinado no curso do aviso
      prévio, beneficia o empregado pré-avisado da despedida, mesmo que tenha
      recebido antecipadamente os salários correspondentes ao período do
      aviso, que integra o seu tempo de serviço para todos os efeitos legais.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST6:
    numero: 6
    titulo: "EQUIPARAÇÃO SALARIAL. ART. 461 DA CLT."
    enunciado: >
      I - Para os fins previstos no § 2º do art. 461 da CLT, só é válido o
      quadro de pessoal organizado em carreira quando homologado pelo
      Ministério do Trabalho, excluindo-se, apenas, dessa exigência o quadro
      de carreira das entidades de direito público da administração direta,
      autárquica e fundacional aprovado por ato administrativo da autoridade
      competente. (item cancelado por perda de eficácia a partir de
      11/11/2017, pela Lei 13.467/2017, Res. 225/2025 ¿ DEJT divulgado em
      30.06, 01 e 02.07.2025) II - Para efeito de equiparação de salários em
      caso de trabalho igual, conta-se o tempo de serviço na função e não no
      emprego. (item cancelado por perda de eficácia a partir de 11/11/2017,
      pela Lei 13.467/2017, Res. 225/2025 ¿ DEJT divulgado em 30.06, 01 e
      02.07.2025) III - A equiparação salarial só é possível se o empregado e
      o paradigma exercerem a mesma função, desempenhando as mesmas tarefas,
      não importando se os cargos têm, ou não, a mesma denominação. (ex-OJ da
      SBDI-1 nº 328 - DJ 09.12.2003). IV - É desnecessário que, ao tempo da
      reclamação sobre equiparação salarial, reclamante e paradigma estejam a
      serviço do estabelecimento, desde que o pedido se relacione com
      situação pretérita. (ex-Súmula nº 22 - RA 57/1970, DO-GB 27.11.1970). V
      - A cessão de empregados não exclui a equiparação salarial, embora
      exercida a função em órgão governamental estranho à cedente, se esta
      responde pelos salários do paradigma e do reclamante. (ex-Súmula nº 111
      - RA 102/1980, DJ 25.09.1980). VI - Presentes os pressupostos do art.
      461 da CLT, é irrelevante a circunstância de que o desnível salarial
      tenha origem em decisão judicial que beneficiou o paradigma, exceto: a)
      se decorrente de vantagem pessoal ou de tese jurídica superada pela
      jurisprudência de Corte Superior; b) na hipótese de equiparação
      salarial em cadeia, suscitada em defesa, se o empregador produzir prova
      do alegado fato modificativo, impeditivo ou extintivo do direito à
      equiparação salarial em relação ao paradigma remoto, considerada
      irrelevante, para esse efeito, a existência de diferença de tempo de
      serviço na função superior a dois anos entre o reclamante e os
      empregados paradigmas componentes da cadeia equiparatória, à exceção do
      paradigma imediato. (alínea cancelada por perda de eficácia a partir de
      11/11/2017, pela Lei 13.467/2017, Res. 225/2025 ¿ DEJT divulgado em
      30.06, 01 e 02.07.2025) VII - Desde que atendidos os requisitos do art.
      461 da CLT, é possível a equiparação salarial de trabalho intelectual,
      que pode ser avaliado por sua perfeição técnica, cuja aferição terá
      critérios objetivos. (ex-OJ da SBDI-1 nº 298 - DJ 11.08.2003). VIII - É
      do empregador o ônus da prova do fato impeditivo, modificativo ou
      extintivo da equiparação salarial. (ex-Súmula nº 68 - RA 9/1977, DJ
      11.02.1977). IX - Na ação de equiparação salarial, a prescrição é
      parcial e só alcança as diferenças salariais vencidas no período de 5
      (cinco) anos que precedeu o ajuizamento. (ex-Súmula nº 274 - alterada
      pela Res. 121/2003, DJ 21.11.2003). X - O conceito de "mesma
      localidade" de que trata o art. 461 da CLT refere-se, em princípio, ao
      mesmo município, ou a municípios distintos que, comprovadamente,
      pertençam à mesma região metropolitana. (item cancelado por perda de
      eficácia a partir de 11/11/2017, pela Lei 13.467/2017, Res. 225/2025 ¿
      DEJT divulgado em 30.06, 01 e 02.07.2025)
    status: alterada
    publicacao: "2025-07-02"
    historico: "Item I - ex-Súmula nº 06 - alterada pela Res. 104/2000, DJ 20.12.2000 Item II - ex-Súmula nº 135 - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Item X - ex-OJ da SBDI-1 nº 252 - inserida em 13.03.2002 I..."
    precedentes: 77
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST7:
    numero: 7
    titulo: "FÉRIAS."
    enunciado: >
      A indenização pelo não-deferimento das férias no tempo oportuno será
      calculada com base na remuneração devida ao empregado na época da
      reclamação ou, se for o caso, na da extinção do contrato.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original RA 28/1969, DO-GB 21.08.1969 Nº 7 A indenização pelo não deferimento das férias no tempo oportuno será calculada com base na remuneração devida ao empregado à época da reclamação ou, ..."
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST8:
    numero: 8
    titulo: "JUNTADA DE DOCUMENTO."
    enunciado: >
      A juntada de documentos na fase recursal só se justifica quando provado
      o justo impedimento para sua oportuna apresentação ou se referir a fato
      posterior à sentença.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST9:
    numero: 9
    titulo: "AUSÊNCIA DO RECLAMANTE."
    enunciado: >
      A ausência do reclamante, quando adiada a instrução após contestada a
      ação em audiência, não importa arquivamento do processo.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST10:
    numero: 10
    titulo: "PROFESSOR. DISPENSA SEM JUSTA CAUSA. TÉRMINO DO ANO LETIVO OU NO CURSO DE FÉRIAS ESCOLARES. AVISO PRÉVIO."
    enunciado: >
      O direito aos salários do período de férias escolares assegurado aos
      professores (art. 322, caput e § 3º, da CLT) não exclui o direito ao
      aviso prévio, na hipótese de dispensa sem justa causa ao término do ano
      letivo ou no curso das férias escolares.
    status: alterada
    publicacao: "2012-09-27"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 10 Professor Redação original - RA 28/1969, DO-GB 21.08.1969 Nº 10 Professor É assegurado aos professores o pagamento dos salários no período ..."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST11:
    numero: 11
    titulo: "HONORÁRIOS DE ADVOGADO."
    enunciado: >
      É inaplicável na Justiça do Trabalho o disposto no art. 64 do Código de
      Processo Civil, sendo os honorários de advogado somente devidos nos
      termos do preceituado na Lei nº 1.060, de 1950.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST12:
    numero: 12
    titulo: "CARTEIRA PROFISSIONAL."
    enunciado: >
      As anotações apostas pelo empregador na carteira profissional do
      empregado não geram presunção "juris et de jure", mas apenas "juris
      tantum".
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST13:
    numero: 13
    titulo: "MORA."
    enunciado: >
      O só pagamento dos salários atrasados em audiência não ilide a mora
      capaz de determinar a rescisão do contrato de trabalho.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST14:
    numero: 14
    titulo: "CULPA RECÍPROCA."
    enunciado: >
      Reconhecida a culpa recíproca na rescisão do contrato de trabalho (art.
      484 da CLT), o empregado tem direito a 50% (cinqüenta por cento) do
      valor do aviso prévio, do décimo terceiro salário e das férias
      proporcionais.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969 Nº 14 Reconhecida a culpa recíproca na rescisão do contrato de trabalho (art. 484 da CLT), o empregado não fará jus ao aviso prévio, às férias proporcio..."
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST15:
    numero: 15
    titulo: "ATESTADO MÉDICO."
    enunciado: >
      A justificação da ausência do empregado motivada por doença, para a
      percepção do salário-enfermidade e da remuneração do repouso semanal,
      deve observar a ordem preferencial dos atestados médicos estabelecida
      em lei.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST16:
    numero: 16
    titulo: "NOTIFICAÇÃO."
    enunciado: >
      Presume-se recebida a notificação 48 (quarenta e oito) horas depois de
      sua postagem. O seu não-recebimento ou a entrega após o decurso desse
      prazo constitui ônus de prova do destinatário.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969 Nº 16 Presume-se recebida a notificação 48 horas depois de sua regular expedição. O seu não recebimento ou a entrega após o decurso desse prazo constitu..."
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST17:
    numero: 17
    titulo: "ADICIONAL DE INSALUBRIDADE."
    enunciado: >
      O adicional de insalubridade devido a empregado que, por força de lei,
      convenção coletiva ou sentença normativa, percebe salário profissional
      será sobre este calculado.
    status: cancelada
    publicacao: "2008-07-10"
    historico: "Súmula restaurada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Súmula cancelada - Res. 29/1994, DJ 12, 17 e 19.05.1994 Redação original RA 28/1969, DO-GB 21.08.1969 Nº 17 O adicional-insalubridade devido a..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST18:
    numero: 18
    titulo: "COMPENSAÇÃO."
    enunciado: >
      A compensação, na Justiça do Trabalho, está restrita a dívidas de
      natureza trabalhista.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003. Redação original - RA 28/1969, DO-GB 21.08.1969."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST19:
    numero: 19
    titulo: "QUADRO DE CARREIRA."
    enunciado: >
      A Justiça do Trabalho é competente para apreciar reclamação de
      empregado que tenha por objeto direito fundado em quadro de carreira.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 28/1969, DO-GB 21.08.1969 Nº 19 A Justiça do Trabalho é competente para apreciar reclamação de empregado que tenha por objeto direito fundado no quadro de carreira."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST20:
    numero: 20
    titulo: "RESILIÇÃO CONTRATUAL."
    enunciado: >
      Não obstante o pagamento da indenização de antigüidade, presume-se em
      fraude à lei a resilição contratual, se o empregado permaneceu
      prestando serviço ou tiver sido, em curto prazo, readmitido.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 106/2001, DJ 21, 22 e 23.03.2001 Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST21:
    numero: 21
    titulo: "APOSENTADORIA."
    enunciado: >
      O empregado aposentado tem direito ao cômputo do tempo anterior à
      aposentadoria, se permanecer a serviço da empresa ou a ela retornar.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 30/1994, DJ 12, 16 e 18.05.1994 Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST22:
    numero: 22
    titulo: "EQUIPARAÇÃO SALARIAL."
    enunciado: >
      É desnecessário que, ao tempo da reclamação sobre equiparação salarial,
      reclamante e paradigma estejam a serviço do estabelecimento, desde que
      o pedido se relacione com situação pretérita.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 57/70, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST23:
    numero: 23
    titulo: "RECURSO."
    enunciado: >
      Não se conhece de recurso de revista ou de embargos, se a decisão
      recorrida resolver determinado item do pedido por diversos fundamentos
      e a jurisprudência transcrita não abranger a todos.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970 Nº 23 Não se conhece da revista ou dos embargos, quando a decisão recorrida resolver determinado item do pedido por diversos fundamentos, e a jurisprudê..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST24:
    numero: 24
    titulo: "SERVIÇO EXTRAORDINÁRIO."
    enunciado: >
      Insere-se no cálculo da indenização por antigüidade o salário relativo
      a serviço extraordinário, desde que habitualmente prestado.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST25:
    numero: 25
    titulo: "CUSTAS PROCESSUAIS. INVERSÃO DO ÔNUS DA SUCUMBÊNCIA."
    enunciado: >
      I - A parte vencedora na primeira instância, se vencida na segunda,
      está obrigada, independentemente de intimação, a pagar as custas
      fixadas na sentença originária, das quais ficara isenta a parte então
      vencida; II - No caso de inversão do ônus da sucumbência em segundo
      grau, sem acréscimo ou atualização do valor das custas e se estas já
      foram devidamente recolhidas, descabe um novo pagamento pela parte
      vencida, ao recorrer. Deverá ao final, se sucumbente, reembolsar a
      quantia; (ex-OJ nº 186 da SBDI-I) III - Não caracteriza deserção a
      hipótese em que, acrescido o valor da condenação, não houve fixação ou
      cálculo do valor devido a título de custas e tampouco intimação da
      parte para o preparo do recurso, devendo ser as custas pagas ao final;
      (ex-OJ nº 104 da SBDI-I) IV - O reembolso das custas à parte vencedora
      faz-se necessário mesmo na hipótese em que a parte vencida for pessoa
      isenta do seu pagamento, nos termos do art. 790-A, parágrafo único, da
      CLT.
    status: alterada
    publicacao: "2015-05-18"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 25 Custas. A parte vencedora na primeira instância, se vencida na segunda, está obrigada, independen-temente de intimação, a pagar as custas f..."
    precedentes: 25
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST26:
    numero: 26
    titulo: "ESTABILIDADE."
    enunciado: >
      Presume-se obstativa à estabilidade a despedida, sem justo motivo, do
      empregado que alcançar nove anos de serviço na empresa.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST27:
    numero: 27
    titulo: "COMISSIONISTA."
    enunciado: >
      É devida a remuneração do repouso semanal e dos dias feriados ao
      empregado comissionista, ainda que pracista.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST28:
    numero: 28
    titulo: "INDENIZAÇÃO."
    enunciado: >
      No caso de se converter a reintegração em indenização dobrada, o
      direito aos salários é assegurado até a data da primeira decisão que
      determinou essa conversão.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970 Nº 28 No caso de se converter a reintegração em indenização dobrada, o direito aos salários é assegurado até a data da sentença constitutiva que põe fim..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST29:
    numero: 29
    titulo: "TRANSFERÊNCIA."
    enunciado: >
      Empregado transferido, por ato unilateral do empregador, para local
      mais distante de sua residência, tem direito a suplemento salarial
      correspondente ao acréscimo da despesa de transporte.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST30:
    numero: 30
    titulo: "INTIMAÇÃO DA SENTENÇA."
    enunciado: >
      Quando não juntada a ata ao processo em 48 horas, contadas da audiência
      de julgamento (art. 851, § 2º, da CLT), o prazo para recurso será
      contado da data em que a parte receber a intimação da sentença.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST31:
    numero: 31
    titulo: "AVISO PRÉVIO."
    enunciado: >
      É incabível o aviso prévio na despedida indireta.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 31/1994, DJ 12, 16 e 18.05.1994 Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST32:
    numero: 32
    titulo: "ABANDONO DE EMPREGO."
    enunciado: >
      Presume-se o abandono de emprego se o trabalhador não retornar ao
      serviço no prazo de 30 (trinta) dias após a cessação do benefício
      previdenciário nem justificar o motivo de não o fazer.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970 Nº 32 Configura-se o abandono de emprego quando o trabalhador não retornar ao serviço no prazo de 30 dias após a cessação do benefício previdenciário, n..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST33:
    numero: 33
    titulo: "MANDADO DE SEGURANÇA. DECISÃO JUDICIAL TRANSITADA EM JULGADO."
    enunciado: >
      Não cabe mandado de segurança de decisão judicial transitada em
      julgado.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970 Nº 33 Não cabe mandado de segurança contra decisão judicial transitada em julgado."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST34:
    numero: 34
    titulo: "GRATIFICAÇÃO NATALINA."
    enunciado: >
      A gratificação natalina, instituída pela Lei nº 4.090, de 1962, é
      devida ao empregado rural.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST35:
    numero: 35
    titulo: "DEPÓSITO RECURSAL. COMPLEMENTAÇÃO."
    enunciado: >
      A majoração do salário mínimo não obriga o recorrente a complementar o
      depósito de que trata o art. 899 da CLT.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST36:
    numero: 36
    titulo: "CUSTAS"
    enunciado: >
      Nas ações plúrimas, as custas incidem sobre o respectivo valor global.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 57/1970, DO-GB 27.11.1970 Nº 36 Nas ações plúrimas as custas incidem sobre o respectivo valor global."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST37:
    numero: 37
    titulo: "PRAZO."
    enunciado: >
      O prazo para recurso da parte que não comparece à audiência de
      julgamento, apesar de notificada, conta-se da intimação da sentença.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 32/1994, DJ 12, 17 e 19.05.1994 Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST38:
    numero: 38
    titulo: "RECURSO."
    enunciado: >
      Para comprovação da divergência justificadora do recurso é necessário
      que o recorrente junte certidão, ou documento equivalente, do acórdão
      paradigma ou faça transcrição do trecho pertinente à hipótese,
      indicando sua origem e esclarecendo a fonte da publicação, isto é,
      órgão oficial ou repertório idôneo de jurisprudência.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 337 - Res. 35/1994, DJ 18, 21 e 22.11.1994 - Republicada DJ 30.11.1994, 01 e 02.12.1994 Redação original - RA 57/1970, DO-GB 27.11.1970"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST39:
    numero: 39
    titulo: "PERICULOSIDADE."
    enunciado: >
      Os empregados que operam em bomba de gasolina têm direito ao adicional
      de periculosidade (Lei nº 2.573, de 15.08.1955).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST40:
    numero: 40
    titulo: "PROCESSO ADMINISTRATIVO."
    enunciado: >
      Não cabe recurso ao Tribunal Superior do Trabalho contra decisão em
      processo administrativo, de interesse de funcionário, proferida por
      Tribunal Regional do Trabalho.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 321 - Res. 13/1993, DJ 29.11.1993, 01 e 03.12.1993 Revista pela Súmula nº 302 - Res. 1/1990, DJ 02.04.1990 Redação original - RA 41/1973, DJ 14.06.1973"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST41:
    numero: 41
    titulo: "QUITAÇÃO."
    enunciado: >
      A quitação, nas hipóteses dos §§ 1º e 2º do art. 477 da CLT concerne
      exclusivamente aos valores discriminados no documento respectivo.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 330 - Res. 22/1993, DJ 21 e 28.12.1993 e 04.01.1994 Redação original - RA 41/1973, DJ 14.06.1973"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST42:
    numero: 42
    titulo: "RECURSO."
    enunciado: >
      Não ensejam o conhecimento de revista ou de embargos decisões superadas
      por iterativa, notória e atual jurisprudência do Pleno.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 333 - Res. 25/1994, DJ 12, 17 e 19.05.1994 Redação original - RA 41/1973, DJ 14.06.1973"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST43:
    numero: 43
    titulo: "TRANSFERÊNCIA."
    enunciado: >
      Presume-se abusiva a transferência de que trata o § 1º do art. 469 da
      CLT, sem comprovação da necessidade do serviço.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST44:
    numero: 44
    titulo: "AVISO PRÉVIO."
    enunciado: >
      A cessação da atividade da empresa, com o pagamento da indenização,
      simples ou em dobro, não exclui, por si só, o direito do empregado ao
      aviso prévio.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST45:
    numero: 45
    titulo: "SERVIÇO SUPLEMENTAR."
    enunciado: >
      A remuneração do serviço suplementar, habitualmente prestado, integra o
      cálculo da gratificação natalina prevista na Lei nº 4.090, de
      13.07.1962.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973 Nº 45 A remuneração do serviço suplementar, habitualmente prestado, integra o cálculo da gratificação natalina prevista na Lei nº 4.090 de 1962."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST46:
    numero: 46
    titulo: "ACIDENTE DE TRABALHO."
    enunciado: >
      As faltas ou ausências decorrentes de acidente do trabalho não são
      consideradas para os efeitos de duração de férias e cálculo da
      gratificação natalina.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST47:
    numero: 47
    titulo: "INSALUBRIDADE."
    enunciado: >
      O trabalho executado em condições insalubres, em caráter intermitente,
      não afasta, só por essa circunstância, o direito à percepção do
      respectivo adicional.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973 Nº 47 O trabalho executado, em caráter intermitente, em condições insalubres, não afasta, só por essa circunstância, o direito à percepção do respectivo ad..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST48:
    numero: 48
    titulo: "COMPENSAÇÃO."
    enunciado: >
      A compensação só poderá ser argüida com a contestação.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST49:
    numero: 49
    titulo: "INQUÉRITO JUDICIAL."
    enunciado: >
      No inquérito judicial, contadas e não pagas as custas no prazo fixado
      pelo juízo, será determinado o arquivamento do processo.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST50:
    numero: 50
    titulo: "GRATIFICAÇÃO NATALINA."
    enunciado: >
      A gratificação natalina, instituída pela Lei nº 4.090, de 13.07.1962, é
      devida pela empresa cessionária ao servidor público cedido enquanto
      durar a cessão.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973 Nº 50 A gratificação natalina, instituída pela Lei nº 4.090, de 1962, é devida pela empresa cessionária ao servidor público cedido enquanto durar a cessão."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST51:
    numero: 51
    titulo: "NORMA REGULAMENTAR. VANTAGENS E OPÇÃO PELO NOVO REGULAMENTO. ART. 468 DA CLT."
    enunciado: >
      I - As cláusulas regulamentares, que revoguem ou alterem vantagens
      deferidas anteriormente, só atingirão os trabalhadores admitidos após a
      revogação ou alteração do regulamento. (ex-Súmula nº 51 - RA 41/1973,
      DJ 14.06.1973) II - Havendo a coexistência de dois regulamentos da
      empresa, a opção do empregado por um deles tem efeito jurídico de
      renúncia às regras do sistema do outro. (ex-OJ nº 163 da SBDI-1 -
      inserida em 26.03.1999)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 41/73, DJ 14.06.1973 Nº 51 Vantagens As cláusulas regulamentares, que revoguem ou alterem vantagens deferidas anteriormente..."
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST52:
    numero: 52
    titulo: "TEMPO DE SERVIÇO."
    enunciado: >
      O adicional de tempo de serviço (qüinqüênio) é devido, nas condições
      estabelecidas no art. 19 da Lei nº 4.345, de 26.06.1964, aos
      contratados sob o regime da CLT, pela empresa a que se refere a
      mencionada lei, inclusive para o fim de complementação de
      aposentadoria.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973 Nº 52 O adicional de tempo de serviço (qüinqüênios) é devido, nas condições estabelecidas no art. 19 da Lei nº 4.345, de 1964, aos contratados sob regime d..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST53:
    numero: 53
    titulo: "CUSTAS."
    enunciado: >
      O prazo para pagamento das custas, no caso de recurso, é contado da
      intimação do cálculo.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 41/1973, DJ 14.06.1973"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST54:
    numero: 54
    titulo: "OPTANTE."
    enunciado: >
      Rescindindo por acordo seu contrato de trabalho, o empregado estável
      optante tem direito ao mínimo de 60% (sessenta por cento) do total da
      indenização em dobro, calculada sobre o maior salário percebido no
      emprego. Se houver recebido menos do que esse total, qualquer que tenha
      sido a forma de transação, assegura-se-lhe a complementação até aquele
      limite.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 105/1974, DJ 24.10.1974 Nº 54 Rescindindo por acordo seu contrato de trabalho, o empregado estável optante tem direito ao mínimo de 60% do total da indenização em dobro, calculad..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST55:
    numero: 55
    titulo: "FINANCEIRAS."
    enunciado: >
      As empresas de crédito, financiamento ou investimento, também
      denominadas financeiras, equiparam-se aos estabelecimentos bancários
      para os efeitos do art. 224 da CLT.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 105/1974, DJ 24.10.1974"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST56:
    numero: 56
    titulo: "BALCONISTA."
    enunciado: >
      O balconista que recebe comissão tem direito ao adicional de 20% (vinte
      por cento) pelo trabalho em horas extras, calculado sobre o valor das
      comissões referentes a essas horas.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 340 - Res. 40/1995, DJ 17, 20 e 21.02.1995 Redação original - RA 105/1974, DJ 24.10.1974 Nº 56 O balconista que recebe comissão tem direito ao adicional de 20% pelo trabalho em ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST57:
    numero: 57
    titulo: "TRABALHADOR RURAL."
    enunciado: >
      Os trabalhadores agrícolas das usinas de açúcar integram categoria
      profissional de industriários, beneficiando-se dos aumentos normativos
      obtidos pela referida categoria.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 3/1993, DJ 06, 10 e 12.05.1993 Redação original - RA 105/1974, DJ 24.10.1974"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST58:
    numero: 58
    titulo: "PESSOAL DE OBRAS."
    enunciado: >
      Ao empregado admitido como pessoal de obras, em caráter permanente e
      não amparado pelo regime estatutário, aplica-se a legislação
      trabalhista.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 105/1974, DJ 24.10.1974"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST59:
    numero: 59
    titulo: "VIGIA."
    enunciado: >
      Vigia de estabelecimento bancário não se beneficia da jornada de
      trabalho reduzida prevista no art. 224 da CLT.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 105/1974, DJ 24.10.1974"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST60:
    numero: 60
    titulo: "ADICIONAL NOTURNO. INTEGRAÇÃO NO SALÁRIO E PRORROGAÇÃO EM HORÁRIO DIURNO."
    enunciado: >
      I - O adicional noturno, pago com habitualidade, integra o salário do
      empregado para todos os efeitos. (ex-Súmula nº 60 - RA 105/1974, DJ
      24.10.1974) II - Cumprida integralmente a jornada no período noturno e
      prorrogada esta, devido é também o adicional quanto às horas
      prorrogadas. Exegese do art. 73, § 5º, da CLT. (ex-OJ nº 6 da SBDI-1 -
      inserida em 25.11.1996)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 105/1974, DJ 24.10.1974 Nº 60 Adicional noturno O adicional noturno, pago com habitualidade, integra o salário do empregado..."
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST61:
    numero: 61
    titulo: "FERROVIÁRIO."
    enunciado: >
      Aos ferroviários que trabalham em estação do interior, assim
      classificada por autoridade competente, não são devidas horas extras
      (art. 243 da CLT).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 105/1974, DJ 24.10.1974 Nº 61 Aos ferroviários que trabalham em estação do interior, assim classificada por autoridade competente, não são devidas horas extras (CLT, art.243)."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST62:
    numero: 62
    titulo: "ABANDONO DE EMPREGO."
    enunciado: >
      O prazo de decadência do direito do empregador de ajuizar inquérito em
      face do empregado que incorre em abandono de emprego é contado a partir
      do momento em que o empregado pretendeu seu retorno ao serviço.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 105/1974, DJ 24.10.1974 Nº 62 O prazo de decadência do direito do empregador de ajuizar inquérito contra o empregado que incorre em abandono de emprego, é contado a partir do mom..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST63:
    numero: 63
    titulo: "FUNDO DE GARANTIA."
    enunciado: >
      A contribuição para o Fundo de Garantia do Tempo de Serviço incide
      sobre a remuneração mensal devida ao empregado, inclusive horas extras
      e adicionais eventuais.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 105/1974, DJ 24.10.1974"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST64:
    numero: 64
    titulo: "PRESCRIÇÃO."
    enunciado: >
      A prescrição para reclamar contra anotação de carteira profissional, ou
      omissão desta, flui da data de cessação do contrato de trabalho.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 52/1975, DJ 05.06.1975"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST65:
    numero: 65
    titulo: "VIGIA."
    enunciado: >
      O direito à hora reduzida de 52 minutos e 30 segundos aplica-se ao
      vigia noturno.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 5/1976, DJ 26.02.1976 Nº 65 O direito à hora reduzida para 52 (cinqüenta e dois) minutos e 30 (trinta) segundos aplica-se ao vigia noturno."
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST66:
    numero: 66
    titulo: "TEMPO DE SERVIÇO."
    enunciado: >
      Os qüinqüênios devidos ao pessoal da Rede Ferroviária Federal S.A.
      serão calculados sobre o salário do cargo efetivo, ainda que o
      trabalhador exerça cargo ou função em comissão.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 7/1977, DJ 11.02.1977"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST67:
    numero: 67
    titulo: "GRATIFICAÇÃO. FERROVIÁRIO."
    enunciado: >
      Chefe de trem, regido pelo estatuto dos ferroviários (Decreto nº
      35.530, de 19.09.1959), não tem direito à gratificação prevista no
      respectivo art. 110.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 8/1977, DJ 11.02.1977 Nº 67 Chefe de trem, regido pelo Estatuto dos Ferroviários (Decreto nº 35.530, de 19 de setembro de 1959), não tem direito à gratificação prevista no respec..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST68:
    numero: 68
    titulo: "PROVA."
    enunciado: >
      É do empregador o ônus da prova do fato impeditivo, modificativo ou
      extintivo da equiparação salarial.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - (RA 9/1977, DJ 11.02.1977)"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST69:
    numero: 69
    titulo: "RESCISÃO DO CONTRATO."
    enunciado: >
      A partir da Lei nº 10.272, de 05.09.2001, havendo rescisão do contrato
      de trabalho e sendo revel e confesso quanto à matéria de fato, deve ser
      o empregador condenado ao pagamento das verbas rescisórias, não
      quitadas na primeira audiência, com acréscimo de 50% (cinqüenta por
      cento).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 10/1977, DJ 11.02.1977 Nº 69 Havendo rescisão contratual e sendo revel e confesso o empregador quanto à matéria de fato, deve ser condenado ao pagamento em dobro dos salários inc..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST70:
    numero: 70
    titulo: "ADICIONAL DE PERICULOSIDADE."
    enunciado: >
      O adicional de periculosidade não incide sobre os triênios pagos pela
      Petrobras.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    precedentes: 13
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST71:
    numero: 71
    titulo: "ALÇADA."
    enunciado: >
      A alçada é fixada pelo valor dado à causa na data de seu ajuizamento,
      desde que não impugnado, sendo inalterável no curso do processo.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST72:
    numero: 72
    titulo: "APOSENTADORIA."
    enunciado: >
      O prêmio-aposentadoria instituído por norma regulamentar da empresa não
      está condicionado ao disposto no § 2º do art. 14 da Lei nº 8.036, de
      11.05.1990.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 72 O prêmio-aposentadoria instituído por norma regulamentar da empresa não está condicionado ao disposto no § 3º do art. 17 da Lei nº 5.107/1966."
    precedentes: 11
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST73:
    numero: 73
    titulo: "DESPEDIDA. JUSTA CAUSA."
    enunciado: >
      A ocorrência de justa causa, salvo a de abandono de emprego, no decurso
      do prazo do aviso prévio dado pelo empregador, retira do empregado
      qualquer direito às verbas rescisórias de natureza indenizatória.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 73 Falta grave. Falta grave, salvo a de abandono de emprego, praticada pelo empregado no decurso do prazo do aviso prévio dado pelo empregador, retira à..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST74:
    numero: 74
    titulo: "CONFISSÃO."
    enunciado: >
      I - Aplica-se a confissão à parte que, expressamente intimada com
      aquela cominação, não comparecer à audiência em prosseguimento, na qual
      deveria depor. (ex-Súmula nº 74 - RA 69/1978, DJ 26.09.1978) II - A
      prova pré-constituída nos autos pode ser levada em conta para confronto
      com a confissão ficta (arts. 442 e 443, do CPC de 2015 - art. 400, I,
      do CPC de 1973), não implicando cerceamento de defesa o indeferimento
      de provas posteriores. (ex-OJ nº 184 da SBDI-1 - inserida em
      08.11.2000) III- A vedação à produção de prova posterior pela parte
      confessa somente a ela se aplica, não afetando o exercício, pelo
      magistrado, do poder/dever de conduzir o processo.
    status: alterada
    publicacao: "2016-04-26"
    historico: "Súmula alterada - Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011 Nº 74. Confissão (nova redação do item I e inserido o item III à redação em decorrência do julgamento do processo TST-IUJEEDRR 80..."
    precedentes: 21
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST75:
    numero: 75
    titulo: "FERROVIÁRIO."
    enunciado: >
      É incompetente a Justiça do Trabalho para conhecer de ação de
      ferroviário oriundo das empresas Sorocabana, São Paulo-Minas e
      Araraquarense, que mantém a condição de funcionário público.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST76:
    numero: 76
    titulo: "HORAS EXTRAS."
    enunciado: >
      O valor das horas suplementares prestadas habitualmente, por mais de 2
      (dois) anos, ou durante todo o contrato, se suprimidas, integra-se ao
      salário para todos os efeitos legais.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 291 - Res. 1/1989, DJ 14.18 e 19.04.1989 Redação original - RA 69/1978, DJ 26.09.1978"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST77:
    numero: 77
    titulo: "PUNIÇÃO."
    enunciado: >
      Nula é a punição de empregado se não precedida de inquérito ou
      sindicância internos a que se obrigou a empresa por norma regulamentar.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 77 Nula é a punição de empregado se não precedida de inquérito ou sindicância internos a que se obrigou a empresa, por norma regulamentar."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST78:
    numero: 78
    titulo: "GRATIFICAÇÃO."
    enunciado: >
      A gratificação periódica contratual integra o salário, pelo seu
      duodécimo, para todos os efeitos legais, inclusive o cálculo da
      natalina da Lei nº 4.090/1962.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST79:
    numero: 79
    titulo: "TEMPO DE SERVIÇO."
    enunciado: >
      O adicional de antigüidade, pago pela Fepasa, calcula-se sobre o
      salário-base.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST80:
    numero: 80
    titulo: "INSALUBRIDADE."
    enunciado: >
      A eliminação da insalubridade mediante fornecimento de aparelhos
      protetores aprovados pelo órgão competente do Poder Executivo exclui a
      percepção do respectivo adicional.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 80 A eliminação da insalubridade pelo fornecimento de aparelhos protetores aprovados pelo órgão competente do Poder Executivo exclui a percepção do adic..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST81:
    numero: 81
    titulo: "FÉRIAS."
    enunciado: >
      Os dias de férias gozados após o período legal de concessão deverão ser
      remunerados em dobro.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 81 Os dias de férias, gozados após o período legal de concessão, deverão ser remunerados em dobro."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST82:
    numero: 82
    titulo: "ASSISTÊNCIA."
    enunciado: >
      A intervenção assistencial, simples ou adesiva, só é admissível se
      demonstrado o interesse jurídico e não o meramente econômico.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 82 A intervenção assistencial, simples ou adesiva, só é admissível se demonstrado o interesse jurídico e não o meramente econômico, perante a Justiça on..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST83:
    numero: 83
    titulo: "AÇÃO RESCISÓRIA. MATÉRIA CONTROVERTIDA."
    enunciado: >
      I - Não procede pedido formulado na ação rescisória por violação
      literal de lei se a decisão rescindenda estiver baseada em texto legal
      infraconstitucional de interpretação controvertida nos Tribunais.
      (ex-Súmula nº 83 - alterada pela Res. 121/2003, DJ 21.11.2003) II - O
      marco divisor quanto a ser, ou não, controvertida, nos Tribunais, a
      interpretação dos dispositivos legais citados na ação rescisória é a
      data da inclusão, na Orientação Jurisprudencial do TST, da matéria
      discutida. (ex-OJ nº 77 da SBDI-2 - inserida em 13.03.2002)
    status: alterada
    publicacao: "2005-08-24"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 83 Ação Rescisória Não procede o pedido formulado na ação rescisória por violação literal de lei se a decisão rescindenda estiver baseada em ..."
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST84:
    numero: 84
    titulo: "ADICIONAL REGIONAL."
    enunciado: >
      O adicional regional, instituído pela Petrobras, não contraria o art.
      7º, XXXII, da CF/1988.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 84 O adicional regional, instituído pela Petrobras, não contraria o art. 165, item XVII, da Constituição."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST85:
    numero: 85
    titulo: "COMPENSAÇÃO DE JORNADA."
    enunciado: >
      I - A compensação de jornada de trabalho deve ser ajustada por acordo
      individual escrito, acordo coletivo ou convenção coletiva. (ex-Súmula
      nº 85 - primeira parte - alterada pela Res. 121/2003, DJ 21.11.2003) II
      - O acordo individual para compensação de horas é válido, salvo se
      houver norma coletiva em sentido contrário. (ex-OJ nº 182 da SBDI-1 -
      inserida em 08.11.2000) III - O mero não atendimento das exigências
      legais para a compensação de jornada, inclusive quando encetada
      mediante acordo tácito, não implica a repetição do pagamento das horas
      excedentes à jornada normal diária, se não dilatada a jornada máxima
      semanal, sendo devido apenas o respectivo adicional. (ex-Súmula nº 85 -
      segunda parte - alterada pela Res. 121/2003, DJ 21.11.2003) IV - A
      prestação de horas extras habituais descaracteriza o acordo de
      compensação de jornada. Nesta hipótese, as horas que ultrapassarem a
      jornada semanal normal deverão ser pagas como horas extraordinárias e,
      quanto àquelas destinadas à compensação, deverá ser pago a mais apenas
      o adicional por trabalho extraordinário. (ex-OJ nº 220 da SBDI-1 -
      inserida em 20.06.2001) V - As disposições contidas nesta súmula não se
      aplicam ao regime compensatório na modalidade banco de horas, que
      somente pode ser instituído por negociação coletiva. VI - Não é válido
      acordo de compensação de jornada em atividade insalubre, ainda que
      estipulado em norma coletiva, sem a necessária inspeção prévia e
      permissão da autoridade competente, na forma do art. 60 da CLT.
    status: alterada
    publicacao: "2016-06-03T03:00:00-03"
    historico: "Súmula alterada - Res. 174/2011, DEJT divulgado em 27, 30 e 31.05.2011 Nº 85. Compensação de jornada (inserido o item V) Súmula alterada - Res. 129/2005, DJ 20, 22 e 25.04.2005 Nº 85.Compensação de jo..."
    precedentes: 68
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST86:
    numero: 86
    titulo: "DESERÇÃO. MASSA FALIDA. EMPRESA EM LIQUIDAÇÃO EXTRAJUDICIAL."
    enunciado: >
      Não ocorre deserção de recurso da massa falida por falta de pagamento
      de custas ou de depósito do valor da condenação. Esse privilégio,
      todavia, não se aplica à empresa em liquidação extrajudicial. (primeira
      parte - ex-Súmula nº 86 - RA 69/78, DJ 26.09.1978; segunda parte -
      ex-OJ nº 31 da SBDI-1 - inserida em 14.03.1994)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 86 Não ocorre deserção de recurso da massa falida por falta de pagamento de custas ou de depósito do valor da condenação. Redação original - R..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST87:
    numero: 87
    titulo: "PREVIDÊNCIA PRIVADA."
    enunciado: >
      Se o empregado, ou seu beneficiário, já recebeu da instituição
      previdenciária privada, criada pela empresa, vantagem equivalente, é
      cabível a dedução de seu valor do benefício a que faz jus por norma
      regulamentar anterior.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978 Nº 87 Se o empregado, ou seu beneficiário, já recebeu da instituição previdenciária privada, criada pela empresa, vantagem equivalente, é cabível a dedução..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST88:
    numero: 88
    titulo: "JORNADA DE TRABALHO. INTERVALO ENTRE TURNOS."
    enunciado: >
      O desrespeito ao intervalo mínimo entre dois turnos de trabalho, sem
      importar em excesso na jornada efetivamente trabalhada, não dá direito
      a qualquer ressarcimento ao obreiro, por tratar-se apenas de infração
      sujeita a penalidade administrativa (art. 71 da CLT).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 42/1995, DJ 17, 20 e 21.02.1995 Redação original - RA 69/1978, DJ 26.09.1978"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST89:
    numero: 89
    titulo: "FALTA AO SERVIÇO."
    enunciado: >
      Se as faltas já são justificadas pela lei, consideram-se como ausências
      legais e não serão descontadas para o cálculo do período de férias.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    precedentes: 11
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST90:
    numero: 90
    titulo: "HORAS \"IN ITINERE\". TEMPO DE SERVIÇO."
    enunciado: >
      I - O tempo despendido pelo empregado, em condução fornecida pelo
      empregador, até o local de trabalho de difícil acesso, ou não servido
      por transporte público regular, e para o seu retorno é computável na
      jornada de trabalho. (ex-Súmula nº 90 - RA 80/1978, DJ 10.11.1978) II -
      A incompatibilidade entre os horários de início e término da jornada do
      empregado e os do transporte público regular é circunstância que também
      gera o direito às horas "in itinere". (ex-OJ nº 50 da SBDI-1 - inserida
      em 01.02.1995) III - A mera insuficiência de transporte público não
      enseja o pagamento de horas "in itinere". (ex-Súmula nº 324 Res.
      16/1993, DJ 21.12.1993) IV - Se houver transporte público regular em
      parte do trajeto percorrido em condução da empresa, as horas "in
      itinere" remuneradas limitam-se ao trecho não alcançado pelo transporte
      público. (ex-Súmula nº 325 Res. 17/1993, DJ 21.12.1993) V -
      Considerando que as horas "in itinere" são computáveis na jornada de
      trabalho, o tempo que extrapola a jornada legal é considerado como
      extraordinário e sobre ele deve incidir o adicional respectivo. (ex-OJ
      nº 236 da SBDI-1 - inserida em 20.06.2001)
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Incorporadas as Súmulas nºs 324 e 325 e as Orientações Jurisprudenciais nºs 50 e 236 da SBDI-1 - Res. 129/2005, DJ 20, 22 e 25.04.2005 Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Súmula alt..."
    precedentes: 53
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST91:
    numero: 91
    titulo: "SALÁRIO COMPLESSIVO."
    enunciado: >
      Nula é a cláusula contratual que fixa determinada importância ou
      percentagem para atender englobadamente vários direitos legais ou
      contratuais do trabalhador.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST92:
    numero: 92
    titulo: "APOSENTADORIA."
    enunciado: >
      O direito à complementação de aposentadoria, criado pela empresa, com
      requisitos próprios, não se altera pela instituição de benefício
      previdenciário por órgão oficial.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 69/1978, DJ 26.09.1978"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST93:
    numero: 93
    titulo: "BANCÁRIO."
    enunciado: >
      Integra a remuneração do bancário a vantagem pecuniária por ele
      auferida na colocação ou na venda de papéis ou valores mobiliários de
      empresas pertencentes ao mesmo grupo econômico, se exercida essa
      atividade no horário e no local de trabalho e com o consentimento,
      tácito ou expresso, do banco empregador.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 121/1979, DJ 27.11.1979 Nº 93 Integra a remuneração do bancário a vantagem pecuniária por ele auferida na colocação ou na venda de papéis ou valores mobiliários de empresas perte..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST94:
    numero: 94
    titulo: "HORAS EXTRAS."
    enunciado: >
      O valor das horas extraordinárias habituais integra o aviso prévio
      indenizado.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 43/1980, DJ 15.05.1980 - Republicada Res. 80/1980, DJ 04.07.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST95:
    numero: 95
    titulo: "PRESCRIÇÃO TRINTENÁRIA. FGTS."
    enunciado: >
      É trintenária a prescrição do direito de reclamar contra o não
      recolhimento da contribuição para o Fundo de Garantia do Tempo de
      Serviço. (Cancelada em decorrência da sua incorporação à nova redação
      da Súmula nº 362)
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - (RA 44/1980, DJ 15.05.1980)"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST96:
    numero: 96
    titulo: "MARÍTIMO."
    enunciado: >
      A permanência do tripulante a bordo do navio, no período de repouso,
      além da jornada, não importa presunção de que esteja à disposição do
      empregador ou em regime de prorrogação de horário, circunstâncias que
      devem resultar provadas, dada a natureza do serviço.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 45/1980, DJ 16.05.1980 Nº 96 A permanência do tripulante a bordo do navio, no período de repouso, além da jornada, não importa em presunção de que esteja à disposição do empregad..."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST97:
    numero: 97
    titulo: "APOSENTADORIA. COMPLEMENTAÇÃO."
    enunciado: >
      Instituída complementação de aposentadoria por ato da empresa,
      expressamente dependente de regulamentação, as condições desta devem
      ser observadas como parte integrante da norma.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Súmula alterada RA 96/1980, DJ 11.09.1980 Nº 97 Instituída complementação de aposentadoria, por ato da empresa, expressamente dependente de sua regulamentação, as condições desta devem ser observadas ..."
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST98:
    numero: 98
    titulo: "FGTS. INDENIZAÇÃO. EQUIVALÊNCIA. COMPATIBILIDADE."
    enunciado: >
      I - A equivalência entre os regimes do Fundo de Garantia do Tempo de
      Serviço e da estabilidade prevista na CLT é meramente jurídica e não
      econômica, sendo indevidos valores a título de reposição de diferenças.
      (ex-Súmula nº 98 - RA 57/1980, DJ 06.06.1980) II - A estabilidade
      contratual ou a derivada de regulamento de empresa são compatíveis com
      o regime do FGTS. Diversamente ocorre com a estabilidade legal
      (decenal, art. 492 da CLT), que é renunciada com a opção pelo FGTS.
      (ex-OJ nº 299 da SBDI-1 - DJ 11.08.2003)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 98 FGTS. Indenização. Equivalência A equivalência entre os regimes do Fundo de Garantia do Tempo de Serviço e da estabilidade prevista na CLT ..."
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST99:
    numero: 99
    titulo: "AÇÃO RESCISÓRIA. DESERÇÃO. PRAZO."
    enunciado: >
      Havendo recurso ordinário em sede de rescisória, o depósito recursal só
      é exigível quando for julgado procedente o pedido e imposta condenação
      em pecúnia, devendo este ser efetuado no prazo recursal, no limite e
      nos termos da legislação vigente, sob pena de deserção. (ex-Súmula nº
      99 - alterada pela Res. 110/2002, DJ 15.04.2002 - e ex-OJ nº 117 da
      SBDI-2 - DJ 11.08.2003)
    status: alterada
    publicacao: "2005-08-24"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 99 Ao recorrer de decisão condenatória em ação rescisória, é ônus do empregador vencido efetuar, no prazo, no limite e nos termos da legislaçã..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST100:
    numero: 100
    titulo: "AÇÃO RESCISÓRIA. DECADÊNCIA."
    enunciado: >
      I - O prazo de decadência, na ação rescisória, conta-se do dia
      imediatamente subseqüente ao trânsito em julgado da última decisão
      proferida na causa, seja de mérito ou não. (ex-Súmula nº 100 - alterada
      pela Res. 109/2001, DJ 20.04.2001) II - Havendo recurso parcial no
      processo principal, o trânsito em julgado dá-se em momentos e em
      tribunais diferentes, contando-se o prazo decadencial para a ação
      rescisória do trânsito em julgado de cada decisão, salvo se o recurso
      tratar de preliminar ou prejudicial que possa tornar insubsistente a
      decisão recorrida, hipótese em que flui a decadência a partir do
      trânsito em julgado da decisão que julgar o recurso parcial. (ex-Súmula
      nº 100 - alterada pela Res. 109/2001, DJ 20.04.2001) III - Salvo se
      houver dúvida razoável, a interposição de recurso intempestivo ou a
      interposição de recurso incabível não protrai o termo inicial do prazo
      decadencial. (ex-Súmula nº 100 - alterada pela Res. 109/2001, DJ
      20.04.2001) IV - O juízo rescindente não está adstrito à certidão de
      trânsito em julgado juntada com a ação rescisória, podendo formar sua
      convicção através de outros elementos dos autos quanto à antecipação ou
      postergação do "dies a quo" do prazo decadencial. (ex-OJ nº 102 da
      SBDI-2 - DJ 29.04.2003) V - O acordo homologado judicialmente tem força
      de decisão irrecorrível, na forma do art. 831 da CLT. Assim sendo, o
      termo conciliatório transita em julgado na data da sua homologação
      judicial. (ex-OJ nº 104 da SBDI-2 - DJ 29.04.2003) VI - Na hipótese de
      colusão das partes, o prazo decadencial da ação rescisória somente
      começa a fluir para o Ministério Público, que não interveio no processo
      principal, a partir do momento em que tem ciência da fraude. (ex-OJ nº
      122 da SBDI-2 - DJ 11.08.2003) VII - Não ofende o princípio do duplo
      grau de jurisdição a decisão do TST que, após afastar a decadência em
      sede de recurso ordinário, aprecia desde logo a lide, se a causa versar
      questão exclusivamente de direito e estiver em condições de imediato
      julgamento. (ex-OJ nº 79 da SBDI-2 - inserida em 13.03.2002) VIII - A
      exceção de incompetência, ainda que oposta no prazo recursal, sem ter
      sido aviado o recurso próprio, não tem o condão de afastar a consumação
      da coisa julgada e, assim, postergar o termo inicial do prazo
      decadencial para a ação rescisória. (ex-OJ nº 16 da SBDI-2 - inserida
      em 20.09.2000) IX - Prorroga-se até o primeiro dia útil, imediatamente
      subseqüente, o prazo decadencial para ajuizamento de ação rescisória
      quando expira em férias forenses, feriados, finais de semana ou em dia
      em que não houver expediente forense. Aplicação do art. 775 da CLT.
      (ex-OJ nº 13 da SBDI-2 - inserida em 20.09.2000) X - Conta-se o prazo
      decadencial da ação rescisória, após o decurso do prazo legal previsto
      para a interposição do recurso extraordinário, apenas quando esgotadas
      todas as vias recursais ordinárias. (ex-OJ nº 145 da SBDI-2 - DJ
      10.11.2004)
    status: alterada
    publicacao: "2005-08-24"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Súmula alterada - Res. 109/2001, DJ 18, 19 e 20.04.2001 Nº 100 AÇÃO RESCISÓRIA. DECADÊNCIA I - O prazo de decadência, na ação rescisória, conta-s..."
    precedentes: 48
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST101:
    numero: 101
    titulo: "DIÁRIAS DE VIAGEM. SALÁRIO."
    enunciado: >
      Integram o salário, pelo seu valor total e para efeitos indenizatórios,
      as diárias de viagem que excedam a 50% (cinqüenta por cento) do salário
      do empregado, enquanto perdurarem as viagens. (primeira parte -
      ex-Súmula nº 101 - RA 65/1980, DJ 18.06.1980; segunda parte - ex-OJ nº
      292 da SBDI-1 - inserida em 11.08.2003)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 101 Diárias de viagem. Salário Integram o salário, pelo seu valor total e para efeitos indenizatórios, as diárias de viagem que excedam a 50% ..."
    precedentes: 16
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST102:
    numero: 102
    titulo: "BANCÁRIO. CARGO DE CONFIANÇA."
    enunciado: >
      I - A configuração, ou não, do exercício da função de confiança a que
      se refere o art. 224, § 2º, da CLT, dependente da prova das reais
      atribuições do empregado, é insuscetível de exame mediante recurso de
      revista ou de embargos. (ex-Súmula nº 204 - alterada pela Res.
      121/2003, DJ 21.11.2003) II - O bancário que exerce a função a que se
      refere o § 2º do art. 224 da CLT e recebe gratificação não inferior a
      um terço de seu salário já tem remuneradas as duas horas
      extraordinárias excedentes de seis. (ex-Súmula nº 166 - RA 102/1982, DJ
      11.10.1982 e DJ 15.10.1982) III - Ao bancário exercente de cargo de
      confiança previsto no artigo 224, § 2º, da CLT são devidas as 7ª e 8ª
      horas, como extras, no período em que se verificar o pagamento a menor
      da gratificação de 1/3. (ex-OJ nº 288 da SBDI-1 - DJ 11.08.2003) IV - O
      bancário sujeito à regra do art. 224, § 2º, da CLT cumpre jornada de
      trabalho de 8 (oito) horas, sendo extraordinárias as trabalhadas além
      da oitava. (ex-Súmula nº 232- RA 14/1985, DJ 19.09.1985) V - O advogado
      empregado de banco, pelo simples exercício da advocacia, não exerce
      cargo de confiança, não se enquadrando, portanto, na hipótese do § 2º
      do art. 224 da CLT. (ex-OJ nº 222 da SBDI-1 - inserida em 20.06.2001)
      VI - O caixa bancário, ainda que caixa executivo, não exerce cargo de
      confiança. Se perceber gratificação igual ou superior a um terço do
      salário do posto efetivo, essa remunera apenas a maior responsabilidade
      do cargo e não as duas horas extraordinárias além da sexta. (ex-Súmula
      nº 102 - RA 66/1980, DJ 18.06.1980 e republicada DJ 14.07.1980) VII - O
      bancário exercente de função de confiança, que percebe a gratificação
      não inferior ao terço legal, ainda que norma coletiva contemple
      percentual superior, não tem direito às sétima e oitava horas como
      extras, mas tão somente às diferenças de gratificação de função, se
      postuladas. (ex-OJ nº 15 da SBDI-1 - inserida em 14.03.1994)
    status: alterada
    publicacao: "2011-05-31"
    historico: "Súmula alterada - Res. 129/2005, DJ 20, 22 e 25.04.2005 Nº 102 Bancário. Cargo de confiança (incorporadas as Súmulas nºs 166, 204 e 232 e as Orientações Jurisprudenciais nºs 15, 222 e 288 da SBDI-1) (..."
    precedentes: 39
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST103:
    numero: 103
    titulo: "TEMPO DE SERVIÇO. LICENÇA-PRÊMIO."
    enunciado: >
      Os trabalhadores que hajam prestado serviço no regime da Lei nº 1.890,
      de 13.06.1953, e optado pelo regime estatutário, não contam,
      posteriormente, esse período para fins de licença-prêmio, privativa de
      servidores estatutários.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 67/1980, DJ 18.06.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST104:
    numero: 104
    titulo: "FÉRIAS. TRABALHADOR RURAL."
    enunciado: >
      É devido o pagamento de férias ao rurícola, qualquer que tenha sido a
      data de sua admissão e, em dobro, se não concedidas na época prevista
      em lei.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 70/1980, DJ 21.07.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST105:
    numero: 105
    titulo: "FUNCIONÁRIO PÚBLICO. QUINQUÊNIOS."
    enunciado: >
      O empregado estatutário que optar pelo regime celetista, com o
      congelamento dos qüinqüênios em seus valores à época, não tem direito
      ao reajuste posterior dos seus níveis.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 71/1980, DJ 21.07.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST106:
    numero: 106
    titulo: "APOSENTADORIA. FERROVIÁRIO. COMPETÊNCIA."
    enunciado: >
      É incompetente a Justiça do Trabalho para julgar ação ajuizada em face
      da Rede Ferroviária Federal, em que ex-empregado desta pleiteie
      complementação de aposentadoria, elaboração ou alteração de folhas de
      pagamento de aposentados, se por essas obrigações responde órgão da
      previdência social.
    status: cancelada
    publicacao: "2009-09-09"
    historico: "Súmula mantida - Res. 121/2003 - DJ 19, 20 e 21.1.2003 Redação original - RA 72/1980, DJ 21.07.1980 Nº 106 É incompetente a Justiça do Trabalho para julgar ação contra a Rede Ferroviária Federal, em q..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST107:
    numero: 107
    titulo: "AÇÃO RESCISÓRIA. PROVA."
    enunciado: >
      É indispensável a juntada à inicial da ação rescisória da prova do
      trânsito em julgado da decisão rescindenda, sob pena de indeferimento
      liminar.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Cancelada pela Súmula nº 299 - Res. 9/1989, DJ 14, 18 e 19.04.1989 Redação original - RA 74/1980, DJ 21.07.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST108:
    numero: 108
    titulo: "COMPENSAÇÃO DE HORÁRIO. ACORDO."
    enunciado: >
      A compensação de horário semanal deve ser ajustada por acordo escrito,
      não necessariamente em acordo coletivo ou convenção coletiva, exceto
      quanto ao trabalho da mulher.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 85/1998, DJ 20, 21 e 24.08.1998 Redação original - RA 75/1980, DJ 21.07.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST109:
    numero: 109
    titulo: "GRATIFICAÇÃO DE FUNÇÃO."
    enunciado: >
      O bancário não enquadrado no § 2º do art. 224 da CLT, que receba
      gratificação de função, não pode ter o salário relativo a horas
      extraordinárias compensado com o valor daquela vantagem.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Súmula alterada - RA 97/1980, DJ 19.09.1980 Redação original - RA 89/1980, DJ 29.08.1980 Nº 109 A gratificação de função prevista no § 2º, do artigo 224, da Consolidação das Leis do Trabalho, não é co..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST110:
    numero: 110
    titulo: "JORNADA DE TRABALHO. INTERVALO."
    enunciado: >
      No regime de revezamento, as horas trabalhadas em seguida ao repouso
      semanal de 24 horas, com prejuízo do intervalo mínimo de 11 horas
      consecutivas para descanso entre jornadas, devem ser remuneradas como
      extraordinárias, inclusive com o respectivo adicional.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 101/1980, DJ 25.09.1980"
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST111:
    numero: 111
    titulo: "EQUIPARAÇÃO SALARIAL."
    enunciado: >
      A cessão de empregados não exclui a equiparação salarial, embora
      exercida a função em órgão governamental estranho à cedente, se esta
      responde pelos salários do paradigma e do reclamante.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 102/1980, DJ 25.09.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST112:
    numero: 112
    titulo: "TRABALHO NOTURNO. PETRÓLEO."
    enunciado: >
      O trabalho noturno dos empregados nas atividades de exploração,
      perfuração, produção e refinação do petróleo, industrialização do
      xisto, indústria petroquímica e transporte de petróleo e seus
      derivados, por meio de dutos, é regulado pela Lei nº 5.811, de
      11.10.1972, não se lhe aplicando a hora reduzida de 52 minutos e 30
      segundos prevista no art. 73, § 1º, da CLT.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 107/1980, DJ 10.10.1980 Nº 112 O trabalho noturno dos empregados nas atividades de exploração, perfuração, produção e refinação do petróleo, industrialização do xisto, indústria ..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST113:
    numero: 113
    titulo: "BANCÁRIO. SÁBADO. DIA ÚTIL."
    enunciado: >
      O sábado do bancário é dia útil não trabalhado, não dia de repouso
      remunerado. Não cabe a repercussão do pagamento de horas extras
      habituais em sua remuneração.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 115/1980, DJ 03.11.1980 Nº 113 O sábado do bancário é dia útil não trabalhado e não dia de repouso remunerado, não cabendo assim a repercussão do pagamento de horas extras habitu..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST114:
    numero: 114
    titulo: "PRESCRIÇÃO INTERCORRENTE."
    enunciado: >
      É inaplicável na Justiça do Trabalho a prescrição intercorrente.
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003. Redação original - RA 116/1980, DJ 03.11.1980."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST115:
    numero: 115
    titulo: "HORAS EXTRAS. GRATIFICAÇÕES SEMESTRAIS."
    enunciado: >
      O valor das horas extras habituais integra a remuneração do trabalhador
      para o cálculo das gratificações semestrais.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 117/1980, DJ 03.11.1980 Nº 115 O valor das horas extras habituais integra o ordenado do trabalhador para cálculo das gratificações semestrais."
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST116:
    numero: 116
    titulo: "FUNCIONÁRIO PÚBLICO. CEDIDO. REAJUSTE SALARIAL."
    enunciado: >
      Os funcionários públicos cedidos à Rede Ferroviária Federal S.A. têm
      direito ao reajustamento salarial determinado pelo art. 5º da Lei nº
      4.345/1964.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 252 - Res. 18/1985, DJ 13, 14 e 15.01.1986. Redação original - RA 118/1980, DJ 03.11.1980"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST117:
    numero: 117
    titulo: "BANCÁRIO. CATEGORIA DIFERENCIADA."
    enunciado: >
      Não se beneficiam do regime legal relativo aos bancários os empregados
      de estabelecimento de crédito pertencentes a categorias profissionais
      diferenciadas.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 140/1980, DJ 18.12.1980"
    precedentes: 8
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST118:
    numero: 118
    titulo: "JORNADA DE TRABALHO. HORAS EXTRAS."
    enunciado: >
      Os intervalos concedidos pelo empregador na jornada de trabalho, não
      previstos em lei, representam tempo à disposição da empresa,
      remunerados como serviço extraordinário, se acrescidos ao final da
      jornada.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 12/1981, DJ 19.03.1981 Nº 118 Os intervalos concedidos pelo empregador, na jornada de trabalho, não previstos em lei, representam tempo à disposição da empresa, remunerados como ..."
    precedentes: 15
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST119:
    numero: 119
    titulo: "JORNADA DE TRABALHO."
    enunciado: >
      Os empregados de empresas distribuidoras e corretoras de títulos e
      valores mobiliários não têm direito à jornada especial dos bancários.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 13/1981, DJ 19.03.1981"
    precedentes: 11
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST120:
    numero: 120
    titulo: "EQUIPARAÇÃO SALARIAL. DECISÃO JUDICIAL."
    enunciado: >
      Presentes os pressupostos do art. 461 da CLT, é irrelevante a
      circunstância de que o desnível salarial tenha origem em decisão
      judicial que beneficiou o paradigma, exceto se decorrente de vantagem
      pessoal ou de tese jurídica superada pela jurisprudência de Corte
      Superior.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Súmula alterada - Res. 100/2000, DJ 18, 19 e 20.09.2000 Nº 120 Equiparação salarial. Decisão judicial. Presentes os pressupostos do art. 461 da C..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST121:
    numero: 121
    titulo: "FUNCIONÁRIO PÚBLICO. GRATIFICAÇÃO DE PRODUTIVIDADE."
    enunciado: >
      Não tem direito a percepção da gratificação de produtividade, na forma
      do regime estatutário, o servidor de ex-autarquia administradora de
      porto que opta pelo regime jurídico da Consolidação das Leis do
      Trabalho.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 15/1981, DJ 19.03.1981"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST122:
    numero: 122
    titulo: "REVELIA. ATESTADO MÉDICO."
    enunciado: >
      A reclamada, ausente à audiência em que deveria apresentar defesa, é
      revel, ainda que presente seu advogado munido de procuração, podendo
      ser ilidida a revelia mediante a apresentação de atestado médico, que
      deverá declarar, expressamente, a impossibilidade de locomoção do
      empregador ou do seu preposto no dia da audiência. (primeira parte -
      ex-OJ nº 74 da SBDI-1 - inserida em 25.11.1996; segunda parte -
      ex-Súmula nº 122 - alterada pela Res. 121/2003, DJ 21.11.2003)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 122 Atestado médico. Revelia Para ilidir a revelia, o atestado médico deve declarar expressamente a impossibilidade de locomoção do empregado..."
    precedentes: 16
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST123:
    numero: 123
    titulo: "COMPETÊNCIA. ART. 106 DA CF."
    enunciado: >
      Em se tratando de Estado ou Município, a lei que estabelece o regime
      jurídico (art. 106 da Constituição Federal) do servidor temporário ou
      contratado é a estadual ou municipal, a qual, uma vez editada, apanha
      as situações preexistentes, fazendo cessar sua regência pelo regime
      trabalhista. Incompetente é a Justiça do Trabalho para julgar as
      reclamações ajuizadas posteriormente à vigência da lei especial.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 81/1981, DJ 06.10.1981 - Republicada DJ 13.10.1981"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST124:
    numero: 124
    titulo: "BANCÁRIO. SALÁRIO-HORA. DIVISOR."
    enunciado: >
      I - O divisor aplicável para o cálculo das horas extras do bancário
      será: a)180, para os empregados submetidos à jornada de seis horas
      prevista no caput do art. 224 da CLT; b) 220, para os empregados
      submetidos à jornada de oito horas, nos termos do § 2º do art. 224 da
      CLT. II - Ressalvam-se da aplicação do item anterior as decisões de
      mérito sobre o tema, qualquer que seja o s eu teor, emanadas de Turma
      do TST ou da SBDI-I, no período de 27/09/2012 até 21/11/2016, conforme
      a modulação aprovada no precedente obrigatório firmado no Incidente de
      Recursos de Revista Repetitivos nº TST-IRR-849-83.2013.5.03.0138, DEJT
      19.12.2016.
    status: alterada
    publicacao: "2017-07-14"
    historico: "Súmula alterada - redação alterada na sessão do Tribunal Pleno realizada em 14.09.2012 - Res. 185/2012¿ DEJT divulgado em 25, 26 e 27.09.2012 Nº 124 Bancário. Hora de salário. Divisor I - O divisor ap..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST125:
    numero: 125
    titulo: "CONTRATO DE TRABALHO. ART. 479 DA CLT."
    enunciado: >
      O art. 479 da CLT aplica-se ao trabalhador optante pelo FGTS admitido
      mediante contrato por prazo determinado, nos termos do art. 30, § 3º,
      do Decreto nº 59.820, de 20.12.1966.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 83/1981, DJ 06.10.1981 Nº 125 O artigo 479, da CLT, aplica-se ao trabalhador optante pelo FGTS, admitido mediante contrato por prazo determinado, nos termos do art. 30, § 3º, do ..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST126:
    numero: 126
    titulo: "RECURSO. CABIMENTO."
    enunciado: >
      Incabível o recurso de revista ou de embargos (arts. 896 e 894, "b", da
      CLT) para reexame de fatos e provas.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 84/1981, DJ 06.10.1981 Nº 126 Incabível o recurso de revista ou de embargos (arts. 896 e 894, letra b da CLT) para reexame de fatos e provas."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST127:
    numero: 127
    titulo: "QUADRO DE CARREIRA."
    enunciado: >
      Quadro de pessoal organizado em carreira, aprovado pelo órgão
      competente, excluída a hipótese de equiparação salarial, não obsta
      reclamação fundada em preterição, enquadramento ou reclassificação.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 103/1981, DJ 12.11.1981"
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST128:
    numero: 128
    titulo: "DEPÓSITO RECURSAL."
    enunciado: >
      I - É ônus da parte recorrente efetuar o depósito legal, integralmente,
      em relação a cada novo recurso interposto, sob pena de deserção.
      Atingido o valor da condenação, nenhum depósito mais é exigido para
      qualquer recurso. (ex-Súmula nº 128 - alterada pela Res. 121/2003, DJ
      21.11.03, que incorporou a OJ nº 139 da SBDI-1 - inserida em
      27.11.1998) II - Garantido o juízo, na fase executória, a exigência de
      depósito para recorrer de qualquer decisão viola os incisos II e LV do
      art. 5º da CF/1988. Havendo, porém, elevação do valor do débito,
      exige-se a complementação da garantia do juízo. (ex-OJ nº 189 da SBDI-1
      - inserida em 08.11.2000) III - Havendo condenação solidária de duas ou
      mais empresas, o depósito recursal efetuado por uma delas aproveita as
      demais, quando a empresa que efetuou o depósito não pleiteia sua
      exclusão da lide. (ex-OJ nº 190 da SBDI-1 - inserida em 08.11.2000)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 128 Depósito recursal. Complementação devida. Aplicação da Instrução Normativa nº 3, II, DJ 12.03.1993 É ônus da parte recorrente efetuar o d..."
    precedentes: 20
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST129:
    numero: 129
    titulo: "CONTRATO DE TRABALHO. GRUPO ECONÔMICO."
    enunciado: >
      A prestação de serviços a mais de uma empresa do mesmo grupo econômico,
      durante a mesma jornada de trabalho, não caracteriza a coexistência de
      mais de um contrato de trabalho, salvo ajuste em contrário.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 26/1982, DJ 04.05.1982"
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST130:
    numero: 130
    titulo: "ADICIONAL NOTURNO."
    enunciado: >
      O regime de revezamento no trabalho não exclui o direito do empregado
      ao adicional noturno, em face da derrogação do art. 73 da CLT pelo art.
      157, item III, da Constituição de 18.09.1946 (ex-Prejulgado nº 1).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 130 O regime de revezamento no trabalho não exclui o direito do empregado ao adicional noturno, face à derrogação do art. 73 da CLT, pe..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST131:
    numero: 131
    titulo: "SALÁRIO MÍNIMO. VIGÊNCIA."
    enunciado: >
      O salário mínimo, uma vez decretado em condições de excepcionalidade,
      tem imediata vigência (ex-Prejulgado nº 2).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST132:
    numero: 132
    titulo: "ADICIONAL DE PERICULOSIDADE. INTEGRAÇÃO."
    enunciado: >
      I - O adicional de periculosidade, pago em caráter permanente, integra
      o cálculo de indenização e de horas extras (ex-Prejulgado nº 3).
      (ex-Súmula nº 132 - RA 102/1982, DJ 11.10.1982/ DJ 15.10.1982 - e ex-OJ
      nº 267 da SBDI-1 - inserida em 27.09.2002) II - Durante as horas de
      sobreaviso, o empregado não se encontra em condições de risco, razão
      pela qual é incabível a integração do adicional de periculosidade sobre
      as mencionadas horas. (ex-OJ nº 174 da SBDI-1 - inserida em 08.11.2000)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 132 Adicional de periculosidade O adicional de periculosidade pago em caráter permanente integra o cálculo de indenização (ex-Prejulgado nº 3)..."
    precedentes: 16
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST133:
    numero: 133
    titulo: "EMBARGOS INFRINGENTES."
    enunciado: >
      Para o julgamento dos embargos infringentes, nas juntas, é
      desnecessária a notificação das partes (ex-Prejulgado nº 4).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST134:
    numero: 134
    titulo: "SALÁRIO. MENOR NÃO APRENDIZ."
    enunciado: >
      Ao menor não aprendiz é devido o salário mínimo integral (ex-Prejulgado
      nº 5).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST135:
    numero: 135
    titulo: "SALÁRIO. EQUIPARAÇÃO."
    enunciado: >
      Para efeito de equiparação de salários em caso de trabalho igual,
      conta-se o tempo de serviço na função e não no emprego (ex-Prejulgado
      nº 6).
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003. Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 135 Para efeito de equiparação de salários, em caso de trabalho igual, conta-se..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST136:
    numero: 136
    titulo: "JUIZ. IDENTIDADE FÍSICA."
    enunciado: >
      Não se aplica às Varas do Trabalho o princípio da identidade física do
      juiz (ex-Prejulgado nº 7).
    status: cancelada
    publicacao: "2012-09-27"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003. Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 136 Não se aplica às Juntas de Conciliação e Julgamento o princípio da identida..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST137:
    numero: 137
    titulo: "ADICIONAL DE INSALUBRIDADE."
    enunciado: >
      É devido o adicional de serviço insalubre, calculado à base do salário
      mínimo da região, ainda que a remuneração contratual seja superior ao
      salário mínimo acrescido da taxa de insalubridade (ex-Prejulgado nº 8).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST138:
    numero: 138
    titulo: "READMISSÃO."
    enunciado: >
      Em caso de readmissão, conta-se a favor do empregado o período de
      serviço anterior, encerrado com a saída espontânea (ex-Prejulgado nº
      9).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST139:
    numero: 139
    titulo: "ADICIONAL DE INSALUBRIDADE."
    enunciado: >
      Enquanto percebido, o adicional de insalubridade integra a remuneração
      para todos os efeitos legais. (ex-OJ nº 102 da SBDI-1 - inserida em
      01.10.1997)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 139 O adicional de insalubridade, pago em caráter permanente, integra a remunera..."
    precedentes: 9
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST140:
    numero: 140
    titulo: "VIGIA."
    enunciado: >
      É assegurado ao vigia sujeito ao trabalho noturno o direito ao
      respectivo adicional (ex-Prejulgado nº 12).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 140 É assegurado ao vigia, sujeito ao trabalho noturno, o direito ao respectivo adicional (ex-Prejulgado nº 12)."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST141:
    numero: 141
    titulo: "DISSÍDIO COLETIVO."
    enunciado: >
      É constitucional o art. 2º da Lei nº 4.725, de 13.07.1965
      (ex-Prejulgado nº 13).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 141 É constitucional o art. 2º, da Lei nº 4.725, de 13 de julho de 1965 (ex-Prejulgado nº 13)."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST142:
    numero: 142
    titulo: "GESTANTE. DISPENSA."
    enunciado: >
      Empregada gestante, dispensada sem motivo antes do período de seis
      semanas anteriores ao parto, tem direito à percepção do
      salário-maternidade (ex-Prejulgado nº 14).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST143:
    numero: 143
    titulo: "SALÁRIO PROFISSIONAL."
    enunciado: >
      O salário profissional dos médicos e dentistas guarda proporcionalidade
      com as horas efetivamente trabalhadas, respeitado o mínimo de 50
      (cinqüenta) horas (ex-Prejulgado nº 15).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 143 O salário profissional dos médicos e dentistas guarda proporcionalidade com as horas efetivamente trabalhadas, respeitado o mínimo ..."
    precedentes: 2
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST144:
    numero: 144
    titulo: "AÇÃO RESCISÓRIA."
    enunciado: >
      É cabível a ação rescisória no âmbito da Justiça do Trabalho
      (ex-Prejulgado nº 16).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST145:
    numero: 145
    titulo: "GRATIFICAÇÃO DE NATAL."
    enunciado: >
      É compensável a gratificação de Natal com a da Lei nº 4.090, de 1962
      (ex-Prejulgado nº 17).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST146:
    numero: 146
    titulo: "TRABALHO EM DOMINGOS E FERIADOS, NÃO COMPENSADO."
    enunciado: >
      O trabalho prestado em domingos e feriados, não compensado, deve ser
      pago em dobro, sem prejuízo da remuneração relativa ao repouso semanal.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 146 O trabalho realizado em dia feriado, não compensado, é pago em dobro e não em triplo (ex-Prejulgado nº 18)."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST147:
    numero: 147
    titulo: "FÉRIAS. INDENIZAÇÃO."
    enunciado: >
      Indevido o pagamento dos repousos semanais e feriados intercorrentes
      nas férias indenizadas (ex-Prejulgado nº 19).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST148:
    numero: 148
    titulo: "GRATIFICAÇÃO NATALINA."
    enunciado: >
      É computável a gratificação de Natal para efeito de cálculo de
      indenização (ex-Prejulgado nº 20).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 148 É computável a gratificação de Natal para efeito de cálculo da indenização (ex-Prejulgado nº 20)."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST149:
    numero: 149
    titulo: "TAREFEIRO. FÉRIAS."
    enunciado: >
      A remuneração das férias do tarefeiro deve ser calculada com base na
      média da produção do período aquisitivo, aplicando-se-lhe a tarifa da
      data da concessão (ex-Prejulgado nº 22).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 149 A remuneração das férias do tarefeiro deve ser a base média da produção do período aquisitivo, aplicando-se-lhe a tarifa da data da..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST150:
    numero: 150
    titulo: "DEMISSÃO. INCOMPETÊNCIA DA JUSTIÇA DO TRABALHO."
    enunciado: >
      Falece competência à Justiça do Trabalho para determinar a reintegração
      ou a indenização de empregado demitido com base nos atos institucionais
      (ex-Prejulgado nº 23).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST151:
    numero: 151
    titulo: "FÉRIAS. REMUNERAÇÃO."
    enunciado: >
      A remuneração das férias inclui a das horas extraordinárias
      habitualmente prestadas (ex-Prejulgado nº 24).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST152:
    numero: 152
    titulo: "GRATIFICAÇÃO. AJUSTE TÁCITO."
    enunciado: >
      O fato de constar do recibo de pagamento de gratificação o caráter de
      liberalidade não basta, por si só, para excluir a existência de ajuste
      tácito (ex-Prejulgado nº 25).
    status: cancelada
    publicacao: "2025-07-02"
    historico: "Mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 152 O fato de constar do recibo de pagamento de gratificação o caráter de liberalidade ..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST153:
    numero: 153
    titulo: "PRESCRIÇÃO."
    enunciado: >
      Não se conhece de prescrição não argüida na instância ordinária
      (ex-Prejulgado nº 27).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST154:
    numero: 154
    titulo: "MANDADO DE SEGURANÇA."
    enunciado: >
      Da decisão do Tribunal Regional do Trabalho em mandado de segurança
      cabe recurso ordinário, no prazo de 10 dias, para o Tribunal Superior
      do Trabalho (ex-Prejulgado nº 28).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 201 - Res. 7/1985, DJ 11, 12 e 15.07.1985 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 154 Da decisão de Tribunal Regional do Trabalho em mandado de seguranç..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST155:
    numero: 155
    titulo: "AUSÊNCIA AO SERVIÇO."
    enunciado: >
      As horas em que o empregado falta ao serviço para comparecimento
      necessário, como parte, à Justiça do Trabalho não serão descontadas de
      seus salários (ex-Prejulgado nº 30).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 155 As horas em que o empregado falta ao serviço para comparecimento necessário, como parte, à Justiça do Trabalho, não serão descontad..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST156:
    numero: 156
    titulo: "PRESCRIÇÃO. PRAZO."
    enunciado: >
      Da extinção do último contrato começa a fluir o prazo prescricional do
      direito de ação em que se objetiva a soma de períodos descontínuos de
      trabalho (ex-Prejulgado nº 31).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 156 Da extinção do último contrato é que começa a fluir o prazo prescricional do direito de ação objetivando a soma de períodos descont..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST157:
    numero: 157
    titulo: "GRATIFICAÇÃO."
    enunciado: >
      A gratificação instituída pela Lei nº 4.090, de 13.07.1962, é devida na
      resilição contratual de iniciativa do empregado (ex-Prejulgado nº 32).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 157 A gratificação instituída pela Lei nº 4.090, de 1962, é devida na resilição contratual de iniciativa do empregado (ex-Prejulgado nº..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST158:
    numero: 158
    titulo: "AÇÃO RESCISÓRIA."
    enunciado: >
      Da decisão de Tribunal Regional do Trabalho, em ação rescisória, é
      cabível recurso ordinário para o Tribunal Superior do Trabalho, em face
      da organização judiciária trabalhista (ex-Prejulgado nº 35).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 158 Da decisão de Tribunal Regional do Trabalho, em ação rescisória, cabível é o recurso ordinário para o Tribunal Superior do Trabalho..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST159:
    numero: 159
    titulo: "SUBSTITUIÇÃO DE CARÁTER NÃO EVENTUAL E VACÂNCIA DO CARGO."
    enunciado: >
      I - Enquanto perdurar a substituição que não tenha caráter meramente
      eventual, inclusive nas férias, o empregado substituto fará jus ao
      salário contratual do substituído. (ex-Súmula nº 159 - alterada pela
      Res. 121/2003, DJ 21.11.2003) II - Vago o cargo em definitivo, o
      empregado que passa a ocupá-lo não tem direito a salário igual ao do
      antecessor. (ex-OJ nº 112 da SBDI-1 - inserida em 01.10.1997)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 159 Substituição Enquanto perdurar a substituição que não tenha caráter meramente eventual, inclusive nas férias, o empregado substituto fará..."
    precedentes: 14
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST160:
    numero: 160
    titulo: "APOSENTADORIA POR INVALIDEZ."
    enunciado: >
      Cancelada a aposentadoria por invalidez, mesmo após cinco anos, o
      trabalhador terá direito de retornar ao emprego, facultado, porém, ao
      empregador, indenizá-lo na forma da lei (ex-Prejulgado nº 37).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST161:
    numero: 161
    titulo: "DEPÓSITO. CONDENAÇÃO A PAGAMENTO EM PECÚNIA."
    enunciado: >
      Se não há condenação a pagamento em pecúnia, descabe o depósito de que
      tratam os §§ 1º e 2º do art. 899 da CLT (ex-Prejulgado nº 39).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 161 Não havendo condenação em pecúnia, descabe o depósito prévio de que tratam os §§ 1º e 2º do art. 899 da Consolidação das Leis do Tr..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST162:
    numero: 162
    titulo: "INSALUBRIDADE."
    enunciado: >
      É constitucional o art. 3º do Decreto-Lei nº 389, de 26.12.1968
      (ex-Prejulgado nº 41).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 59/1996, DJ 28.06.1996, 03, 04 e 05.07.1996 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST163:
    numero: 163
    titulo: "AVISO PRÉVIO. CONTRATO DE EXPERIÊNCIA."
    enunciado: >
      Cabe aviso prévio nas rescisões antecipadas dos contratos de
      experiência, na forma do art. 481 da CLT (ex-Prejulgado nº 42).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST164:
    numero: 164
    titulo: "PROCURAÇÃO. JUNTADA."
    enunciado: >
      O não-cumprimento das determinações dos §§ 1º e 2º do art. 5º da Lei nº
      8.906, de 04.07.1994 e do art. 37, parágrafo único, do Código de
      Processo Civil importa o não-conhecimento de recurso, por inexistente,
      exceto na hipótese de mandato tácito.
    status: cancelada
    publicacao: "2016-07-04"
    historico: "Nova redação - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 164 O não cumprimento das determinações dos §§ 1º e 2º do art. 70 da Lei nº 4.215,..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST165:
    numero: 165
    titulo: "DEPÓSITO. RECURSO. CONTA VINCULADA."
    enunciado: >
      O depósito, para fins de recurso, realizado fora da conta vinculada do
      trabalhador, desde que feito na sede do juízo, ou realizado na conta
      vinculada do trabalhador, apesar de fora da sua sede do juízo, uma vez
      que permaneça à disposição deste, não impedirá o conhecimento do apelo
      (ex-Prejulgado nº 45).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 87/1998, DJ 15, 16 e 19.10.1998 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST166:
    numero: 166
    titulo: "BANCÁRIO. CARGO DE CONFIANÇA. JORNADA DE TRABALHO."
    enunciado: >
      O bancário que exerce a função a que se refere o § 2º do art. 224 da
      CLT e recebe gratificação não inferior a um terço de seu salário já tem
      remuneradas as duas horas extraordinárias excedentes de seis
      (ex-Prejulgado nº 46).
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 166 O bancário exercente de função a que se refere o § 2º do art. 224 da CLT e q..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST167:
    numero: 167
    titulo: "VOGAL. INVESTIDURA. RECURSO."
    enunciado: >
      Das decisões proferidas pelos Tribunais Regionais, em processo de
      impugnação ou contestação à investidura de vogal, cabe recurso para o
      Tribunal Superior do Trabalho (ex-Prejulgado nº 47).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST168:
    numero: 168
    titulo: "PRESCRIÇÃO. PRESTAÇÕES PERIÓDICAS. CONTAGEM."
    enunciado: >
      Na lesão de direito que atinja prestações periódicas, de qualquer
      natureza, devidas ao empregado, a prescrição é sempre parcial e se
      conta do vencimento de cada uma delas e não do direito do qual se
      origina (ex-Prejulgado nº 48).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Cancelada pela Súmula nº 294 - Res. 4/1989, DJ 14, 18 e 19.04.1989 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST169:
    numero: 169
    titulo: "AÇÃO RESCISÓRIA. JUSTIÇA DO TRABALHO. DEPÓSITO PRÉVIO."
    enunciado: >
      Nas ações rescisórias ajuizadas na Justiça do Trabalho e que só serão
      admitidas nas hipóteses dos arts. 798 a 800 do Código de Processo Civil
      de 1939, desnecessário o depósito a que aludem os arts. 488, II, e 494
      do Código de Processo Civil de 1973 (ex-Prejulgado nº 49).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 194 - Res. 2/1984, DJ 04.10.1984 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST170:
    numero: 170
    titulo: "SOCIEDADE DE ECONOMIA MISTA. CUSTAS."
    enunciado: >
      Os privilégios e isenções no foro da Justiça do Trabalho não abrangem
      as sociedades de economia mista, ainda que gozassem desses benefícios
      anteriormente ao Decreto-Lei nº 779, de 21.08.1969 (ex-Prejulgado nº
      50).
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 170 Os privilégios e isenções no foro da Justiça do Trabalho não abrangem as sociedades de economia mista, ainda que gozassem desses be..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST171:
    numero: 171
    titulo: "FÉRIAS PROPORCIONAIS. CONTRATO DE TRABALHO. EXTINÇÃO."
    enunciado: >
      Salvo na hipótese de dispensa do empregado por justa causa, a extinção
      do contrato de trabalho sujeita o empregador ao pagamento da
      remuneração das férias proporcionais, ainda que incompleto o período
      aquisitivo de 12 (doze) meses (art. 147 da CLT) (ex-Prejulgado nº 51).
    status: alterada
    publicacao: "2004-05-05"
    historico: "Republicada em razão de erro material no registro da referência legislativa - DJ 27.04.2004 Nº 171 Férias proporcionais. Contrato de trabalho. Salvo na hipótese de dispensa do empregado por justa caus..."
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST172:
    numero: 172
    titulo: "REPOUSO REMUNERADO. HORAS EXTRAS. CÁLCULO."
    enunciado: >
      Computam-se no cálculo do repouso remunerado as horas extras
      habitualmente prestadas. (ex-Prejulgado nº 52).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST173:
    numero: 173
    titulo: "SALÁRIO. EMPRESA. CESSAÇÃO DE ATIVIDADES."
    enunciado: >
      Extinto, automaticamente, o vínculo empregatício com a cessação das
      atividades da empresa, os salários só são devidos até a data da
      extinção (ex-Prejulgado nº 53).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST174:
    numero: 174
    titulo: "PREVIDÊNCIA. LEI Nº 3.841/1960. APLICAÇÃO."
    enunciado: >
      As disposições da Lei nº 3.841, de 15.12.1960, dirigidas apenas ao
      sistema previdenciário oficial, não se aplicam aos empregados
      vinculados ao regime de seguro social de caráter privado (ex-Prejulgado
      nº 54).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST175:
    numero: 175
    titulo: "RECURSO ADESIVO. ART. 500 DO CPC. INAPLICABILIDADE."
    enunciado: >
      O recurso adesivo, previsto no art. 500 do Código de Processo Civil, é
      incompatível com o processo do trabalho (ex-Prejulgado nº 55).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 196 - Res. 2/1985, DJ 01.04.1985 - Republicada com correção DJ 12.04.1985 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST176:
    numero: 176
    titulo: "FUNDO DE GARANTIA. LEVANTAMENTO DO DEPÓSITO."
    enunciado: >
      A Justiça do Trabalho só tem competência para autorizar o levantamento
      do depósito do Fundo de Garantia do Tempo de Serviço na ocorrência de
      dissídio entre empregado e empregador.
    status: cancelada
    publicacao: "2005-05-13"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982 Nº 176 A Justiça do Trabalho só tem competência para autorizar o levantamento do d..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST177:
    numero: 177
    titulo: "DISSÍDIO COLETIVO. SINDICATO. REPRESENTAÇÃO."
    enunciado: >
      Está em plena vigência o art. 859 da Consolidação das Leis do Trabalho,
      cuja redação é a seguinte: "A representação dos sindicatos para
      instauração da instância fica subordinada à aprovação de assembléia, da
      qual participem os associados interessados na solução do dissídio
      coletivo, em primeira convocação, por maioria de 2/3 dos mesmos, ou, em
      Segunda convocação, por 2/3 dos presentes" (ex-Prejulgado nº 58).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.09.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST178:
    numero: 178
    titulo: "TELEFONISTA. ART. 227, E PARÁGRAFOS, DA CLT. APLICABILIDADE."
    enunciado: >
      É aplicável à telefonista de mesa de empresa que não explora o serviço
      de telefonia o disposto no art. 227, e seus parágrafos, da CLT
      (ex-Prejulgado nº 59).
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    precedentes: 1
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST179:
    numero: 179
    titulo: "INCONSTITUCIONALIDADE. ART. 22 DA LEI Nº 5.107/1966."
    enunciado: >
      É inconstitucional o art. 22 da Lei nº 5.107, de 13.09.1966, na sua
      parte final, em que dá competência à Justiça do Trabalho para julgar
      dissídios coletivos "quando o BNH e a Previdência Social figurarem no
      feito como litisconsorte" (ex-Prejulgado nº 60).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - RA 102/1982, DJ 11.10.1982 e DJ 15.10.1982"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST180:
    numero: 180
    titulo: "AÇÃO DE CUMPRIMENTO. SUBSTITUIÇÃO PROCESSUAL. DESISTÊNCIA."
    enunciado: >
      Nas ações de cumprimento, o substituído processualmente pode, a
      qualquer tempo, desistir da ação, desde que, comprovadamente, tenha
      havido transação.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 255 - Res. 3/1986, DJ 02,03 e 04.07.1986 Redação original - Res. 1/1983, DJ 19.10.1983"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST181:
    numero: 181
    titulo: "ADICIONAL. TEMPO DE SERVIÇO. REAJUSTE SEMESTRAL. LEI Nº 6.708/1979."
    enunciado: >
      O adicional por tempo de serviço, quando estabelecido em importe fixo,
      está sujeito ao reajuste da Lei nº 6.708/1979.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 2/1983, DJ 19.10.1983"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST182:
    numero: 182
    titulo: "AVISO PRÉVIO. INDENIZAÇÃO COMPENSATÓRIA. LEI Nº 6.708, DE 30.10.1979."
    enunciado: >
      O tempo do aviso prévio, mesmo indenizado, conta-se para efeito da
      indenização adicional prevista no art. 9º da Lei nº 6.708, de
      30.10.1979.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Súmula alterada - Res. 5/1983, DJ 09.11.1983 Nº 182 O tempo do aviso prévio, mesmo indenizado, conta-se para efeito de indenização adicional do art. 9º, da Lei 6.708/79. Redação original - Res. 3/1983..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST183:
    numero: 183
    titulo: "EMBARGOS. RECURSO DE REVISTA. DESPACHO DENEGATÓRIO. AGRAVO DE INSTRUMENTO. NÃO CABIMENTO."
    enunciado: >
      São incabíveis embargos para o Tribunal Pleno contra decisão em agravo
      de instrumento oposto a despacho denegatório de recurso de revista,
      inexistindo ofensa ao art. 153, § 4º, da Constituição Federal.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 335 - Res. 27/1994, DJ 12, 17 e 19.05.1994 Súmula alterada - Res. 1/1984, DJ 28.02.1984 Redação original - Res. 4/1983, DJ 19.10.1983 Nº 183 São incabíveis Embargos para o Tribu..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST184:
    numero: 184
    titulo: "EMBARGOS DECLARATÓRIOS. OMISSÃO EM RECURSO DE REVISTA . PRECLUSÃO."
    enunciado: >
      Ocorre preclusão se não forem opostos embargos declaratórios para
      suprir omissão apontada em recurso de revista ou de embargos.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 6/1983, DJ 09.11.1983 Nº 184 Ocorre preclusão quando não forem opostos embargos declaratórios para suprir omissão apontada em recurso de revista ou de embargos."
    precedentes: 31
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST185:
    numero: 185
    titulo: "EMBARGOS SOB INTERVENÇÃO DO BANCO CENTRAL. LIQUIDAÇÃO EXTRAJUDICIAL. JUROS. CORREÇÃO MONETÁRIA. LEI Nº 6.024/1974."
    enunciado: >
      Aplicada a Lei nº 6.024/1974, fica suspensa a incidência de juros e
      correção monetária nas liquidações de empresas sob intervenção do Banco
      Central.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 284 - Res. 17/1988, DJ 18, 21 e 22.03.1988 Redação original - Res. 7/1983, DJ 09.11.1983"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST186:
    numero: 186
    titulo: "LICENÇA-PRÊMIO. CONVERSÃO EM PECÚNIA. REGULAMENTO DA EMPRESA."
    enunciado: >
      A licença-prêmio, na vigência do contrato de trabalho, não pode ser
      convertida em pecúnia, salvo se expressamente admitida a conversão no
      regulamento da empresa.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 8/1983, DJ 09.11.1983 Nº 186 A licença-prêmio não pode ser convertida em pecúnia, salvo se expressamente admitida no regulamento da empresa."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST187:
    numero: 187
    titulo: "CORREÇÃO MONETÁRIA. INCIDÊNCIA."
    enunciado: >
      A correção monetária não incide sobre o débito do trabalhador
      reclamante.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 9/1983, DJ 09.11.1983"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST188:
    numero: 188
    titulo: "CONTRATO DE TRABALHO. EXPERIÊNCIA. PRORROGAÇÃO."
    enunciado: >
      O contrato de experiência pode ser prorrogado, respeitado o limite
      máximo de 90 (noventa) dias.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 10/1983, DJ 09.11.1983 Nº 188 O contrato de experiência pode ser prorrogado, respeitado o limite máximo de 90 dias."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST189:
    numero: 189
    titulo: "GREVE. COMPETÊNCIA DA JUSTIÇA DO TRABALHO. ABUSIVIDADE."
    enunciado: >
      A Justiça do Trabalho é competente para declarar a abusividade, ou não,
      da greve.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 11/1983, DJ 09.11.1983 Nº 189 A Justiça do Trabalho é competente para declarar a legalidade ou ilegalidade da greve."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST190:
    numero: 190
    titulo: "PODER NORMATIVO DO TST. CONDIÇÕES DE TRABALHO. INCONSTITUCIONALIDADE. DECISÕES CONTRÁRIAS AO STF."
    enunciado: >
      Ao julgar ou homologar ação coletiva ou acordo nela havido, o Tribunal
      Superior do Trabalho exerce o poder normativo constitucional, não
      podendo criar ou homologar condições de trabalho que o Supremo Tribunal
      Federal julgue iterativamente inconstitucionais.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 12/1983, DJ 09.11.1983 Nº 190 Decidindo ação coletiva ou homologando acordo nela havido, o Tribunal Superior do Trabalho exerce o poder normativo constitucional, não podendo cr..."
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST191:
    numero: 191
    titulo: "ADICIONAL DE PERICULOSIDADE. INCIDÊNCIA. BASE DE CÁLCULO."
    enunciado: >
      I - O adicional de periculosidade incide apenas sobre o salário básico
      e não sobre este acrescido de outros adicionais. II - O adicional de
      periculosidade do empregado eletricitário, contratado sob a égide da
      Lei nº 7.369/1985, deve ser calculado sobre a totalidade das parcelas
      de natureza salarial. Não é válida norma coletiva mediante a qual se
      determina a incidência do referido adicional sobre o salário básico.
      III - A alteração da base de cálculo do adicional de periculosidade do
      eletricitário promovida pela Lei nº 12.740/2012 atinge somente contrato
      de trabalho firmado a partir de sua vigência, de modo que, nesse caso,
      o cálculo será realizado exclusivamente sobre o salário básico,
      conforme determina o § 1º do art. 193 da CLT.
    status: alterada
    publicacao: "2016-12-02"
    historico: "Nova redação - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 191 Adicional. Periculosidade. Incidência O adicional de periculosidade incide apenas sobre o salário básico e não sobre este acrescido de outro..."
    precedentes: 27
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST192:
    numero: 192
    titulo: "AÇÃO RESCISÓRIA. COMPETÊNCIA."
    enunciado: >
      I - Se não houver o conhecimento de recurso de revista ou de embargos,
      a competência para julgar ação que vise a rescindir a decisão de mérito
      é do Tribunal Regional do Trabalho, ressalvado o disposto no item II.
      II - Acórdão rescindendo do Tribunal Superior do Trabalho que não
      conhece de recurso de embargos ou de revista, analisando arguição de
      violação de dispositivo de lei material ou decidindo em consonância com
      súmula de direito material ou com iterativa, notória e atual
      jurisprudência de direito material da Seção de Dissídios Individuais
      (Súmula nº 333), examina o mérito da causa, cabendo ação rescisória da
      competência do Tribunal Superior do Trabalho. (ex-Súmula nº 192 ¿
      alterada pela Res. 121/2003, DJ 21.11.2003) III - Sob a égide do art.
      512 do CPC de 1973, é juridicamente impossível o pedido explícito de
      desconstituição de sentença quando substituída por acórdão do Tribunal
      Regional ou superveniente sentença homologatória de acordo que puser
      fim ao litígio. IV - Na vigência do CPC de 1973, é manifesta a
      impossibilidade jurídica do pedido de rescisão de julgado proferido em
      agravo de instrumento que, limitando-se a aferir o eventual desacerto
      do juízo negativo de admissibilidade do recurso de revista, não
      substitui o acórdão regional, na forma do art. 512 do CPC. (ex-OJ nº
      105 da SBDI-2 - DJ 29.04.2003) V - A decisão proferida pela SBDI, em
      agravo regimental, calcada na Súmula nº 333, substitui acórdão de Turma
      do TST, porque emite juízo de mérito, comportando, em tese, o corte
      rescisório. (ex-OJ nº 133 da SBDI-2 - DJ 04.05.2004).
    status: alterada
    publicacao: "2016-09-22"
    historico: "Súmula alterada - Res. 153/2008, DEJT divulgado em 20, 21 e 24.11.2008 Nº 192. Ação rescisória. Competência e possibilidade jurídica do pedido (inciso III alterado I - Se não houver o conhecimento de ..."
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST193:
    numero: 193
    titulo: "CORREÇÃO MONETÁRIA. JUROS. CÁLCULO. EXECUÇÃO DE SENTENÇA. PESSOA JURÍDICA DE DIREITO PÚBLICO."
    enunciado: >
      Nos casos de execução de sentença contra pessoa jurídica de direito
      público, os juros e a correção monetária serão calculados até o
      pagamento do valor principal da condenação.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 105/2000, DJ 18, 19 e 20.12.2000 Redação original - Res. 15/1983, DJ 09.11.1983"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST194:
    numero: 194
    titulo: "AÇÃO RESCISÓRIA. JUSTIÇA DO TRABALHO. DEPÓSITO PRÉVIO."
    enunciado: >
      As ações rescisórias ajuizadas na Justiça do Trabalho serão admitidas,
      instruídas e julgadas conforme os arts. 485 "usque" 495 do Código de
      Processo Civil de 1973, sendo, porém, desnecessário o depósito prévio a
      que aludem os respectivos arts. 488, II, e 494.
    status: cancelada
    publicacao: "2007-10-15"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original (revisão da Súmula nº 169) - Res. 2/1984, DJ 04.10.1984 Nº 194 As ações rescisórias ajuizadas na Justiça do Trabalho serão admit..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST195:
    numero: 195
    titulo: "EMBARGOS. AGRAVO REGIMENTAL. CABIMENTO."
    enunciado: >
      Não cabem embargos para o Pleno de decisão de Turma do Tribunal
      Superior do Trabalho, prolatada em agravo regimental.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 353 - Res. 70/1997, DJ 30.05.1997, 04, 05 e 06.06.1997 Redação original - Res. 1/1985, DJ 01, 02 e 03.04.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST196:
    numero: 196
    titulo: "RECURSO ADESIVO. PRAZO."
    enunciado: >
      O recurso adesivo é compatível com o processo do trabalho, onde cabe,
      no prazo de 8 (oito) dias, no recurso ordinário, na revista, nos
      embargos para o Pleno e no agravo de petição.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 283 - Res. 16/1988, DJ 18, 21 e 22..03.1988. Redação original (revisão da Súmula nº 175) - Res. 2/1985, DJ 01.04.1985 - Republicada com correção DJ 12, 15 e 16.04.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST197:
    numero: 197
    titulo: "PRAZO."
    enunciado: >
      O prazo para recurso da parte que, intimada, não comparecer à audiência
      em prosseguimento para a prolação da sentença conta-se de sua
      publicação.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 3/1985, DJ 01, 02 e 03.04.1985 Nº 197 O prazo para recurso da parte que, intimada, não comparecer à audiência em prosseguimento para a prolação da sentença, conta-se de sua pub..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST198:
    numero: 198
    titulo: "PRESCRIÇÃO."
    enunciado: >
      Na lesão de direito individual que atinja prestações periódicas devidas
      ao empregado, à exceção da que decorre de ato único do empregador, a
      prescrição é sempre parcial e se conta do vencimento de cada uma dessas
      prestações, e não da lesão do direito.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Cancelada pela Súmula nº 294 - Res. 4/1989, DJ 14, 18 e 19.04.1989 Redação original - Res. 4/1985, DJ 01, 02 e 03.04.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST199:
    numero: 199
    titulo: "BANCÁRIO. PRÉ-CONTRATAÇÃO DE HORAS EXTRAS."
    enunciado: >
      I - A contratação do serviço suplementar, quando da admissão do
      trabalhador bancário, é nula. Os valores assim ajustados apenas
      remuneram a jornada normal, sendo devidas as horas extras com o
      adicional de, no mínimo, 50% (cinqüenta por cento), as quais não
      configuram pré-contratação, se pactuadas após a admissão do bancário.
      (ex-Súmula nº 199 alterada pela Res. 41/1995, DJ 21.02.1995 - e ex-OJ
      nº 48 da SBDI-1 - inserida em 25.11.1996) II - Em se tratando de horas
      extras pré-contratadas, opera-se a prescrição total se a ação não for
      ajuizada no prazo de cinco anos, a partir da data em que foram
      suprimidas. (ex-OJ nº 63 da SBDI-1 - inserida em 14.03.1994)
    status: alterada
    publicacao: "2005-04-25"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Súmula alterada - Res. 41/1995, DJ 17, 20 e 21.02.1995 Nº 199 Bancário. Pré-contratação de horas extras A contratação do serviço suplementar, qua..."
    precedentes: 18
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST200:
    numero: 200
    titulo: "JUROS DE MORA. INCIDÊNCIA."
    enunciado: >
      Os juros de mora incidem sobre a importância da condenação já corrigida
      monetariamente.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 6/1985, DJ 18.06.1985 e 24, 25 e 26.06.1985 Nº 200 Juros da mora. Incidência Os juros da mora incidem sobre a importância da condenação já corrigida monetariamente."
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST201:
    numero: 201
    titulo: "RECURSO ORDINÁRIO EM MANDADO DE SEGURANÇA."
    enunciado: >
      Da decisão de Tribunal Regional do Trabalho em mandado de segurança
      cabe recurso ordinário, no prazo de 8 (oito) dias, para o Tribunal
      Superior do Trabalho, e igual dilação para o recorrido e interessados
      apresentarem razões de contrariedade.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original (revisão da Súmula nº 154) - Res. 7/1985, DJ 11, 12 e 15.07.1985 Nº 201 Recurso ordinário em mandado de segurança Da decisão de Tribunal Regional do Trabalho em mandado de segurança c..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST202:
    numero: 202
    titulo: "GRATIFICAÇÃO POR TEMPO DE SERVIÇO. COMPENSAÇÃO."
    enunciado: >
      Existindo, ao mesmo tempo, gratificação por tempo de serviço outorgada
      pelo empregador e outra da mesma natureza prevista em acordo coletivo,
      convenção coletiva ou sentença normativa, o empregado tem direito a
      receber, exclusivamente, a que lhe seja mais benéfica.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 8/1985, DJ 11, 12 e 15.07.1985"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST203:
    numero: 203
    titulo: "GRATIFICAÇÃO POR TEMPO DE SERVIÇO. NATUREZA SALARIAL."
    enunciado: >
      A gratificação por tempo de serviço integra o salário para todos os
      efeitos legais.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 9/1985, DJ 11, 12 e 15.07.1985"
    precedentes: 3
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST204:
    numero: 204
    titulo: "BANCÁRIO. CARGO DE CONFIANÇA. CARACTERIZAÇÃO."
    enunciado: >
      A configuração, ou não, do exercício da função de confiança a que se
      refere o art. 224, § 2º, da CLT, dependente da prova das reais
      atribuições do empregado, é insuscetível de exame mediante recurso de
      revista ou de embargos.
    status: cancelada
    publicacao: "2005-04-25"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 10/1985, DJ 11, 12 e 15.07.1985 - Republicada com correção DJ 30.09.1985 e 04, 07 e 08.10.1985 Nº 204 Bancário. Cargo de..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST205:
    numero: 205
    titulo: "GRUPO ECONÔMICO. EXECUÇÃO. SOLIDARIEDADE."
    enunciado: >
      O responsável solidário, integrante do grupo econômico, que não
      participou da relação processual como reclamado e que, portanto, não
      consta no título executivo judicial como devedor, não pode ser sujeito
      passivo na execução.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 11/1985, DJ 11, 12 e 15.07.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST206:
    numero: 206
    titulo: "FGTS. INCIDÊNCIA SOBRE PARCELAS PRESCRITAS."
    enunciado: >
      A prescrição da pretensão relativa às parcelas remuneratórias alcança o
      respectivo recolhimento da contribuição para o FGTS.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 12/1985, DJ 11, 12 e 15.07.1985 Nº 206 FGTS. Incidência sobre parcelas prescritas A prescrição bienal relativa às parcelas remuneratórias alcança o respectivo recolhimento da c..."
    precedentes: 22
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST207:
    numero: 207
    titulo: "CONFLITOS DE LEIS TRABALHISTAS NO ESPAÇO. PRINCÍPIO DA \"LEX LOCI EXECUTIONIS\"."
    enunciado: >
      A relação jurídica trabalhista é regida pelas leis vigentes no país da
      prestação de serviço e não por aquelas do local da contratação.
    status: cancelada
    publicacao: "2012-04-23"
    historico: "Súmula mantida - Res. 121/2003, DJ 19, 20 e 21.11.2003 Redação original - Res. 13/1985, DJ 11, 12 e 15.07.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST208:
    numero: 208
    titulo: "RECURSO DE REVISTA. ADMISSIBILIDADE. INTERPRETAÇÃO DE CLÁUSULA DE NATUREZA CONTRATUAL."
    enunciado: >
      A divergência jurisprudencial, suficiente a ensejar a admissibilidade
      ou o conhecimento do recurso de revista, diz respeito a interpretação
      de lei, sendo imprestável aquela referente ao alcance de cláusula
      contratual, ou de regulamento de empresa.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 59/1996, DJ 28.06.1996 e 03, 04 e 05.07.1996 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST209:
    numero: 209
    titulo: "CARGO EM COMISSÃO. REVERSÃO."
    enunciado: >
      A reversão do empregado ao cargo efetivo implica a perda das vantagens
      salariais inerentes ao cargo em comissão, salvo se nele houver
      permanecido 10 (dez) ou mais anos ininterruptos.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - RA 81/1985, DJ 03, 04 e 05.12.1985 Redação original - Res. 14/1985, DJ 19.09.1985 - Republicada DJ 04, 07 e 08.10.1985 Nº 209 Cargo em comissão Reversão. A reversão do empregado ao ..."
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST210:
    numero: 210
    titulo: "RECURSO DE REVISTA. EXECUÇÃO DE SENTENÇA."
    enunciado: >
      A admissibilidade do recurso de revista contra acórdão proferido em
      execução de sentença depende de demonstração inequívoca de violação
      direta à Constituição Federal.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Revista pela Súmula nº 266 - Res. 1/1987, DJ 23.10.1987 e DJ 10, 11 e 14.12.1987. Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST211:
    numero: 211
    titulo: "JUROS DE MORA E CORREÇÃO MONETÁRIA. INDEPENDÊNCIA DO PEDIDO INICIAL E DO TÍTULO EXECUTIVO JUDICIAL."
    enunciado: >
      Os juros de mora e a correção monetária incluem-se na liquidação, ainda
      que omisso o pedido inicial ou a condenação.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985 Nº 211 Juros da mora e correção monetária. Independência do pedido inicial e do título executivo judicial. Os juros de mora e corre..."
    precedentes: 5
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST212:
    numero: 212
    titulo: "DESPEDIMENTO. ÔNUS DA PROVA."
    enunciado: >
      O ônus de provar o término do contrato de trabalho, quando negados a
      prestação de serviço e o despedimento, é do empregador, pois o
      princípio da continuidade da relação de emprego constitui presunção
      favorável ao empregado.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    precedentes: 4
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST213:
    numero: 213
    titulo: "EMBARGOS DE DECLARAÇÃO. SUSPENSÃO DO PRAZO RECURSAL."
    enunciado: >
      Os embargos de declaração suspendem o prazo do recurso principal, para
      ambas as partes, não se computando o dia da sua interposição.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 46/1995, DJ 20, 24 e 25.04.1995 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST214:
    numero: 214
    titulo: "DECISÃO INTERLOCUTÓRIA. IRRECORRIBILIDADE."
    enunciado: >
      Na Justiça do Trabalho, nos termos do art. 893, § 1º, da CLT, as
      decisões interlocutórias não ensejam recurso imediato, salvo nas
      hipóteses de decisão: a) de Tribunal Regional do Trabalho contrária à
      Súmula ou Orientação Jurisprudencial do Tribunal Superior do Trabalho;
      b) suscetível de impugnação mediante recurso para o mesmo Tribunal; c)
      que acolhe exceção de incompetência territorial, com a remessa dos
      autos para Tribunal Regional distinto daquele a que se vincula o juízo
      excepcionado, consoante o disposto no art. 799, § 2º, da CLT.
    status: alterada
    publicacao: "2005-03-16"
    historico: "Súmula alterada - Res. 121/2003, DJ 19, 20 e 21.11.2003 Nº 214 Decisão interlocutória. Irrecorribilidade Na Justiça do Trabalho, as decisões interlocutórias somente ensejam recurso imediato quando sus..."
    precedentes: 7
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST215:
    numero: 215
    titulo: "HORAS EXTRAS NÃO CONTRATADAS EXPRESSAMENTE. ADICIONAL DEVIDO."
    enunciado: >
      Inexistindo acordo escrito para prorrogação da jornada de trabalho, o
      adicional referente às horas extras é devido na base de 25% (vinte e
      cinco por cento).
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 28/1994, DJ 12, 16 e 18.05.1994 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST216:
    numero: 216
    titulo: "DESERÇÃO. RELAÇÃO DE EMPREGADOS. AUTENTICAÇÃO MECÂNICA DESNECESSÁRIA."
    enunciado: >
      São juridicamente desnecessárias a autenticação mecânica do valor do
      depósito recursal na relação de empregados (RE) e a individualização do
      processo na guia de recolhimento (GR), pelo que a falta não importa em
      deserção.
    status: cancelada
    publicacao: "2003-11-21"
    historico: "Súmula cancelada - Res. 87/1998, DJ 15, 16 e 19.10.1998 Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST217:
    numero: 217
    titulo: "DEPÓSITO RECURSAL. CREDENCIAMENTO BANCÁRIO. PROVA DISPENSÁVEL."
    enunciado: >
      O credenciamento dos bancos para o fim de recebimento do depósito
      recursal é fato notório, independendo da prova.
    status: vigente
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985"
    precedentes: 6
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST218:
    numero: 218
    titulo: "RECURSO DE REVISTA. ACÓRDÃO PROFERIDO EM AGRAVO DE INSTRUMENTO."
    enunciado: >
      É incabível recurso de revista interposto de acórdão regional prolatado
      em agravo de instrumento.
    status: alterada
    publicacao: "2003-11-21"
    historico: "Redação original - Res. 14/1985, DJ 19.09.1985 e 24, 25 e 26.09.1985 Nº 218 Recurso de revista contra acórdão proferido em agravo de instrumento É incabível recurso de revista contra acórdão regional ..."
    precedentes: 10
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST219:
    numero: 219
    titulo: "HONORÁRIOS ADVOCATÍCIOS. CABIMENTO."
    enunciado: >
      I - Na Justiça do Trabalho, a condenação ao pagamento de honorários
      advocatícios não decorre pura e simplesmente da sucumbência, devendo a
      parte, concomitantemente: a) estar assistida por sindicato da categoria
      profissional; b) comprovar a percepção de salário inferior ao dobro do
      salário mínimo ou encontrar-se em situação econômica que não lhe
      permita demandar sem prejuízo do próprio sustento ou da respectiva
      família. (art.14,§1º, da Lei nº 5.584/1970). (ex-OJ nº 305da SBDI-I).
      II - É cabível a condenação ao pagamento de honorários advocatícios em
      ação rescisória no processo trabalhista. III - São devidos os
      honorários advocatícios nas causas em que o ente sindical figure como
      substituto processual e nas lides que não derivem da relação de
      emprego. IV Na ação rescisória e nas lides que não derivem de relação
      de emprego, a responsabilidade pelo pagamento dos honorários
      advocatícios da sucumbência submete-se à disciplina do Código de
      Processo Civil (arts. 85, 86, 87 e 90). V - Em caso de assistência
      judiciária sindical, revogado o art. 11 da Lei nº 1060/50 (CPC de 2015,
      art. 1072, inc. III), os honorários advocatícios assistenciais são
      devidos entre o mínimo de dez e o máximo de vinte por cento sobre o
      valor da condenação, do proveito econômico obtido ou, não sendo
      possível mensurá-lo, sobre o valor atualizado da causa (CPC de 2015,
      art. 85, § 2º). VI - Nas causas em que a Fazenda Pública for parte,
      aplicar-se-ão os percentuais específicos de honorários advocatícios
      contemplados no Código de Processo Civil.
