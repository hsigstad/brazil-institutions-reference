    historico: "Alterada a redação do item I e acrescidos os itens IV a VI em decorrência do CPC de 2015 - Res. 204/2016, DEJT divulgado em 17, 18 e 21.03.2016 Incorporada a Orientação Jurisprudencial nº 305 da SBDI-..."
    precedentes: 25
    fonte: https://jurisprudencia.tst.jus.br/?tipoJuris=SUM&orgao=TST&pesquisar=1

  STST220:
    numero: 220
    titulo: "HONORÁRIOS ADVOCATÍCIOS. SUBSTITUIÇÃO PROCESSUAL."
    enunciado: >
      Atendidos os requisitos da Lei nº 5.584/1970, são devidos os honorários
