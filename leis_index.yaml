# Leis index — structured metadata for Brazilian statutes cited in this directory.
#
# Purpose: a lightweight, queryable index that bridges the topical
# markdown files to the article-level law database. Each entry names a
# statute, gives a one-line summary, current status, the topics it
# covers, and the files in this directory that discuss it.
#
# Format: YAML, top-level "statutes" mapping keyed by canonical short
# name (e.g., "lei_8666_1993"). Status values: "vigente",
# "parcialmente_revogada", "revogada", "vigente_com_modificacoes".
#
# Conventions:
# - All planalto links use https://www.planalto.gov.br/ccivil_03/...
# - "discussed_in" lists are filenames in this directory.
# - Reform laws are cross-linked via "reformed_by" / "reforms".
# - Constitutional amendments (EC) and decree-laws (DL) follow the
#   same schema with appropriate tipo field.

