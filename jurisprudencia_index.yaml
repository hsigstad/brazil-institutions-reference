  Tema4:
    tipo: repercussao_geral
    numero: 4
    processo: RE 566.621
    aliases: [RE566621]
    relator: Ellen Gracie
    decidido: 2011-08-04
    tema: retroatividade da LC 118 — prescrição em repetição de indébito
    status: vigente
    holding_short: >
      LC 118/2005 Art. 3 tem caráter inovador, não interpretativo.
      Aplica-se apenas a ações ajuizadas após 09/06/2005 (término da
      vacatio). Antes dessa data vale a regra anterior (5+5 anos).
    discussed_in: [topics/direito-tributario.md, topics/divida-ativa.md, jurisprudencia-stf.md]
    related_leis: [CTN, LC118]
    supera: []
    superado_por: null
    fonte: https://portal.stf.jus.br/jurisprudenciaRepercussao/tema.asp?num=4

  ADI5135:
    tipo: ADI
    numero: 5135
    processo: ADI 5.135 / DF
    aliases: []
    relator: Roberto Barroso
    decidido: 2016-11-09
    votacao: maioria
    tema: protesto de CDA — constitucionalidade
    status: vigente
    holding_short: >
      Declarada constitucional a inclusão das CDAs no rol de títulos
      passíveis de protesto extrajudicial (Lei 9.492/1997 Art. 1
      parágrafo único, incluído pela L12767/2012). Protesto é cobrança
      extrajudicial legítima, não sanção política, e preserva ampla
      defesa em ação anulatória posterior.
    discussed_in: [topics/divida-ativa.md, jurisprudencia-stf.md]
    related_leis: []
    supera: []
    superado_por: null
    fonte: https://portal.stf.jus.br/processos/detalhe.asp?incidente=4628755

  ADI6040:
    tipo: ADI
    numero: 6040
    processo: ADI 6.040 / DF
    aliases: [ADI6055]
    processos: [ADI 6.040, ADI 6.055]
    relator: Marco Aurélio
    redator_acordao: Roberto Barroso
    decidido: 2020-12-09
    tema: averbação pré-executória — constitucionalidade parcial
    status: vigente
    holding_short: >
      Parcial procedência. Arts. 20-B a 20-E da L10522 (inseridos por
      L13606) mantidos, com interpretação conforme: averbação
      administrativa gera efeito de presunção de fraude análogo ao
      CTN.185, mas não equivale a indisponibilidade integral sem
      ordem judicial. Notificação prévia, protesto e regulamentação
      permaneceram íntegros.
    discussed_in: [topics/divida-ativa.md, jurisprudencia-stf.md]
    related_leis: [L10522, L13606]
    complementa: [ADI5135]
    supera: []
    superado_por: null
    fonte: https://portal.stf.jus.br/processos/detalhe.asp?incidente=5587455

  ADI7053:
    tipo: ADI
    numero: 7053
    processo: ADI 7.053 / DF
    aliases: []
    tema: atos normativos PGFN sobre averbação pré-executória
    status: pendente
    holding_short: >
      ADI contra as Portarias PGFN que regulamentaram a averbação
      pré-executória após as ADIs 6.040 e 6.055. Contestação: os atos
      normativos excederam a interpretação conforme do STF (2020),
      reintroduzindo efeitos de indisponibilidade que a Corte havia
      afastado. Verificar status no portal STF antes de citar como
      resolvida.
    discussed_in: [topics/divida-ativa.md, jurisprudencia-stf.md]
    related_leis: [L10522, L13606]
    complementa: [ADI6040]
    supera: []
    superado_por: null
    fonte: https://portal.stf.jus.br/

  Tema444:
    tipo: repetitivo_stj
    numero: 444
    processo: REsp 1.201.993 / SP
    aliases: [REsp1201993]
    relator: Herman Benjamin
    tribunal: STJ
    decidido: 2019-05-08
    publicado: 2019-12-12
    tema: prescrição para redirecionamento da execução fiscal ao sócio
    status: vigente
    holding_short: >
      Prazo quinquenal de redirecionamento da EF com base em dissolução
      irregular (CTN.135.III): (i) se a dissolução é anterior à citação
      da PJ, o prazo conta-se da citação; (ii) se posterior, conta-se do
      ato inequívoco da dissolução irregular. Em ambos os casos, exige-se
      demonstração de inércia da Fazenda no lustro seguinte.
    discussed_in: [topics/direito-tributario.md, topics/execucao-fiscal.md, jurisprudencia-stf.md]
    related_leis: [CTN, LEF]
    supera: []
    superado_por: null
    complementado_por: [Tema962, Tema981]
    fonte: https://www.stj.jus.br/repetitivos/temas_repetitivos/

  Tema566:
    tipo: repetitivo_stj
    numero: 566
    processo: REsp 1.340.553 / RS
    aliases: [REsp1340553]
    relator: Mauro Campbell Marques
    tribunal: STJ
    decidido: 2018-09-12
    tema: prescrição intercorrente em execução fiscal (LEF.40)
    status: vigente
    holding_short: >
      Rito operacional da prescrição intercorrente na EF: (1) não
      localizado devedor/bens, suspensão por 1 ano; (2) findo, arquivamento
      sem baixa, de onde corre prescrição quinquenal; (3) diligências
      protelatórias não interrompem; (4) reconhecimento de ofício após
      intimar Fazenda.
    discussed_in: [topics/execucao-fiscal.md, topics/direito-tributario.md, jurisprudencia-stf.md]
    related_leis: [LEF, CTN]
    supera: []
    superado_por: null
    fonte: https://www.stj.jus.br/repetitivos/temas_repetitivos/

  Tema962:
    tipo: repetitivo_stj
    numero: 962
    processo: REsp 1.377.019 / SP (+ 1.776.138 / RJ, 1.787.156 / RS)
    aliases: [REsp1377019]
    relator: Assusete Magalhães
    tribunal: STJ
    decidido: 2021-11-24
    tema: redirecionamento ao sócio que se retirou regularmente antes da dissolução irregular
    status: vigente
    holding_short: >
      Não cabe redirecionamento da EF fundado em dissolução irregular
      (CTN.135.III) contra o sócio ou administrador que, embora tivesse
      poderes de gerência no fato gerador, sem praticar atos com excesso
      de poder ou infração à lei, retirou-se regularmente da sociedade e
      não deu causa à sua posterior dissolução irregular.
    discussed_in: [topics/direito-tributario.md, topics/execucao-fiscal.md, jurisprudencia-stf.md]
    related_leis: [CTN]
    supera: []
    superado_por: null
    complementa: [Tema444, Tema981]
    fonte: https://www.stj.jus.br/repetitivos/temas_repetitivos/

  Tema981:
    tipo: repetitivo_stj
    numero: 981
    processo: REsp 1.645.333 / SP
    aliases: [REsp1645333]
    relator: Assusete Magalhães
    tribunal: STJ
    decidido: 2022-05-25
    tema: redirecionamento ao administrador à época da dissolução irregular, ainda que não fosse gerente no fato gerador
    status: vigente
    holding_short: >
      O redirecionamento da EF fundado em dissolução irregular (CTN.135.III)
      pode ser autorizado contra o sócio ou terceiro não sócio com poderes
      de administração na data em que configurada ou presumida a dissolução,
      ainda que não tenha exercido poderes de gerência quando do fato
      gerador do tributo não adimplido.
    discussed_in: [topics/direito-tributario.md, topics/execucao-fiscal.md, jurisprudencia-stf.md]
    related_leis: [CTN]
    supera: []
    superado_por: null
    complementa: [Tema444, Tema962]
    fonte: https://www.stj.jus.br/repetitivos/temas_repetitivos/

  Tema1115:
    tipo: repetitivo_stj
    numero: 1115
    tribunal: STJ
    decidido: 2022
    tema: 360 dias para decisão administrativa em matéria tributária
    status: vigente
    holding_short: >
      Prazo de 360 dias do L11457.24 é cogente e direito subjetivo do
      contribuinte. Descumprimento autoriza MS para compelir decisão;
      não extingue o crédito nem altera a suspensão da exigibilidade
      durante o PAF.
    discussed_in: [topics/processo-administrativo-fiscal.md, jurisprudencia-stf.md]
    related_leis: [L11457]
    supera: []
    superado_por: null
    fonte: https://www.stj.jus.br/repetitivos/temas_repetitivos/
