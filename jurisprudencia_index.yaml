  # ---------------------------------------------------------------------

  ADI875:
    tipo: ADI
    numero: 875
    processos: [ADI 875, ADI 1987, ADI 2727, ADI 3243]
    decidido: 2010
    tema: FPE — inconstitucionalidade dos coeficientes rígidos
    status: vigente
    holding_short: >
      Coeficientes fixos do FPE (LC 62/1989) declarados
      inconstitucionais por perpetuar fatias sem atualização. Congresso
      respondeu com LC 143/2013 (fórmula população + renda per capita).
    discussed_in: [topics/federalismo-fiscal.md, jurisprudencia-stf.md]
    related_leis: [LC62-1989, LC143-2013, CF]
    supera: []
    superado_por: null

  # ---------------------------------------------------------------------
  # 6. Anticorrupção penal — Lava Jato e Pacote Anticrime
  # ---------------------------------------------------------------------

  HC126292:
    tipo: HC
    numero: 126.292
    decidido: 2016
    tema: execução provisória da pena após segunda instância
    status: superada
    holding_short: >
      Permitiu execução de pena após confirmação em segunda
      instância, antes do trânsito em julgado. Habilitou prisões
      de réus de alto perfil da Lava Jato.
    discussed_in: [topics/anticorrupcao-penal.md, jurisprudencia-stf.md]
    related_leis: [CF, CPP]
    supera: []
    superado_por: ADC43

  ADC43:
    tipo: ADC
    numero: 43
    processos: [ADC 43, ADC 44, ADC 54]
    aliases: [ADC44, ADC54]
    decidido: 2019-11
    tema: reversão da execução provisória — exigência de trânsito em julgado
    status: vigente
    holding_short: >
      Reverteu HC 126.292; restaurou exigência de trânsito em julgado
      antes da execução penal. Reafirmou presunção de inocência em
      sua forma processual plena. Triggered release of high-profile
      defendants including Lula.
    discussed_in: [topics/anticorrupcao-penal.md, jurisprudencia-stf.md]
    related_leis: [CF, CPP]
    supera: [HC126292]
    superado_por: null

  LulaMoro2021:
    tipo: HC
    processos: [HC 193.726, Rcl 43.479, outros]
    decidido: 2021
    tema: anulação de condenações de Lula — incompetência e parcialidade de Moro
    status: vigente
    holding_short: >
      (1) 13ª Vara Federal de Curitiba era incompetente para casos
      Lula não-Petrobras. (2) Sergio Moro (depois Min. da Justiça)
      atuou com parcialidade, viciando os processos. Anulou múltiplas
      condenações de Lula em bases procedimentais.
    discussed_in: [topics/anticorrupcao-penal.md, jurisprudencia-stf.md]
    related_leis: [CPP, CF]
    supera: []
    superado_por: null

  ADI6298:
    tipo: ADI
    numero: 6298
    processos: [ADI 6298, ADI 6299, ADI 6300, ADI 6305]
    aliases: [ADI6299, ADI6300, ADI6305]
    decidido: 2023-08
    tema: juiz das garantias — constitucionalidade
    status: vigente
    holding_short: >
      Juiz das garantias (Lei 13.964/2019, CPP Art. 3-A) é
      constitucional, com diretrizes de implementação fixadas pelo
      STF. Implementação efetiva a partir de 2024. Separa juiz da
      investigação do juiz da instrução/julgamento.
    discussed_in: [topics/anticorrupcao-penal.md, jurisprudencia-stf.md]
    related_leis: [CPP, L13964-2019]
    supera: []
    superado_por: null

  HC127483:
    tipo: HC
    numero: 127.483
    processos: [HC 127.483, HC 164.493]
    aliases: [HC164493]
    tema: colaboração premiada — controle judicial e prova
    status: vigente
    holding_short: >
      Define escopo do controle judicial sobre acordos de colaboração
      premiada (Lei 12.850/2013 Art. 4) e padrões probatórios para o
      depoimento do colaborador. Colaboração isolada não sustenta
      condenação (Art. 4 §16): exige corroboração.
    discussed_in: [topics/anticorrupcao-penal.md, jurisprudencia-stf.md]
    related_leis: [L12850-2013]
    supera: []
    superado_por: null

  RE593727:
    tipo: repercussao_geral
    numero: 184
    processo: RE 593.727
    aliases: [Tema184]
    decidido: 2015-05-14
    tema: poder de investigação criminal do Ministério Público
    status: vigente
    holding_short: >
      MP tem legitimidade para promover, por autoridade própria,
      investigações de natureza penal, desde que respeitados os
      direitos e garantias do investigado e observada a reserva de
      jurisdição para medidas restritivas. Operacionalizado por
      Resolução CNMP 181/2017 (PIC — Procedimento Investigatório
      Criminal).
    discussed_in: [topics/ministerio-publico.md, topics/policia-federal.md, jurisprudencia-stf.md]
    related_leis: [CF, CPP]
    supera: []
    superado_por: null
    fonte: https://portal.stf.jus.br/jurisprudenciaRepercussao/tema.asp?num=184

