# Jurisprudência index — structured metadata for STF (and selected STJ)
# decisions cited in this directory.
#
# Purpose: a lightweight, queryable index parallel to leis_index.yaml.
# Each entry names a leading case, gives its identifier(s), current
# status, theme, and the files in this directory that discuss it.
# The substantive description of each case lives in
# jurisprudencia-stf.md; this file is the index, not a duplicate.
#
# Format: YAML, top-level "cases" mapping keyed by canonical citation
# ID (e.g., "Tema1199", "ADI4650", "HC126292"). The key matches the
# bracket-form citation accepted by tools/leis_artigos/cite.py:
# [[Tema1199]] resolves to cases.Tema1199 in this file.
#
# Status values:
#   vigente              — current binding interpretation
#   superada             — overruled in full
#   parcialmente_superada — partially overruled / modulated
#   modulada             — effects modulated by later decision
#
# Aliases: a single case may be known by both its tema number and its
# processo number (Tema 1199 = ARE 843.989). The canonical key is
# whichever form is most commonly cited; the other goes in `aliases`.
#
# Supersession chain: `supera` lists case IDs this decision overruled;
# `superado_por` names the case that overruled this one (if any).
# Both fields support reasoning about whether a citation is still good
# law without re-reading the full prose entry.
#
# Conventions:
# - All processo numbers use the bare form (no spaces, no dots) in the
#   key and aliases (HC126292, not "HC 126.292"). The display form
#   with dots is in `processo`.
# - Compound entries (e.g., ADC 43+44+54 decided jointly) get a single
#   key and list all processos in `processos`.
# - `discussed_in` lists are filenames in this directory.
# - `related_leis` cross-references leis_index.yaml apelidos or
#   fonte_ids that the case interprets.

