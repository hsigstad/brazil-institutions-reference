  ADI3931:
    tipo: ADI
    numero: 3931
    decidido: 2020-04
    tema: NTEP — constitucionalidade do nexo técnico epidemiológico
    status: vigente
    holding_short: >
      Constitucionalidade do Art. 21-A da Lei 8.213/1991 (incluído
      pela Lei 11.430/2006). Presunção de origem ocupacional baseada
      em CNAE × CID é constitucional; inversão do ônus da prova é
      permitida neste contexto.
    discussed_in: [jurisprudencia-stf.md]
    related_leis: [L8213-1991, L11430-2006]
    supera: []
    superado_por: null

  # ---------------------------------------------------------------------
  # 8. Transparência
  # ---------------------------------------------------------------------

  ARE652777:
    tipo: ARE
    numero: 652.777
    decidido: 2015-04-23
    tipo_julgamento: repercussao_geral
    tema: divulgação nominal de salários de servidores públicos
    status: vigente
    holding_short: >
      Divulgação de salários nominais de servidores é constitucional
      e compatível com publicidade (CF Art. 37) e direito à
      privacidade. Servidor não tem interesse de privacidade em
      ocultar remuneração paga com recursos públicos. LGPD (2018)
      não revoga: divulgação segue válida sob base legal de
      interesse público.
    discussed_in: [topics/transparencia-dados.md, jurisprudencia-stf.md]
    related_leis: [CF, L13709-2018]
    supera: []
    superado_por: null

  # ---------------------------------------------------------------------
  # 9. Matéria tributária
  # ---------------------------------------------------------------------

  Tema69:
    tipo: repercussao_geral
    numero: 69
    processo: RE 574.706
    aliases: [RE574706]
    relator: Cármen Lúcia
    decidido: 2017-03-15
    votacao: 6x4
    tema: ICMS fora da base de cálculo do PIS/COFINS
    status: modulada
    holding_short: >
      ICMS não compõe a base de cálculo de PIS e COFINS. O imposto
      destacado na nota fiscal é receita transitória, não
      faturamento/receita bruta para fins de CF Art. 195 I b.
    discussed_in: [topics/direito-tributario.md, jurisprudencia-stf.md]
    related_leis: [CF]
    supera: []
    superado_por: null
    complementado_por: [Tema881]
    fonte: https://portal.stf.jus.br/jurisprudenciaRepercussao/tema.asp?num=69

  Tema881:
    tipo: repercussao_geral
    numero: 881
    processo: RE 574.706 ED
    aliases: [RE574706ED]
    decidido: 2021-05-13
    tema: modulação do Tema 69 — ICMS fora da base do PIS/COFINS
    status: vigente
    holding_short: >
      Efeitos do Tema 69 produzem-se a partir de 15/03/2017 (data do
      julgamento de mérito), ressalvadas ações judiciais e procedimentos
      administrativos protocolados até essa data. O ICMS a excluir é o
      destacado na nota fiscal, não o efetivamente recolhido.
    discussed_in: [topics/direito-tributario.md, jurisprudencia-stf.md]
    related_leis: [CF]
